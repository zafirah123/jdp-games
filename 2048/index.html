<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#020d26">
<title>2048 — JDP Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Poppins:wght@500;600;700;800&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: linear-gradient(180deg, #020d26 0%, #000000 100%);
    color: #fff;
    font-family: 'Poppins', -apple-system, 'Segoe UI', Roboto, sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  canvas#game {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    display: block;
    touch-action: none;
  }
  .hidden { display: none !important; }

  /* Top HUD bar — DESIGN.md §5.12 */
  .hud-bar {
    position: fixed; left: 0; right: 0; top: 0;
    display: flex; justify-content: center;
    padding: max(8px, env(safe-area-inset-top)) 8px 0;
    z-index: 10;
    pointer-events: none;
  }
  .hud-row {
    width: 100%; max-width: 28rem;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    flex-shrink: 0;
    pointer-events: auto;
  }
  .jdp-pill {
    flex: 1;
    display: flex; align-items: stretch;
    background: #fff;
    border: 2px solid #FFB603;
    border-radius: 30px;
    overflow: hidden;
    height: 40px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.25);
  }
  .jdp-pill .pill-label {
    background: #9E131F;
    color: #FFD633;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex; align-items: center;
    padding: 0 10px;
  }
  .jdp-pill .pill-value {
    flex: 1;
    background: #133B9F;
    color: #fff;
    font-weight: 800;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 6px;
    transition: background 0.25s;
  }
  .jdp-pill .pill-value.font-mono { font-family: 'Roboto Mono', monospace; font-size: 15px; }
  .jdp-pill .pill-value.warn   { background: #C76A00; }
  .jdp-pill .pill-value.danger { background: #9E131F; }
  @keyframes pulse-urgent {
    0%, 100% { transform: scale(1);    color: #FFFFFF; }
    50%      { transform: scale(1.15); color: #FFD633; }
  }
  .pulse-urgent { animation: pulse-urgent 0.8s infinite; display: inline-block; }
  @keyframes pulse-card {
    from { transform: scale(1); } to { transform: scale(1.06); }
  }

  /* Audio toggle — DESIGN.md §5.11 (in-row variant) */
  .mute {
    flex-shrink: 0;
    width: 44px; height: 44px;
    border-radius: 22px;
    border: 2px solid #FFB603;
    background: #9E131F;
    color: #FFD633;
    display: flex; align-items: center; justify-content: center;
    padding: 0; cursor: pointer;
    transition: transform 80ms ease;
  }
  .mute:active { transform: scale(0.92); }
  .mute svg { width: 22px; height: 22px; fill: currentColor; }

  /* Urgency bar — fills toward the next auto-spawn. Only visible once spawn pressure kicks in. */
  .urgency-bar {
    position: fixed;
    top: calc(max(8px, env(safe-area-inset-top)) + 46px);
    left: 50%;
    transform: translateX(-50%);
    height: 6px;
    width: min(360px, 70vw);
    background: rgba(2, 13, 38, 0.7);
    border: 1.5px solid rgba(255, 214, 51, 0.4);
    border-radius: 999px;
    overflow: hidden;
    z-index: 9;
  }
  .urgency-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #FFD633 0%, #ff7b00 60%, #AF1726 100%);
    transition: width 0.08s linear;
  }

  /* Overlays */
  .overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(2, 13, 38, 0.82);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 20;
    padding: 16px;
  }
  .card {
    background: linear-gradient(180deg, #020d26 0%, #051335 100%);
    border: 3px solid #FFD633;
    border-radius: 24px;
    padding: 32px 28px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 12px 0 rgba(0,0,0,0.4);
  }
  .card h1 {
    font-size: 44px;
    margin: 0 0 8px;
    font-weight: 700;
    color: #FFD633;
    letter-spacing: 1px;
    text-shadow: 0 4px 0 #AF1726;
  }
  .card h2 {
    font-size: 26px;
    margin: 0 0 16px;
    color: #FFD633;
    font-weight: 700;
  }
  .card .sub { font-size: 14px; color: #FFFFFF; margin: 0 0 4px; opacity: 0.9; }
  .card .cap { font-size: 14px; color: #FFFFFF; margin: 0 0 16px; opacity: 0.8; }
  .card .best { font-size: 14px; color: #FFD633; margin: 0 0 20px; font-weight: 600; min-height: 20px; }
  .card .hint { font-size: 12px; color: rgba(255,255,255,0.6); margin: 14px 0 0; }
  .card .hint kbd {
    background: rgba(255,214,51,0.15);
    border: 1px solid rgba(255,214,51,0.3);
    padding: 2px 6px;
    border-radius: 4px;
    color: #FFD633;
    font-family: inherit;
    font-size: 11px;
  }
  .cta {
    background: linear-gradient(180deg, #FFE258 0%, #FFBA0A 100%);
    border: 3px solid #FFB603;
    border-radius: 999px;
    padding: 14px 36px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 700;
    color: #031034;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 0 #DE9D00;
    transition: transform 0.08s, box-shadow 0.08s;
    text-transform: uppercase;
  }
  .cta:active { transform: translateY(2px); box-shadow: 0 2px 0 #DE9D00; }
  .cta,
  a.cta { display: inline-block; text-decoration: none; }
  a.cta[aria-disabled="true"] { opacity: 0.55; pointer-events: none; cursor: default; }
  .stats {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 6px 16px;
    margin: 0 0 20px;
    font-size: 14px;
  }
  .stats .label { color: rgba(255,255,255,0.7); text-align: left; }
  .stats .value { color: #FFD633; font-weight: 700; text-align: right; }
  .claim-note {
    margin: 12px 0 0;
    color: #ff8a8a;
    font-size: 12px;
    font-weight: 700;
  }
  .claim-note.pending {
    color: #FFD633;
  }
  .new-best {
    display: inline-block;
    background: #FFD633;
    color: #031034;
    border-radius: 999px;
    padding: 6px 14px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    margin: 0 0 12px;
    animation: pulse-card 0.5s ease-in-out infinite alternate;
  }
  @media (max-width: 420px) {
    .card h1 { font-size: 36px; }
    .jdp-pill .pill-value { font-size: 14px; }
    .jdp-pill .pill-label { font-size: 9px; padding: 0 8px; }
  }

  /* ============================================================
     STANDARDIZED JDP START SCREEN (portable template)
     Roll this block + the #menu markup into any JDP game. Only the
     copy (#menuTitle text, #menuSub) and the two "Powered by" images
     change per game. Layout is adaptive from 360px phones to tablets.
     ============================================================ */
  #menu.jdp-start {
    padding: 0;
    background: #04122c;
    align-items: stretch;
    justify-content: flex-start;
    overflow-y: auto;
  }
  .jdp-frame {
    position: relative;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* small reserve so the orange splash stays clear of content on tall-content screens */
    padding-bottom: clamp(96px, 24vw, 132px);
    /* body copy on this screen uses Poppins (title overrides to Bebas Neue) */
    font-family: 'Poppins', system-ui, sans-serif;
    /* red-grid + navy background art (shared template asset) */
    background: #071733 url("assets/start/bg.webp?v=20260720.1") no-repeat top center / cover;
    overflow: hidden;
  }
  /* Gem placement mirrors the template (1080x1920): positions are % of the
     frame so they scale. Bokeh = soft blurred gems behind content (z1);
     sharp gems in front (z2, still behind the title/panel/logos at z3). */
  .jdp-bokeh { position: absolute; z-index: 1; pointer-events: none; opacity: 0.85; }
  .jdp-bokeh img { display: block; width: 100%; height: auto; }
  .jdp-bk1 { width: clamp(120px, 34vw, 180px); top: 44%;  right: -9%; }  /* top-right blur */
  .jdp-bk2 { width: clamp(130px, 38vw, 200px); top: 70%;  left: -11%; }  /* bottom-left blur */
  .jdp-gem { position: absolute; z-index: 4; pointer-events: none; }  /* in front of logos/mascot, behind title+panel */
  .jdp-gem img { display: block; width: 100%; height: auto; }
  /* two faceted rubies — top corners of the red band */
  .jdp-g1 { width: clamp(56px, 15vw, 74px);  top: 4.5%;  left: 1.5%;  transform: rotate(-8deg); }
  .jdp-g2 { width: clamp(58px, 15.5vw, 76px);top: 4.5%;  right: 1.5%; transform: rotate(10deg); }
  /* eight kelapa-sawit pebbles */
  .jdp-g3 { width: clamp(24px, 7vw, 32px);   top: 2.5%;  left: 25%;  }  /* top, left of centre */
  .jdp-g4 { width: clamp(26px, 7.5vw, 34px); top: 4%;    right: 23%; }  /* top, right of centre */
  .jdp-g5 { width: clamp(26px, 7.5vw, 34px); top: 9%;    left: 55%;  }  /* red band, lower centre */
  .jdp-g6 { width: clamp(28px, 8vw, 40px);   top: 45.5%; left: 24%;  }  /* beside "Powered by", left */
  .jdp-g7 { width: clamp(28px, 8vw, 40px);   top: 45.5%; right: 23%; }  /* beside "Powered by", right */
  .jdp-g8 { width: clamp(26px, 7.5vw, 36px); top: 53.5%; left: 4%;   }  /* far left, by MPOC */
  .jdp-g9 { width: clamp(22px, 6.5vw, 30px); top: 66.5%; left: 43%;  }  /* below MPOC, centre */
  .jdp-g10{ width: clamp(28px, 8vw, 38px);   top: 72.5%; right: 8%;  }  /* bottom right, by mascot */
  /* title — Bebas Neue, gold gradient fill (180°: #ffb000→#ffd80b) */
  .jdp-title {
    position: relative; z-index: 5; isolation: isolate;
    margin: clamp(58px, 14vw, 92px) 0 0;
    padding: 0 14px;
    /* heavy condensed display face (matches the arcade title reference) */
    font-family: 'Anton', 'Bebas Neue', sans-serif;
    font-weight: 400;
    font-size: clamp(42px, 14vw, 74px);
    line-height: 1.0;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    /* the visible face is the ::after gradient; the real <h1> is transparent and just
       carries layout + the neon glow (background-clip:text only paints on the pseudo here) */
    color: #ffd23f;   /* solid fallback if background-clip:text unsupported */
    -webkit-text-fill-color: transparent;
    /* faint cool glow only — the dark drop shadow is the separate ::before layer below,
       kept OFF the gold face so the letters keep their bright colour */
    text-shadow: 0 0 12px rgba(120,180,255,0.22);
  }
  /* dark letter-shaped shadow BEHIND the gold — offset copy, doesn't tint the face */
  .jdp-title::before {
    content: attr(data-text);
    position: absolute; left: 0; right: 0; top: 0; bottom: 0;
    z-index: -1; padding: inherit;
    font-family: 'Anton', 'Bebas Neue', sans-serif !important;
    color: rgba(0,0,0,0.55); -webkit-text-fill-color: rgba(0,0,0,0.55);
    transform: translate(3px, 5px);
    filter: blur(0.6px);
  }
  /* golden linear-gradient face — 180°: #ffb000 → #ffd80b (per reference) */
  .jdp-title::after {
    content: attr(data-text);
    position: absolute; left: 0; right: 0; top: 0; bottom: 0;
    z-index: 1; padding: inherit;
    font-family: 'Anton', 'Bebas Neue', sans-serif !important;
    background: linear-gradient(180deg, #ffb000 0%, #ffd80b 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent; -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 1px #d99500;
  }
  /* instructions panel */
  .jdp-panel {
    position: relative; z-index: 5;
    width: min(84%, 356px);
    margin: clamp(16px, 5vw, 30px) 0 0;
    padding: 20px 22px 24px;
    background: rgba(11, 32, 74, 0.5);
    border: 1.5px solid rgba(255,255,255,0.85);
    border-radius: 22px;
    text-align: center;
    -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
  }
  .jdp-panel .jdp-panel-head {
    font-weight: 800; color: #fff;
    font-size: clamp(15px, 4.4vw, 18px); margin: 0 0 10px;
  }
  #menu.jdp-start .sub {
    color: rgba(255,255,255,0.9);
    font-size: clamp(13px, 3.8vw, 15px);
    margin: 0; line-height: 1.5;
  }
  /* powered-by row */
  /* bottom margin guarantees a minimum gap between the logos and the CTA below */
  .jdp-powered { position: relative; z-index: 3; margin: clamp(12px, 4vw, 24px) 0 clamp(14px, 4.5vw, 26px); text-align: center; }
  .jdp-powered .lbl { color: #fff; font-size: 15px; font-weight: 600; margin: 0 0 14px; }
  /* bare logos on the background — no shared panel */
  .jdp-logos { display: inline-flex; align-items: center; justify-content: center; gap: clamp(10px, 4vw, 26px); }
  .jdp-logos img { width: auto; object-fit: contain; }
  /* MPOC mark sits directly on the background — no circle frame */
  .jdp-mpoc-ring { display: inline-flex; align-items: center; justify-content: center; }
  .jdp-mpoc   { height: clamp(84px, 26vw, 118px); }
  .jdp-mascot { height: clamp(108px, 34vw, 152px); }
  /* orange CTA */
  #menu.jdp-start .jdp-cta {
    position: relative; z-index: 3;
    margin: 0;   /* flows directly under the logos; gap comes from .jdp-powered's bottom margin */
    width: min(56%, 236px);
    padding: 12px 20px;
    border: 3px solid #FFD21E;
    border-radius: 36px;
    background: linear-gradient(180deg, #ff8f22 0%, #f26f0c 100%);
    color: #fff; font-weight: 800; letter-spacing: 0.5px;
    font-size: clamp(15px, 4.2vw, 19px);
    text-transform: none;
    box-shadow: 0 8px 0 rgba(150,60,0,0.45), 0 14px 26px rgba(0,0,0,0.35);
    cursor: pointer;
  }
  #menu.jdp-start .jdp-cta:active { transform: translateY(3px); box-shadow: 0 5px 0 rgba(150,60,0,0.45), 0 8px 16px rgba(0,0,0,0.35); }
  /* bottom orange liquid blob (shared template asset) */
  .jdp-blob {
    position: absolute; z-index: 1; left: 0; right: 0; bottom: -1px;
    width: 100%; pointer-events: none;
  }
  .jdp-blob img { display: block; width: 100%; height: auto; }
  /* controls line inside the instructions panel */
  #menu.jdp-start .jdp-panel .hint {
    margin: 12px 0 0; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.18);
    font-size: clamp(11px, 3.2vw, 13px);
    color: rgba(255,255,255,0.72); line-height: 1.9;
  }
  #menu.jdp-start .jdp-panel .hint kbd {
    background: rgba(255,214,51,0.16); border: 1px solid rgba(255,214,51,0.35);
    padding: 2px 7px; border-radius: 5px; color: #FFD633;
    font-family: inherit; font-size: 0.92em; white-space: nowrap;
  }
  /* device-adaptive controls: keyboard by default, touch on coarse pointers */
  #menu.jdp-start .jdp-panel .hint-touch { display: none; }
  @media (hover: none) and (pointer: coarse) {
    #menu.jdp-start .jdp-panel .hint-keys  { display: none; }
    #menu.jdp-start .jdp-panel .hint-touch { display: inline; }
  }
  /* hide only the best-score line on this screen (controls now shown above) */
  #menu.jdp-start .best { display: none; }

  @media (max-height: 860px) {
    .jdp-frame {
      padding-bottom: clamp(76px, 18vh, 104px);
    }
    .jdp-title {
      margin-top: clamp(34px, 7vh, 56px);
      font-size: clamp(38px, 10vw, 64px);
    }
    .jdp-panel {
      margin-top: clamp(12px, 2.8vh, 18px);
      padding: 16px 18px 18px;
    }
    .jdp-powered {
      margin: clamp(10px, 2.4vh, 18px) 0 clamp(10px, 2.8vh, 18px);
    }
    .jdp-powered .lbl {
      margin-bottom: 10px;
    }
    .jdp-mpoc {
      height: clamp(72px, 20vh, 96px);
    }
    .jdp-mascot {
      height: clamp(96px, 24vh, 126px);
    }
    #menu.jdp-start .jdp-panel .hint {
      margin-top: 10px;
      padding-top: 10px;
      line-height: 1.65;
    }
  }

  @media (max-height: 720px) {
    .jdp-frame {
      padding-bottom: 70px;
    }
    .jdp-title {
      margin-top: 26px;
      font-size: clamp(34px, 8vw, 54px);
    }
    .jdp-panel {
      width: min(88%, 344px);
      margin-top: 10px;
      padding: 14px 16px 16px;
      border-radius: 18px;
    }
    .jdp-panel .jdp-panel-head {
      margin-bottom: 8px;
      font-size: clamp(14px, 3.4vw, 16px);
    }
    #menu.jdp-start .sub {
      font-size: clamp(12px, 2.8vw, 14px);
      line-height: 1.4;
    }
    .jdp-powered {
      margin: 10px 0 12px;
    }
    .jdp-powered .lbl {
      font-size: 14px;
      margin-bottom: 8px;
    }
    .jdp-logos {
      gap: clamp(8px, 2vw, 18px);
    }
    .jdp-mpoc {
      height: clamp(60px, 16vh, 84px);
    }
    .jdp-mascot {
      height: clamp(80px, 20vh, 112px);
    }
    #menu.jdp-start .jdp-cta {
      width: min(62%, 224px);
      padding: 11px 18px;
      font-size: clamp(14px, 3.6vw, 17px);
      box-shadow: 0 6px 0 rgba(150,60,0,0.45), 0 10px 18px rgba(0,0,0,0.35);
    }
    .jdp-blob {
      opacity: 0.82;
    }
    #menu.jdp-start .jdp-panel .hint {
      font-size: 11px;
      line-height: 1.5;
    }
  }

</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" class="hud-bar hidden">
  <div class="hud-row">
    <div class="jdp-pill"><span class="pill-label">Score</span><span class="pill-value" id="scoreVal">0</span></div>
    <div class="jdp-pill"><span class="pill-label">Time</span><span class="pill-value font-mono" id="timerVal">03:00</span></div>
    <button id="muteBtn" class="mute" aria-label="AUDIO ON" aria-pressed="false">
      <svg viewBox="0 0 24 24"></svg>
    </button>
  </div>
</div>
<div id="urgencyBar" class="urgency-bar hidden">
  <div id="urgencyFill" class="urgency-fill"></div>
</div>

<!-- Start menu — standardized JDP template (see .jdp-* CSS above) -->
<div id="menu" class="overlay jdp-start">
  <div class="jdp-frame">
    <span class="jdp-bokeh jdp-bk1"><img src="assets/start/gem-bokeh.webp?v=20260720.1" alt=""></span>
    <span class="jdp-bokeh jdp-bk2"><img src="assets/start/gem-bokeh.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g1"><img src="assets/start/gem-ruby.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g2"><img src="assets/start/gem-ruby.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g3"><img src="assets/start/gem-a.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g4"><img src="assets/start/gem-b.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g5"><img src="assets/start/gem-a.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g6"><img src="assets/start/gem-b.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g7"><img src="assets/start/gem-a.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g8"><img src="assets/start/gem-b.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g9"><img src="assets/start/gem-a.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g10"><img src="assets/start/gem-b.webp?v=20260720.1" alt=""></span>

    <h1 id="menuTitle" class="jdp-title" data-text="2048">2048</h1>

    <div class="jdp-panel">
      <div class="jdp-panel-head">How to Play</div>
      <p class="sub" id="menuSub"></p>
      <p class="hint" id="menuHint"></p>
    </div>

    <div class="jdp-powered">
      <p class="lbl">Powered by</p>
      <div class="jdp-logos">
        <span class="jdp-mpoc-ring"><img class="jdp-mpoc" src="assets/start/mpoc.webp?v=20260720.1" alt="MPOC"></span>
        <img class="jdp-mascot" src="assets/start/mascot.webp?v=20260720.1" alt="">
      </div>
    </div>

    <p class="best" id="bestText">&nbsp;</p>
    <button id="startBtn" class="jdp-cta"></button>

    <div class="jdp-blob"><img src="assets/start/blob.webp?v=20260720.1" alt=""></div>
  </div>
</div>

<div id="gameOver" class="overlay hidden">
  <div class="card">
    <h2 id="goTitle"></h2>
    <div id="goNewBest" class="hidden"><span class="new-best" id="newBestLabel">NEW BEST!</span></div>

const LANG = new URLSearchParams(location.search).get('lang') === 'ms' ? 'ms' : 'en';

// =============================================================================
// CONFIG — all tunables live here
// =============================================================================
const CONFIG = {
  GAME_NAME: '2048',
  CLAIM_FALLBACK_URL: null,
  CLAIM_PREPARE_RETRY_DELAY_MS: 1500,
  CLAIM_PREPARE_TIMEOUT_MS: 8000,
  GRID_SIZE: 4,
  GAME_DURATION_SEC: 180,
  // Each merge scores log2(result-tile) + 1 points:
  //   4 → 3, 8 → 4, 16 → 5, 32 → 6, 64 → 7, 128 → 8, 256 → 9,
  //   512 → 10, 1024 → 11, 2048 → 12.
  // Score is uncapped, but auto-spawn kicks in past TAPER_START_SCORE and
  // ramps to its minimum interval at TAPER_FULL_SCORE — past that the board
  // fills faster than the player can clear, so high scores are rare.
  TAPER_START_SCORE: 50,
  TAPER_FULL_SCORE: 200,
  AUTO_SPAWN_INTERVAL_START_SEC: 8.0,
  AUTO_SPAWN_INTERVAL_END_SEC: 1.2,
  SPAWN_FOUR_PROB_BASE: 0.10,        // 10% of tiles spawn as 4 by default
  SPAWN_FOUR_PROB_MAX: 0.28,         // ramps up to make late-game more chaotic
  SLIDE_DURATION_SEC: 0.13,
  SPAWN_ANIM_SEC: 0.16,
  MERGE_PUNCH_SEC: 0.18,
  INPUT_DEBOUNCE_MS: 60,
  SWIPE_THRESHOLD_PX: 24,
  STORAGE_KEY_BEST: '2048:best',
  STORAGE_KEY_MUTE: '2048:mute',
};

// Per-tier visual styling for tiles. Index is log2(value): 2→1, 4→2, …
// Anchored to JDP palette (DESIGN.md §1); cool blues for clutter, warm reds /
// yellows for high-tier achievements.
const TILE_STYLES = [
  null,
  { bg: '#1e3a8a', text: '#FFFFFF', shadow: '#0a1f5c' }, // 2
  { bg: '#1535a8', text: '#FFFFFF', shadow: '#0a1f5c' }, // 4
  { bg: '#2456c4', text: '#FFFFFF', shadow: '#0e2d72' }, // 8
  { bg: '#0ea5b8', text: '#FFFFFF', shadow: '#054b54' }, // 16
  { bg: '#fdd83d', text: '#031034', shadow: '#caa800' }, // 32
  { bg: '#ffb800', text: '#031034', shadow: '#8a6400' }, // 64
  { bg: '#ff7b00', text: '#FFFFFF', shadow: '#a14e00' }, // 128
  { bg: '#ff4e2a', text: '#FFFFFF', shadow: '#a8260f' }, // 256
  { bg: '#b81c26', text: '#FFE258', shadow: '#640A19' }, // 512
  { bg: '#9E131F', text: '#FFE258', shadow: '#530209' }, // 1024
  { bg: '#FFD633', text: '#9E131F', shadow: '#FFB603' }, // 2048 (special)
];
function tileStyle(value) {
  const tier = Math.round(Math.log2(value));
  return TILE_STYLES[Math.min(tier, TILE_STYLES.length - 1)];
}

// =============================================================================
// DOM refs
// =============================================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const dom = {
  hud: document.getElementById('hud'),
  scoreVal: document.getElementById('scoreVal'),
  timerVal: document.getElementById('timerVal'),
  urgencyBar: document.getElementById('urgencyBar'),
  urgencyFill: document.getElementById('urgencyFill'),
  muteBtn: document.getElementById('muteBtn'),
  menu: document.getElementById('menu'),
  menuSub: document.getElementById('menuSub'),
  menuHint: document.getElementById('menuHint'),
  startBtn: document.getElementById('startBtn'),
  bestText: document.getElementById('bestText'),
  gameOver: document.getElementById('gameOver'),
  goTitle: document.getElementById('goTitle'),
  goNewBest: document.getElementById('goNewBest'),
  newBestLabel: document.getElementById('newBestLabel'),
  finalStats: document.getElementById('finalStats'),
  claimBtn: document.getElementById('claimBtn'),
  claimNote: document.getElementById('claimNote'),
};

// Apply localized copy into the DOM up front.
dom.menuSub.textContent = COPY.menuSub;
dom.menuHint.innerHTML =
  '<span class="hint-touch">' + COPY.hintTouch + '</span>' +
  '<span class="hint-keys">'  + COPY.hintKeys  + '</span>';
dom.startBtn.textContent = COPY.start;
dom.newBestLabel.textContent = COPY.newBest;
function isZeroScore() { return (state.score | 0) <= 0; }

// =============================================================================
// Sandbox-safe storage
// =============================================================================
function storageGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v === null ? fallback : v; }
  catch (e) { return fallback; }
}
function storageSet(key, value) {
  try { localStorage.setItem(key, value); } catch (e) {}
}

// =============================================================================
// Dev shortcuts — ?score=N, ?time=N, ?phase=gameover
// =============================================================================
const params = new URLSearchParams(window.location.search);
const devScore = parseInt(params.get('score') || '', 10);
const devTime = parseInt(params.get('time') || '', 10);
const devPhase = params.get('phase');

// =============================================================================
// State
// =============================================================================
const state = {
  phase: 'MENU',                 // MENU | PLAYING | GAME_OVER
  tiles: [],                     // active tile list (see makeTile)
  grid: null,                    // 4x4 array of tile or null (logical board)
  score: 0,
  highestTile: 0,
  moves: 0,
  merges: 0,
  timer: CONFIG.GAME_DURATION_SEC,
  timerStarted: false,
  startTime: 0,
  paused: false,
  pausedAt: 0,
  pausedDuration: 0,             // accumulated paused ms during this round
  lastDropAt: 0,
  lastTickPlayed: 999,
  muted: storageGet(CONFIG.STORAGE_KEY_MUTE, '0') === '1',
  best: parseInt(storageGet(CONFIG.STORAGE_KEY_BEST, '0'), 10) || 0,
  // Auto-spawn state
  autoSpawnAccumulator: 0,       // counts up to current interval
  // Floating "+N" indicators
  floaters: [],
  // Pulse triggered when an auto-spawn drops in (visual cue)
  autoSpawnPulse: 0,
};

function makeTile(row, col, value, opts) {
  opts = opts || {};
  return {
    row, col, value,
    prevRow: opts.prevRow !== undefined ? opts.prevRow : row,
    prevCol: opts.prevCol !== undefined ? opts.prevCol : col,
    spawn: opts.spawn || false,         // animate scale-up on entry
    merged: false,                      // played a merge punch this turn
    autoSpawn: opts.autoSpawn || false, // bigger entry effect
    animT: opts.spawn ? 0 : 1,          // 0..1 over SLIDE_DURATION_SEC
    punchT: 1,                          // 0..1 merge punch; <1 means animating
  };
}

// =============================================================================
// Sizing / viewport
// =============================================================================
const view = {
  w: 0, h: 0, dpr: 1,
  boardX: 0, boardY: 0, boardSize: 0,
  cellSize: 0, gap: 0,
};

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  view.w = window.innerWidth;
  view.h = window.innerHeight;
  view.dpr = dpr;
  canvas.width = Math.floor(view.w * dpr);
  canvas.height = Math.floor(view.h * dpr);
  canvas.style.width = view.w + 'px';
  canvas.style.height = view.h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Reserve room for HUD up top + urgency bar.
  const hudReserved = 110;
  const padding = 20;
  const availW = view.w - padding * 2;
  const availH = view.h - hudReserved - padding * 2;
  view.boardSize = Math.min(availW, availH, 520);
  view.boardX = (view.w - view.boardSize) / 2;
  view.boardY = hudReserved + (view.h - hudReserved - view.boardSize) / 2;
  view.gap = Math.max(6, view.boardSize * 0.022);
  view.cellSize = (view.boardSize - view.gap * (CONFIG.GRID_SIZE + 1)) / CONFIG.GRID_SIZE;
}
window.addEventListener('resize', resize);
resize();

function cellRect(row, col) {
  const x = view.boardX + view.gap + col * (view.cellSize + view.gap);
  const y = view.boardY + view.gap + row * (view.cellSize + view.gap);
  return { x, y, w: view.cellSize, h: view.cellSize };
}

// =============================================================================
// Grid logic — the source of truth is state.grid (4x4 of tile or null).
// state.tiles is a flat list for iteration / animation; rebuilt from the grid
// after every mutation.
// =============================================================================
function emptyGrid() {
  const g = [];
  for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
    g.push(new Array(CONFIG.GRID_SIZE).fill(null));
  }
  return g;
}
// Rebuild from the grid, preserving any "dying" tiles (still mid-slide into
// their merge target) so the absorbed half of a merge keeps animating.
function rebuildTileList() {
  const dying = state.tiles.filter(t => t.dying);
  const live = [];
  for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
    for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
      if (state.grid[r][c]) live.push(state.grid[r][c]);
    }
  }
  state.tiles = live.concat(dying);
}
function emptyCells() {
  const out = [];
  for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
    for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
      if (!state.grid[r][c]) out.push([r, c]);
    }
  }
  return out;
}

// Spawn a new tile in a random empty cell.
// kind: 'move' | 'auto' — 'auto' uses a slightly bigger entry effect.
function spawnRandomTile(kind) {
  const empties = emptyCells();
  if (empties.length === 0) return null;
  const [r, c] = empties[Math.floor(Math.random() * empties.length)];
  const fourProb = lerp(
    CONFIG.SPAWN_FOUR_PROB_BASE,
    CONFIG.SPAWN_FOUR_PROB_MAX,
    urgencyFactor()
  );
  const value = Math.random() < fourProb ? 4 : 2;
  const t = makeTile(r, c, value, {
    spawn: true,
    autoSpawn: kind === 'auto',
  });
  state.grid[r][c] = t;
  rebuildTileList();
  return t;
}

// =============================================================================
// Move logic — slide + merge in a given direction.
// Returns true if anything moved or merged.
// =============================================================================
function attemptMove(dir) {
  if (state.phase !== 'PLAYING') return;
  const now = performance.now();
  if (now - state.lastDropAt < CONFIG.INPUT_DEBOUNCE_MS) return;
  state.lastDropAt = now;

  const moved = performSlide(dir);
  if (!moved) {
    // No-op: don't start the clock or spend a move, but if the board was
    // already full (auto-spawn filled it before the swipe), end the run.
    if (isBoardFull()) onBoardLocked();
    return;
  }

  if (!state.timerStarted) {
    state.timerStarted = true;
    state.startTime = performance.now();
    state.pausedDuration = 0;
  }

  state.moves += 1;
  spawnRandomTile('move');
  playMove();
  updateHud();

  if (isBoardFull()) onBoardLocked();
}

// dir: 'left' | 'right' | 'up' | 'down'
// Returns true if board changed.
function performSlide(dir) {
  const N = CONFIG.GRID_SIZE;
  let changed = false;
  let scoreGained = 0;

  // Reset per-turn animation state on every live tile. Dying tiles from the
  // previous move are dropped by rebuildTileList once their slide finishes;
  // if we're moving again before that, just snap them away.
  state.tiles = state.tiles.filter(t => !t.dying);
  for (const t of state.tiles) {
    t.prevRow = t.row;
    t.prevCol = t.col;
    t.animT = 1;
    t.punchT = 1;
    t.merged = false;
    t.spawn = false;
    t.autoSpawn = false;
  }

  // Walk each line in the movement direction, producing an ordered list of
  // surviving tiles plus a map of survivor → absorbed partner.
  const plans = [];
  let largestMergedValue = 0;
  for (let li = 0; li < N; li++) {
    let lineTiles;
    if (dir === 'left')       lineTiles = [0, 1, 2, 3].map(c => state.grid[li][c]).filter(Boolean);
    else if (dir === 'right') lineTiles = [3, 2, 1, 0].map(c => state.grid[li][c]).filter(Boolean);
    else if (dir === 'up')    lineTiles = [0, 1, 2, 3].map(r => state.grid[r][li]).filter(Boolean);
    else                      lineTiles = [3, 2, 1, 0].map(r => state.grid[r][li]).filter(Boolean);

    const survivors = [];
    const absorbed = new Map();
    let i = 0;
    while (i < lineTiles.length) {
      const a = lineTiles[i];
      const b = lineTiles[i + 1];
      if (b && a.value === b.value) {
        const newValue = a.value * 2;
        const mergePoints = Math.log2(newValue) + 1;  // 4→3, 8→4, …, 2048→12
        a.value = newValue;
        a.merged = true;
        a.punchT = 0;
        a._floatPending = mergePoints;
        scoreGained += mergePoints;
        state.merges += 1;
        if (newValue > state.highestTile) state.highestTile = newValue;
        if (newValue > largestMergedValue) largestMergedValue = newValue;
        absorbed.set(a, b);
        survivors.push(a);
        i += 2;
      } else {
        survivors.push(a);
        i += 1;
      }
    }
    plans.push({ index: li, survivors, absorbed });
  }

  // Write survivors back to a fresh grid, animating tiles from their old
  // positions to the new ones. Absorbed tiles slide into the merge cell
  // alongside the survivor, then drop out once their animation completes.
  state.grid = emptyGrid();
  for (const L of plans) {
    for (let k = 0; k < L.survivors.length; k++) {
      const a = L.survivors[k];
      let newRow, newCol;
      if (dir === 'left')       { newRow = L.index; newCol = k; }
      else if (dir === 'right') { newRow = L.index; newCol = N - 1 - k; }
      else if (dir === 'up')    { newCol = L.index; newRow = k; }
      else                      { newCol = L.index; newRow = N - 1 - k; }

      if (a.row !== newRow || a.col !== newCol) changed = true;
      a.row = newRow;
      a.col = newCol;
      a.animT = 0;
      state.grid[newRow][newCol] = a;

      const b = L.absorbed.get(a);
      if (b) {
        // b keeps its prevRow/prevCol from the reset above; new dest = a's cell
        b.row = newRow;
        b.col = newCol;
        b.animT = 0;
        b.dying = true;
        changed = true;
      }

      if (a._floatPending) {
        const rect = cellRect(newRow, newCol);
        state.floaters.push({
          x: rect.x + rect.w / 2,
          y: rect.y + rect.h / 2,
          text: '+' + a._floatPending,
          t: 0,
          color: '#FFE258',
        });
        a._floatPending = 0;
      }
    }
  }

  rebuildTileList();

  if (scoreGained > 0) {
    state.score += scoreGained;
    // Sound tier follows the biggest tile created, not the +1/+2 score
    if (largestMergedValue >= 256) playMergeBig();
    else if (largestMergedValue >= 32) playMergeMid();
    else playMergeSmall();
  }
  return changed;
}

// Game-over trigger: the moment every cell is occupied, the run ends —
// even if a merge would still be technically possible. Stricter than
// standard 2048, by request.
function isBoardFull() {
  for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
    for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
      if (!state.grid[r][c]) return false;
    }
  }
  return true;
}

// =============================================================================
// Auto-spawn — the difficulty knob.
// urgencyFactor: 0 at score <= TAPER_START, 1 at score >= TAPER_FULL.
// Below TAPER_START the interval is Infinity (no auto-spawn).
// =============================================================================
function urgencyFactor() {
  const s = state.score;
  if (s <= CONFIG.TAPER_START_SCORE) return 0;
  if (s >= CONFIG.TAPER_FULL_SCORE) return 1;
  return (s - CONFIG.TAPER_START_SCORE) / (CONFIG.TAPER_FULL_SCORE - CONFIG.TAPER_START_SCORE);
}
function autoSpawnInterval() {
  if (state.score < CONFIG.TAPER_START_SCORE) return Infinity;
  return lerp(
    CONFIG.AUTO_SPAWN_INTERVAL_START_SEC,
    CONFIG.AUTO_SPAWN_INTERVAL_END_SEC,
    urgencyFactor()
  );
}
function lerp(a, b, t) { return a + (b - a) * t; }

function updateAutoSpawn(dt) {
  if (state.phase !== 'PLAYING' || !state.timerStarted) return;
  const interval = autoSpawnInterval();
  if (!isFinite(interval)) {
    state.autoSpawnAccumulator = 0;
    return;
  }
  state.autoSpawnAccumulator += dt;
  if (state.autoSpawnAccumulator >= interval) {
    state.autoSpawnAccumulator = 0;
    const spawned = spawnRandomTile('auto');
    if (spawned) {
      state.autoSpawnPulse = 0.4;
      playAutoSpawn();
    }
    // Whether or not the auto-spawn fit, check fullness afterward.
    if (isBoardFull()) onBoardLocked();
  }
}

// Board-locked ends the run immediately — no continue.
function onBoardLocked() {
  if (state.phase !== 'PLAYING') return;
  endGame(state.timer <= 0 ? 'time' : 'locked');
}

// =============================================================================
// Main update
// =============================================================================
function update(dt) {
  if (state.phase === 'PLAYING' && state.timerStarted) {
    const elapsed = (performance.now() - state.startTime - state.pausedDuration) / 1000;
    state.timer = Math.max(0, CONFIG.GAME_DURATION_SEC - elapsed);
    const secondsLeft = Math.ceil(state.timer);
    const tickPoints = [10, 5, 4, 3, 2, 1];
    if (tickPoints.indexOf(secondsLeft) !== -1 && state.lastTickPlayed !== secondsLeft) {
      playTick();
      state.lastTickPlayed = secondsLeft;
    }
    if (state.timer <= 0) { state.timer = 0; endGame('time'); return; }
  }

  updateAutoSpawn(dt);

  // Belt-and-braces: if any path ever fills the board without firing the
  // check above, this catches it on the next frame.
  if (state.phase === 'PLAYING' && state.timerStarted && isBoardFull()) {
    onBoardLocked();
  }

  // Animate tile slides + merge punches
  for (const t of state.tiles) {
    if (t.animT < 1) t.animT = Math.min(1, t.animT + dt / CONFIG.SLIDE_DURATION_SEC);
    if (t.punchT < 1) t.punchT = Math.min(1, t.punchT + dt / CONFIG.MERGE_PUNCH_SEC);
  }
  // Drop absorbed tiles once they've finished sliding into the merge cell
  for (let i = state.tiles.length - 1; i >= 0; i--) {
    const t = state.tiles[i];
    if (t.dying && t.animT >= 1) state.tiles.splice(i, 1);
  }

  // Floaters
  for (let i = state.floaters.length - 1; i >= 0; i--) {
    const f = state.floaters[i];
    f.t += dt;
    f.y -= dt * 36;
    if (f.t > 0.7) state.floaters.splice(i, 1);
  }

  if (state.autoSpawnPulse > 0) state.autoSpawnPulse = Math.max(0, state.autoSpawnPulse - dt);

  updateHud();
}

function formatTime(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function updateHud() {
  dom.scoreVal.textContent = String(state.score);
  dom.timerVal.textContent = formatTime(state.timer);

  // Score pill — taper pressure tiers (recolor the value, leave chrome calm)
  dom.scoreVal.classList.toggle('warn',   state.score >= CONFIG.TAPER_START_SCORE && state.score < CONFIG.TAPER_FULL_SCORE);
  dom.scoreVal.classList.toggle('danger', state.score >= CONFIG.TAPER_FULL_SCORE);

  // Time pill — pulse the value only in the final 10s (DESIGN.md §5.12)
  dom.timerVal.classList.toggle('pulse-urgent', state.phase === 'PLAYING' && state.timer <= 10);

  // Urgency bar — fills toward next auto-spawn
  const interval = autoSpawnInterval();
  if (isFinite(interval) && state.phase === 'PLAYING') {
    dom.urgencyBar.classList.remove('hidden');
    const pct = Math.min(100, (state.autoSpawnAccumulator / interval) * 100);
    dom.urgencyFill.style.width = pct + '%';
  } else {
    dom.urgencyBar.classList.add('hidden');
  }
}

// =============================================================================
// Draw
// =============================================================================
function draw() {
  ctx.clearRect(0, 0, view.w, view.h);
  drawBoard();
  drawTiles();
  drawFloaters();
}

function roundRectPath(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawBoard() {
  // Board frame
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 20;
  ctx.shadowOffsetY = 8;
  ctx.fillStyle = '#0a1f5c';
  roundRectPath(view.boardX, view.boardY, view.boardSize, view.boardSize, view.boardSize * 0.04);
  ctx.fill();
  ctx.restore();

  // Empty cells
  for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
    for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
      const rect = cellRect(r, c);
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      roundRectPath(rect.x, rect.y, rect.w, rect.h, rect.w * 0.08);
      ctx.fill();
    }
  }

  // Auto-spawn pulse — red glow around the whole board for ~0.4s
  if (state.autoSpawnPulse > 0) {
    ctx.save();
    const a = state.autoSpawnPulse / 0.4;
    ctx.globalAlpha = a * 0.7;
    ctx.strokeStyle = '#AF1726';
    ctx.lineWidth = 6;
    roundRectPath(view.boardX - 3, view.boardY - 3, view.boardSize + 6, view.boardSize + 6, view.boardSize * 0.045);
    ctx.stroke();
    ctx.restore();
  }
}

function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }
function easeOutBack(t) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function drawTiles() {
  // Render dying tiles first so the absorbing survivor draws on top of them
  // when they share a cell during the merge slide.
  const dying = [], live = [];
  for (const t of state.tiles) (t.dying ? dying : live).push(t);
  for (const t of dying) drawOneTile(t);
  for (const t of live) drawOneTile(t);
}

function drawOneTile(t) {
  const fromRect = cellRect(t.prevRow, t.prevCol);
  const toRect = cellRect(t.row, t.col);
  const e = easeOutQuad(t.animT);
  const x = lerp(fromRect.x, toRect.x, e);
  const y = lerp(fromRect.y, toRect.y, e);
  let scale = 1;
  if (t.spawn) scale = easeOutBack(t.animT);
  if (t.punchT < 1) {
    const p = t.punchT;
    const punch = p < 0.5 ? 1 + 0.18 * (p / 0.5) : 1 + 0.18 * (1 - (p - 0.5) / 0.5);
    scale *= punch;
  }
  drawTile(x, y, t.value, scale, t.autoSpawn && t.animT < 1);
}

function drawTile(x, y, value, scale, glow) {
  const s = tileStyle(value);
  const cs = view.cellSize;
  const cx = x + cs / 2, cy = y + cs / 2;
  const r = cs * 0.10;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  ctx.translate(-cs / 2, -cs / 2);

  // Drop shadow plate (JDP "stacked drop" style)
  ctx.fillStyle = s.shadow;
  roundRectPath(0, 3, cs, cs, r);
  ctx.fill();

  // Tile body
  ctx.fillStyle = s.bg;
  roundRectPath(0, 0, cs, cs, r);
  ctx.fill();

  // 2048-tier glow
  if (value >= 2048 || glow) {
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.strokeStyle = '#FFE258';
    ctx.lineWidth = 3;
    roundRectPath(2, 2, cs - 4, cs - 4, r - 2);
    ctx.stroke();
    ctx.restore();
  }

  // Value text — size scales down for longer numbers
  ctx.fillStyle = s.text;
  let fontSize = cs * 0.45;
  const digits = String(value).length;
  if (digits === 3) fontSize = cs * 0.38;
  else if (digits === 4) fontSize = cs * 0.30;
  else if (digits >= 5) fontSize = cs * 0.24;
  ctx.font = '700 ' + Math.round(fontSize) + "px Poppins, sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(value), cs / 2, cs / 2 + cs * 0.02);
  ctx.restore();
}

function drawFloaters() {
  for (const f of state.floaters) {
    const alpha = 1 - (f.t / 0.7);
    ctx.save();
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.fillStyle = f.color;
    ctx.font = '700 22px Poppins, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 2;
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  }
}

// =============================================================================
// Audio — Web Audio API synthesis, no asset files needed
// =============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(opts) {
  if (state.muted) return;
  ensureAudio();
  if (!audioCtx) return;
  const t = audioCtx.currentTime + (opts.delay || 0);
  const dur = opts.dur || 0.15;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = opts.type || 'sine';
  osc.frequency.setValueAtTime(opts.freq, t);
  if (opts.freqEnd !== undefined) {
    osc.frequency.exponentialRampToValueAtTime(Math.max(20, opts.freqEnd), t + dur);
  }
  g.gain.setValueAtTime(opts.gain || 0.15, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + dur + 0.05);
}
function playMove()       { playTone({ freq: 280, freqEnd: 200, type: 'triangle', dur: 0.08, gain: 0.12 }); }
function playMergeSmall() { playTone({ freq: 520, type: 'triangle', dur: 0.12, gain: 0.14 }); }
function playMergeMid()   {
  playTone({ freq: 660, type: 'triangle', dur: 0.14, gain: 0.16 });
  playTone({ freq: 990, type: 'triangle', dur: 0.14, gain: 0.10, delay: 0.04 });
}
function playMergeBig()   {
  playTone({ freq: 780, type: 'triangle', dur: 0.18, gain: 0.18 });
  playTone({ freq: 1170, type: 'triangle', dur: 0.20, gain: 0.14, delay: 0.05 });
  playTone({ freq: 1560, type: 'triangle', dur: 0.22, gain: 0.10, delay: 0.10 });
}
function playAutoSpawn()  { playTone({ freq: 180, freqEnd: 110, type: 'sawtooth', dur: 0.16, gain: 0.14 }); }
function playGameOver()   { playTone({ freq: 220, freqEnd: 60, type: 'sawtooth', dur: 0.5, gain: 0.22 }); }
function playTick()       { playTone({ freq: 1200, type: 'sine', dur: 0.07, gain: 0.12 }); }

// =============================================================================
// Game lifecycle
// =============================================================================
function startGame() {
  claimLocked = false;
  claimUnavailable = false;
  claimErrorMessage = '';
  claimUrlReady = null;
  claimPreparing = false;
  claimPrepareSeq++;
  state.phase = 'PLAYING';
  state.grid = emptyGrid();
  state.tiles = [];
  state.floaters = [];
  state.score = isFinite(devScore) ? devScore : 0;
  state.highestTile = 0;
  state.moves = 0;
  state.merges = 0;
  state.timer = isFinite(devTime) ? devTime : CONFIG.GAME_DURATION_SEC;
  state.timerStarted = false;
  state.startTime = 0;
  state.pausedDuration = 0;
  state.paused = false;
  state.lastDropAt = 0;
  state.lastTickPlayed = 999;
  state.autoSpawnAccumulator = 0;
  state.autoSpawnPulse = 0;

  // Two starting tiles, per standard 2048
  spawnRandomTile('move');
  spawnRandomTile('move');

  dom.menu.classList.add('hidden');
  dom.gameOver.classList.add('hidden');
  dom.hud.classList.remove('hidden');
  dom.timerVal.classList.remove('pulse-urgent');
  dom.scoreVal.classList.remove('warn', 'danger');

  if (devPhase === 'gameover') {
    // Force into game-over state for dev testing
    state.timerStarted = true;
    state.startTime = performance.now() - CONFIG.GAME_DURATION_SEC * 1000;
    state.timer = 0;
    endGame('time');
    return;
  }
  updateHud();
}

function endGame(reason) {
  if (state.phase === 'GAME_OVER') return;
  state.phase = 'GAME_OVER';

  const isNewBest = state.score > state.best;
  if (isNewBest) {
    state.best = state.score;
    storageSet(CONFIG.STORAGE_KEY_BEST, String(state.best));
  }

  dom.goTitle.textContent = reason === 'locked' ? COPY.gameOver : COPY.timeUp;
  dom.goNewBest.classList.toggle('hidden', !isNewBest);

  dom.finalStats.innerHTML =
    '<div class="label">' + COPY.statScore + '</div><div class="value">' + state.score + '</div>' +
    '<div class="label">' + COPY.statHighestTile + '</div><div class="value">' + (state.highestTile || '—') + '</div>' +
    '<div class="label">' + COPY.statMoves + '</div><div class="value">' + state.moves + '</div>' +
    '<div class="label">' + COPY.statMerges + '</div><div class="value">' + state.merges + '</div>' +
    '<div class="label">' + COPY.statBest + '</div><div class="value">' + state.best + '</div>';
  syncClaimButton();
  prepareClaimUrl();

  playGameOver();
  setTimeout(() => {
    dom.hud.classList.add('hidden');
    dom.gameOver.classList.remove('hidden');
  }, 350);
}

function showBest() {
  if (state.best > 0) dom.bestText.innerHTML = COPY.bestPrefix + ': <b>' + state.best + '</b>';
  else dom.bestText.innerHTML = '&nbsp;';
}

// =============================================================================
// Input — keyboard + swipe
// =============================================================================
window.addEventListener('keydown', (e) => {
  if (state.phase !== 'PLAYING') return;
  let dir = null;
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') dir = 'left';
  else if (e.code === 'ArrowRight' || e.code === 'KeyD') dir = 'right';
  else if (e.code === 'ArrowUp' || e.code === 'KeyW') dir = 'up';
  else if (e.code === 'ArrowDown' || e.code === 'KeyS') dir = 'down';
  if (dir) {
    e.preventDefault();
    attemptMove(dir);
  }
});

let touchStart = null;
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length !== 1) { touchStart = null; return; }
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY };
}, { passive: true });
canvas.addEventListener('touchmove', (e) => {
  // Prevent scroll while interacting with the board
  if (touchStart) e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', (e) => {
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  touchStart = null;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (adx < CONFIG.SWIPE_THRESHOLD_PX && ady < CONFIG.SWIPE_THRESHOLD_PX) return;
  if (adx > ady) attemptMove(dx > 0 ? 'right' : 'left');
  else attemptMove(dy > 0 ? 'down' : 'up');
}, { passive: true });

// Mouse drag — desktop fallback so users without arrow keys can play
let mouseStart = null;
canvas.addEventListener('mousedown', (e) => {
  mouseStart = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('mouseup', (e) => {
  if (!mouseStart) return;
  const dx = e.clientX - mouseStart.x;
  const dy = e.clientY - mouseStart.y;
  mouseStart = null;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (adx < CONFIG.SWIPE_THRESHOLD_PX && ady < CONFIG.SWIPE_THRESHOLD_PX) return;
  if (adx > ady) attemptMove(dx > 0 ? 'right' : 'left');
  else attemptMove(dy > 0 ? 'down' : 'up');
});

// CLAIM SCORE - supports both default callback flow (section 6.5) and Genet encrypted flow (section 6.6).
let claimLocked = false;
let claimUnavailable = false;
let claimErrorMessage = '';
let claimUrlReady = null;
let claimPrepareSeq = 0;
let claimPreparing = false;
let claimNavRecoveryTimer = 0;
const claimContext = window.ClaimCallback.getClaimContext();
window.ClaimCallback.applyPageTitleToHeading(claimContext.pageTitle, 'menuTitle');

function hasClaimCallback() {
  return !!window.ClaimCallback.resolveCallbackUrl(claimContext, CONFIG.CLAIM_FALLBACK_URL);
}

function getClaimErrorMessage(error) {
  const detail = error && typeof error.message === 'string' ? error.message.trim() : '';
  return detail ? `${COPY.claimFailed}: ${detail}` : COPY.claimFailed;
}

function setClaimDisabled(disabled) {
  dom.claimBtn.setAttribute('aria-disabled', disabled ? 'true' : 'false');
}

function setClaimHref(url) {
  dom.claimBtn.setAttribute('href', url || '#');
}

function clearClaimNavRecoveryTimer() {
  if (!claimNavRecoveryTimer) return;
  clearTimeout(claimNavRecoveryTimer);
  claimNavRecoveryTimer = 0;
}

function unlockClaimAfterFailedNavigation() {
  clearClaimNavRecoveryTimer();
  if (!claimLocked || document.hidden) return;
  claimLocked = false;
  showClaimNote(COPY.claimRetryHint);
  syncClaimButton();
}

function armClaimNavRecovery() {
  clearClaimNavRecoveryTimer();
  claimNavRecoveryTimer = setTimeout(() => {
    claimNavRecoveryTimer = 0;
    unlockClaimAfterFailedNavigation();
  }, 3000);
}

function syncClaimButton() {
  if (isZeroScore()) {
    clearClaimNavRecoveryTimer();
    dom.claimNote.classList.add('hidden');
    setClaimDisabled(false);
    setClaimHref(null);
    dom.claimBtn.textContent = COPY.retry;
    return;
  }

  if (claimPreparing) {
    clearClaimNavRecoveryTimer();
    dom.claimNote.textContent = COPY.claimPreparing;
    dom.claimNote.classList.remove('hidden');
    setClaimDisabled(true);
    setClaimHref(null);
    dom.claimBtn.textContent = COPY.claim;
    return;
  }

  const noteText = claimErrorMessage || (claimUnavailable ? COPY.claimUnavailable : '');
  if (noteText) {
    clearClaimNavRecoveryTimer();
    dom.claimNote.textContent = noteText;
    dom.claimNote.classList.remove('hidden');
    setClaimDisabled(true);
    setClaimHref(null);
    dom.claimBtn.textContent = COPY.claim;
    return;
  }

  dom.claimNote.classList.add('hidden');
  setClaimDisabled(claimLocked);
  setClaimHref(claimLocked ? null : claimUrlReady);
  dom.claimBtn.textContent = COPY.claim;
}

function showClaimNote(message) {
  const text = String(message || '').trim();
  if (!text) {
    dom.claimNote.classList.remove('pending');
    dom.claimNote.classList.add('hidden');
    return;
  }
  dom.claimNote.classList.remove('pending');
  dom.claimNote.textContent = text;
  dom.claimNote.classList.remove('hidden');
}

function showClaimPendingNote(message) {
  const text = String(message || '').trim();
  if (!text) {
    dom.claimNote.classList.remove('pending');
    dom.claimNote.classList.add('hidden');
    return;
  }
  dom.claimNote.textContent = text;
  dom.claimNote.classList.add('pending');
  dom.claimNote.classList.remove('hidden');
}

function withTimeout(promise, ms) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error('timed out')), ms);
    promise.then(
      (value) => { clearTimeout(timer); resolve(value); },
      (error) => { clearTimeout(timer); reject(error); }
    );
  });
}

async function buildClaimUrl() {
  return window.ClaimCallback.buildClaimUrl({
    claimContext,
    score: Math.max(0, state.score | 0),
    gameName: CONFIG.GAME_NAME,
    fallbackUrl: CONFIG.CLAIM_FALLBACK_URL,
  });
}

async function prepareClaimUrl(retry) {
  claimUrlReady = null;

  if (isZeroScore()) {
    claimPreparing = false;
    return;
  }
  if (!hasClaimCallback()) {
    claimPreparing = false;
    claimUnavailable = true;
    claimErrorMessage = '';
    syncClaimButton();
    return;
  }

  const seq = ++claimPrepareSeq;
  claimPreparing = true;
  claimUnavailable = false;
  claimErrorMessage = '';
  syncClaimButton();

  try {
    const claimUrl = await withTimeout(buildClaimUrl(), CONFIG.CLAIM_PREPARE_TIMEOUT_MS);
    if (seq !== claimPrepareSeq) return;
    if (!claimUrl) {
      console.warn('[2048] claim prepare unavailable: invalid or missing callback context');
      if (!retry) { setTimeout(() => prepareClaimUrl(true), CONFIG.CLAIM_PREPARE_RETRY_DELAY_MS); return; }
      claimPreparing = false;
      claimUnavailable = true;
      syncClaimButton();
      return;
    }
    claimUrlReady = claimUrl;
    claimPreparing = false;
    syncClaimButton();
  } catch (e) {
    if (seq !== claimPrepareSeq) return;
    console.warn('[2048] claim prepare failed:', e);
    if (!retry) { setTimeout(() => prepareClaimUrl(true), CONFIG.CLAIM_PREPARE_RETRY_DELAY_MS); return; }
    claimPreparing = false;
    claimUnavailable = true;
    claimErrorMessage = getClaimErrorMessage(e);
    syncClaimButton();
  }
}

// Buttons
dom.startBtn.addEventListener('click', () => { ensureAudio(); showBest(); startGame(); });

dom.claimBtn.addEventListener('click', (e) => {
  if (dom.claimBtn.getAttribute('aria-disabled') === 'true') { e.preventDefault(); return; }

  if (isZeroScore()) {
    e.preventDefault();
    claimLocked = false;
    claimUnavailable = false;
    claimErrorMessage = '';
    startGame();
    return;
  }

  if (claimLocked) { e.preventDefault(); return; }

  const href = dom.claimBtn.getAttribute('href');
  if (claimUrlReady && href === claimUrlReady) {
    claimLocked = true;
    setClaimDisabled(true);
    showClaimPendingNote(COPY.claimOpening);
    armClaimNavRecovery();
    return;
  }

  // Not ready yet — shouldn't normally be reachable since the button stays disabled
  // while unprepared, but guard defensively.
  e.preventDefault();
  claimLocked = true;
  syncClaimButton();
  prepareClaimUrl().then(() => {
    claimLocked = false;
    syncClaimButton();
  });
});
dom.muteBtn.addEventListener('click', () => {
  state.muted = !state.muted;
  storageSet(CONFIG.STORAGE_KEY_MUTE, state.muted ? '1' : '0');
  updateMuteUI();
});

// Audio toggle — DESIGN.md §5.11. Icon paths canonical across all JDP games.
const MUTE_ICON_ON  = '<path d="M3 9v6h4l5 4V5L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zm-2.5-9v2.1a7 7 0 0 1 0 13.8V21a9 9 0 0 0 0-18z"/>';
const MUTE_ICON_OFF = '<path d="M3 9v6h4l5 4V5L7 9H3zm16.6 3 2.5-2.5-1.4-1.4L18.2 10.6 15.7 8.1l-1.4 1.4L16.8 12l-2.5 2.5 1.4 1.4 2.5-2.5 2.5 2.5 1.4-1.4z"/>';

function updateMuteUI() {
  const svg = dom.muteBtn.querySelector('svg');
  svg.innerHTML = state.muted ? MUTE_ICON_OFF : MUTE_ICON_ON;
  const label = state.muted ? COPY.audioOff : COPY.audioOn;
  dom.muteBtn.setAttribute('aria-pressed', state.muted ? 'true' : 'false');
  dom.muteBtn.setAttribute('aria-label', label);
  dom.muteBtn.setAttribute('title', label);
}

// =============================================================================
// Pause on tab hide — preserve the wall-clock timer accurately on resume
// =============================================================================
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearClaimNavRecoveryTimer();
    if (state.phase === 'PLAYING' && !state.paused) {
      state.paused = true;
      state.pausedAt = performance.now();
    }
  } else {
    unlockClaimAfterFailedNavigation();
    if (state.paused && state.phase === 'PLAYING') {
      state.pausedDuration += performance.now() - state.pausedAt;
      state.paused = false;
      lastT = 0;
    }
  }
});

// =============================================================================
// Main loop
// =============================================================================
let lastT = 0;
function loop(t) {
  if (!lastT) lastT = t;
  const dt = Math.min((t - lastT) / 1000, 1 / 30);
  lastT = t;
  if (!state.paused) update(dt);
  draw();
  requestAnimationFrame(loop);
}

// =============================================================================
// Boot
// =============================================================================
showBest();
updateMuteUI();
requestAnimationFrame(loop);

</script>
</body>

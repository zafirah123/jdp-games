<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#020d26">
<title>Ball Rush — JDP Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #020d26;
    color: #fff;
    font-family: 'Poppins', -apple-system, 'Segoe UI', Roboto, sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  canvas#game { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
  .hidden { display: none !important; }

  /* Top HUD bar — DESIGN.md §5.12 */
  .hud-bar {
    position: fixed; left: 0; right: 0; top: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: max(8px, env(safe-area-inset-top)) 8px 0;
    z-index: 10; pointer-events: none;
  }
  .hud-row {
    width: 100%; max-width: 30rem;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    pointer-events: auto;
  }
  .jdp-pill {
    flex: 1; display: flex; align-items: stretch;
    background: #fff; border: 2px solid #FFB603; border-radius: 30px;
    overflow: hidden; height: 40px; box-shadow: 0 2px 0 rgba(0,0,0,0.25);
  }
  .jdp-pill .pill-label {
    background: #9E131F; color: #FFD633; font-weight: 700; font-size: 10px;
    letter-spacing: 0.04em; text-transform: uppercase;
    display: flex; align-items: center; padding: 0 10px;
  }
  .jdp-pill .pill-value {
    flex: 1; background: #133B9F; color: #fff; font-weight: 800; font-size: 16px;
    display: flex; align-items: center; justify-content: center; padding: 0 6px;
  }
  .jdp-pill .pill-value.font-mono { font-family: 'Roboto Mono', monospace; font-size: 15px; }
  .jdp-pill.urgent .pill-value { background: #AF1726; animation: pulse 0.5s ease-in-out infinite alternate; }
  .end-btn {
    flex-shrink: 0; height: 40px; padding: 0 12px;
    border-radius: 30px; border: 2px solid #FFB603; background: #133B9F;
    color: #FFD633; font-family: inherit; font-weight: 700; font-size: 11px;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    transition: transform 80ms ease;
  }
  .end-btn:active { transform: scale(0.92); }
  .mute {
    flex-shrink: 0; width: 44px; height: 44px; border-radius: 22px;
    border: 2px solid #FFB603; background: #9E131F; color: #FFD633;
    display: flex; align-items: center; justify-content: center; padding: 0; cursor: pointer;
    transition: transform 80ms ease;
  }
  .mute:active { transform: scale(0.92); }
  .mute svg { width: 22px; height: 22px; fill: currentColor; }

  /* Sequence strip — fixed near the bottom, in easy view while steering */
  .seq-bar {
    position: fixed; left: 0; right: 0;
    bottom: max(14px, calc(env(safe-area-inset-bottom) + 10px));
    display: flex; justify-content: center; z-index: 10; pointer-events: none; padding: 0 8px;
  }
  .seq-wrap {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center;
    pointer-events: none;
    background: rgba(2,13,38,0.6); border-radius: 18px; padding: 8px 12px;
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  }
  .seq-cell {
    min-width: 40px; height: 40px; padding: 0 8px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 12px; font-family: 'Roboto Mono', monospace; font-weight: 700;
    font-size: 18px; border: 2px solid rgba(255,214,51,0.35);
    background: rgba(2,13,38,0.55); color: rgba(255,255,255,0.5);
  }
  .seq-cell.seed { color: #FFD633; border-color: rgba(255,214,51,0.6); }
  .seq-cell.done { color: #7CFFB0; border-color: #7CFFB0; background: rgba(124,255,176,0.12); }
  .seq-cell.curr { color: #fff; border-color: #FFB603; box-shadow: 0 0 0 3px rgba(255,184,3,0.25); animation: pulse 0.7s ease-in-out infinite alternate; }
  .lv-badge {
    margin-left: 4px; background: #AF1726; border: 2px solid #FFD633; border-radius: 999px;
    padding: 4px 12px; font-size: 12px; font-weight: 700; color: #FFD633; letter-spacing: 1px;
  }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.07); } }

  /* Power-up toast */
  .toast {
    position: fixed; left: 50%; top: 28%; transform: translateX(-50%);
    z-index: 12; pointer-events: none;
    background: rgba(2,13,38,0.85); border: 2px solid #FFD633; border-radius: 999px;
    padding: 8px 18px; font-weight: 800; font-size: 16px; color: #FFD633;
    letter-spacing: 0.5px; opacity: 0; transition: opacity 0.2s, transform 0.2s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  /* Bottom control hints */
  .chev {
    position: fixed; bottom: max(74px, calc(env(safe-area-inset-bottom) + 70px)); z-index: 9;
    font-size: 30px; color: rgba(255,214,51,0.45); pointer-events: none; font-weight: 800;
  }
  .chev.l { left: 22px; } .chev.r { right: 22px; }

  /* Overlays */
  .overlay {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(2, 13, 38, 0.82); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    z-index: 20; padding: 16px;
  }
  .card {
    background: linear-gradient(180deg, #020d26 0%, #051335 100%);
    border: 3px solid #FFD633; border-radius: 24px; padding: 30px 26px;
    max-width: 400px; width: 100%; text-align: center; box-shadow: 0 12px 0 rgba(0,0,0,0.4);
  }
  .card h1 { font-size: 40px; margin: 0 0 6px; font-weight: 700; color: #FFD633; letter-spacing: 1px; text-shadow: 0 4px 0 #AF1726; }
  .card h2 { font-size: 26px; margin: 0 0 14px; color: #FFD633; font-weight: 700; }
  .card .sub { font-size: 14px; color: #fff; margin: 0 0 16px; opacity: 0.9; line-height: 1.5; }
  .card .best { font-size: 14px; color: #FFD633; margin: 0 0 18px; font-weight: 600; min-height: 20px; }
  .card .hint { font-size: 12px; color: rgba(255,255,255,0.6); margin: 14px 0 0; }
  .card .hint kbd {
    background: rgba(255,214,51,0.15); border: 1px solid rgba(255,214,51,0.3);
    padding: 2px 6px; border-radius: 4px; color: #FFD633; font-family: inherit; font-size: 11px;
  }
  .card .hint kbd.arrow { display: inline-block; line-height: 1; }
  .card .hint kbd.arrow.flip { transform: scaleX(-1); }
  .cta {
    background: linear-gradient(180deg, #FFE258 0%, #FFBA0A 100%);
    border: 3px solid #FFB603; border-radius: 999px; padding: 14px 36px;
    font-family: inherit; font-size: 18px; font-weight: 700; color: #031034; cursor: pointer;
    letter-spacing: 0.5px; box-shadow: 0 4px 0 #DE9D00; transition: transform 0.08s, box-shadow 0.08s;
    text-transform: uppercase;
  }
  .cta:active { transform: translateY(2px); box-shadow: 0 2px 0 #DE9D00; }
  .cta:disabled {
    background: linear-gradient(180deg, #A1934D 0%, #A1812B 100%);
    border-color: #A18D3C;
    color: #7C2830;
    box-shadow: 0 4px 0 #917122;
    cursor: default;
    transform: none;
  }
  .cta.ghost {
    background: transparent; color: #FFD633; border-color: #FFB603; box-shadow: none;
    margin-top: 12px; font-size: 14px; padding: 10px 28px;
  }
  .cta.ghost:active { transform: translateY(2px); }
  .stats { display: grid; grid-template-columns: 1fr auto; gap: 6px 16px; margin: 0 0 20px; font-size: 14px; }
  .stats .label { color: rgba(255,255,255,0.7); text-align: left; }
  .stats .value { color: #FFD633; font-weight: 700; text-align: right; }
  .new-best {
    display: inline-block; background: #FFD633; color: #031034; border-radius: 999px;
    padding: 6px 14px; font-weight: 700; font-size: 14px; letter-spacing: 1px; margin: 0 0 12px;
    animation: pulse 0.5s ease-in-out infinite alternate;
  }
  .count { font-size: 48px; font-weight: 800; color: #FFD633; margin: 6px 0 14px; font-family: 'Roboto Mono', monospace; }
  .cont-info { display: flex; gap: 8px; justify-content: center; margin: 0 0 12px; flex-wrap: wrap; }
  .cont-info span {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 700; color: #fff;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);
    border-radius: 999px; padding: 5px 12px;
  }
  .cont-info .cont-tier { color: #FFD633; }
  .cont-info .cont-clock { font-family: 'Roboto Mono', monospace; }
  @media (max-width: 420px) { .card h1 { font-size: 34px; } .seq-cell { min-width: 34px; height: 34px; font-size: 15px; } }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" class="hud-bar hidden">
  <div class="hud-row">
    <button id="endBtn" class="end-btn">End</button>
    <div class="jdp-pill"><span class="pill-label">Score</span><span class="pill-value" id="scoreVal">0</span></div>
    <div class="jdp-pill" id="timePill"><span class="pill-label">Time</span><span class="pill-value font-mono" id="timeVal">3:00</span></div>
    <button id="muteBtn" class="mute" aria-label="AUDIO ON" aria-pressed="false"><svg viewBox="0 0 24 24"></svg></button>
  </div>
</div>

<div class="chev l hidden" id="chevL">‹</div>
<div class="chev r hidden" id="chevR">›</div>
<div class="seq-bar hidden" id="seqBar"><div class="seq-wrap" id="seqWrap"></div></div>
<div class="toast" id="toast"></div>

<div id="menu" class="overlay">
  <div class="card">
    <h1 id="menuTitle">Ball Rush</h1>
    <p class="sub" id="menuSub"></p>
    <p class="best" id="bestText">&nbsp;</p>
    <button id="startBtn" class="cta"></button>
    <p class="hint" id="menuHint"></p>
  </div>
</div>

<div id="continue" class="overlay hidden">
  <div class="card">
    <h2 id="contTitle"></h2>
    <p class="sub" id="contSub"></p>
    <div class="cont-info">
      <span class="cont-tier" id="contTier"></span>
      <span class="cont-clock" id="contClock"></span>
    </div>
    <div class="count" id="contCount">5</div>
    <button id="contBtn" class="cta"></button>
    <button id="contEndBtn" class="cta ghost"></button>
  </div>
</div>

<div id="gameOver" class="overlay hidden">
  <div class="card">
    <h2 id="goTitle"></h2>
    <div id="goNewBest" class="hidden"><span class="new-best" id="newBestLabel">NEW BEST!</span></div>
    <div id="finalStats" class="stats"></div>
    <button id="claimBtn" class="cta"></button>
  </div>
</div>

<script src="./claim-callback.js?v=20260606.1"></script>
<script>
'use strict';

// =============================================================================
// i18n — ?lang=ms switches copy to Bahasa Melayu, English otherwise.
// =============================================================================
const LANG = new URLSearchParams(location.search).get('lang') === 'ms' ? 'ms' : 'en';
const COPY = {
  en: {
    start: 'START GAME', timeUp: "TIME'S UP!", gameOver: 'GAME OVER',
    audioOn: 'AUDIO ON', audioOff: 'AUDIO OFF', end: 'End',
    menuSub: 'Steer the ball to collect the number that continues the pattern — and dodge the holes!',
    menuHint: 'Hold <kbd class="arrow flip">►</kbd> <kbd class="arrow">►</kbd> or tap the left / right of the screen',
    claim: 'CLAIM SCORE', retry: 'RETRY', newBest: 'NEW BEST!',
    claimUnavailable: 'CALLBACK UNAVAILABLE',
    contTitle: 'CRASHED!', contSub: 'Jump back in — your time is still running.',
    contBtn: 'CONTINUE', slowmo: 'SLOW-MO!', dbl: 'DOUBLE SCORE!', combo: 'COMBO!',
    contTier: 'Tier', contLevel: 'Lv', contTimeLeft: 'Time left',
    statScore: 'Score', statLevel: 'Level reached', statSeq: 'Patterns cleared', statBest: 'Best',
    bestPrefix: 'Best',
  },
  ms: {
    start: 'MULA MAIN', timeUp: 'MASA TAMAT!', gameOver: 'PERMAINAN TAMAT',
    audioOn: 'AUDIO ON', audioOff: 'AUDIO OFF', end: 'Tamat',
    menuSub: 'Kawal bola untuk kutip nombor yang menyambung corak — dan elak lubang!',
    menuHint: 'Tahan <kbd class="arrow flip">►</kbd> <kbd class="arrow">►</kbd> atau ketuk kiri / kanan skrin',
    claim: 'TUNTUT SKOR', retry: 'RETRY', newBest: 'REKOD BAHARU!',
    claimUnavailable: 'PANGGIL BALIK TIADA',
    contTitle: 'TERLANGGAR!', contSub: 'Sambung semula — masa anda masih berjalan.',
    contBtn: 'SAMBUNG', slowmo: 'PERLAHAN!', dbl: 'SKOR DUA KALI!', combo: 'KOMBO!',
    contTier: 'Tahap', contLevel: 'Lv', contTimeLeft: 'Masa tinggal',
    statScore: 'Skor', statLevel: 'Tahap dicapai', statSeq: 'Corak selesai', statBest: 'Terbaik',
    bestPrefix: 'Terbaik',
  },
}[LANG];

// =============================================================================
// CONFIG — all tunables here
// =============================================================================
const CONFIG = {
  GAME_DURATION_SEC: 180,
  ROT_SPEED: 3.2,            // rad/s peak steering speed
  STEER_RESPONSE: 14,        // per-second easing toward the held direction
  ROLL_RATE: 0.45,           // stripe sweeps per tunnel unit (rolling look)
  ROLL_STRIPES: 4,           // rolling texture stripes on the ball
  HUE_EASE: 3.5,             // per-second easing between sequence hues
  OVERSCAN_RINGS: 5,         // checker rows drawn past the ball plane (fills corners)
  SPEED_START: 1.35,         // tunnel z-units / sec at round start
  SPEED_END: 2.7,            // peak speed at SPEED_PEAK_FRAC of the round
  SPEED_PEAK_FRAC: 0.85,
  Z_SPAWN: 6.6,             // depth features spawn at
  Z_VIEW: 7.0,              // depth of farthest drawn ring
  FEATURE_GAP: 1.7,         // z-distance between consecutive features
  RINGS: 22, SEGMENTS: 24,
  RADIUS_K: 0.42,           // perspective falloff
  BASE_PTS: 5,              // per correct pick = BASE_PTS * level
  COMBO_PTS: 25,            // sequence-clear bonus = COMBO_PTS * level
  CAP: 500,
  CAP_TAPER_START: 420, CAP_TAPER_END: 520,
  NUM_CEIL: 300,            // generated numbers never exceed this
  SLOWMO_SEC: 4, SLOWMO_MUL: 0.5,
  DOUBLE_SEC: 6,
  POWER_CHANCE: 0.10,       // chance a hazard slot becomes a power-up
  HOLE_SENSE: 0.45,         // fraction of the ball's width over the gap that counts as falling in
  CONTINUE_COUNT: 10,
  MUSIC_TEMPO: 72,          // BPM of the lofi backing loop
  MUSIC_VOL: 0.85,          // master gain for the backing loop (SFX are separate)
  PATTERN_THINK_SEC: 2.5,   // spawn-free breather when a new pattern appears
  STORAGE_KEY_BEST: 'ball-rush:best',
  STORAGE_KEY_MUTE: 'ball-rush:mute',
  GAME_NAME: 'ball-rush',
  CLAIM_FALLBACK_URL: null,
  HUES: [212, 268, 330, 158, 28, 192, 96, 240],
};

const TAU = Math.PI * 2;
const SECTOR = TAU / 3;
// tunnel depth where the ball VISUALLY sits: the ball orbits at 0.74 of the
// front-ring radius, which maps to this z on the wall. Holes must resolve here,
// not at z=0, or the crash fires half a second after the ball crossed the gap.
const BALL_Z = (1 / 0.74 - 1) / CONFIG.RADIUS_K;

// =============================================================================
// Math helpers
// =============================================================================
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
function smoothstep(a, b, x) { const t = clamp((x - a) / (b - a), 0, 1); return t * t * (3 - 2 * t); }
function randInt(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function norm(a) { a %= TAU; return a < 0 ? a + TAU : a; }
function lerpAngle(a, b, t) { let d = norm(b - a); if (d > Math.PI) d -= TAU; return norm(a + d * t); }
// overlap length of two arcs on a circle (both lengths < TAU)
function arcOverlap(s1, l1, s2, l2) {
  const d = norm(s2 - s1);
  let o = 0;
  for (const off of [d, d - TAU]) o = Math.max(o, Math.min(l1, off + l2) - Math.max(0, off));
  return Math.max(0, o);
}
function sectorOf(theta, rot) { return Math.floor(norm(theta - rot) / SECTOR) % 3; }
function sectorCenter(rot, i) { return norm(rot + (i + 0.5) * SECTOR); }

// =============================================================================
// DOM refs
// =============================================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const dom = {
  hud: document.getElementById('hud'),
  scoreVal: document.getElementById('scoreVal'),
  timeVal: document.getElementById('timeVal'),
  timePill: document.getElementById('timePill'),
  seqWrap: document.getElementById('seqWrap'),
  muteBtn: document.getElementById('muteBtn'),
  endBtn: document.getElementById('endBtn'),
  seqBar: document.getElementById('seqBar'),
  chevL: document.getElementById('chevL'), chevR: document.getElementById('chevR'),
  toast: document.getElementById('toast'),
  menu: document.getElementById('menu'),
  menuSub: document.getElementById('menuSub'),
  menuHint: document.getElementById('menuHint'),
  startBtn: document.getElementById('startBtn'),
  bestText: document.getElementById('bestText'),
  cont: document.getElementById('continue'),
  contTitle: document.getElementById('contTitle'),
  contSub: document.getElementById('contSub'),
  contCount: document.getElementById('contCount'),
  contTier: document.getElementById('contTier'),
  contClock: document.getElementById('contClock'),
  contBtn: document.getElementById('contBtn'),
  contEndBtn: document.getElementById('contEndBtn'),
  gameOver: document.getElementById('gameOver'),
  goTitle: document.getElementById('goTitle'),
  goNewBest: document.getElementById('goNewBest'),
  newBestLabel: document.getElementById('newBestLabel'),
  finalStats: document.getElementById('finalStats'),
  claimBtn: document.getElementById('claimBtn'),
};
dom.menuSub.textContent = COPY.menuSub;
dom.menuHint.innerHTML = COPY.menuHint;
dom.startBtn.textContent = COPY.start;
dom.endBtn.textContent = COPY.end;
dom.claimBtn.textContent = COPY.claim;
dom.newBestLabel.textContent = COPY.newBest;
dom.contTitle.textContent = COPY.contTitle;
dom.contSub.textContent = COPY.contSub;
dom.contBtn.textContent = COPY.contBtn;
dom.contEndBtn.textContent = COPY.end;

// =============================================================================
// Sandbox-safe storage
// =============================================================================
function storageGet(key, fallback) { try { const v = localStorage.getItem(key); return v === null ? fallback : v; } catch (e) { return fallback; } }
function storageSet(key, value) { try { localStorage.setItem(key, value); } catch (e) {} }

// =============================================================================
// State
// =============================================================================
const qs = new URLSearchParams(location.search);
const START_LEVEL = Math.max(1, parseInt(qs.get('level'), 10) || 1);

const state = {
  phase: 'MENU',            // MENU | PLAYING | CRASHED | CONTINUE | GAME_OVER
  theta: Math.PI / 2,       // ball angle (screen space)
  holdDir: 0,
  angVel: 0,                // eased steering velocity (rad/s)
  rollTilt: 0,              // eased lean of the rolling texture while steering
  ballSquash: 1,
  hue: CONFIG.HUES[0],      // displayed tunnel hue, eased toward currentHue()
  features: [],
  floaters: [],
  sparks: [],
  score: 0,
  level: START_LEVEL,
  seqCleared: 0,
  seq: [], seqStep: 2,
  collectIndex: 2,          // collecting indices 2,3,4 (0,1 are seeded)
  colorIndex: 0,
  elapsed: 0,
  timer: CONFIG.GAME_DURATION_SEC,
  sinceSpawn: CONFIG.FEATURE_GAP,
  scrollDist: 0,
  rollPhase: 0,
  plan: [],
  prevGen: null,
  slowUntil: -1, doubleUntil: -1,
  crashT: 0, shake: 0, redFlash: 0,
  crashTheta0: 0, crashTheta: 0, // fall animation: from steering angle to gap center
  contCountdown: 0,
  muted: storageGet(CONFIG.STORAGE_KEY_MUTE, '0') === '1',
  best: parseInt(storageGet(CONFIG.STORAGE_KEY_BEST, '0'), 10) || 0,
  lastTick: 999,
  paused: false,
};

// =============================================================================
// Viewport
// =============================================================================
const view = { w: 0, h: 0, cx: 0, cy: 0, base: 300 };
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  view.w = window.innerWidth; view.h = window.innerHeight;
  canvas.width = Math.floor(view.w * dpr); canvas.height = Math.floor(view.h * dpr);
  canvas.style.width = view.w + 'px'; canvas.style.height = view.h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // center biased upward so the ball (which rides the bottom of the ring) stays
  // fully visible and clears the bottom sequence strip.
  view.cx = view.w / 2; view.cy = view.h * 0.42;
  // base must keep the gameplay ring (ball orbits at ~0.74·base) inside the
  // smaller viewport dimension, or the ball falls off the bottom on desktop.
  view.base = Math.min(view.w, view.h) * 0.58;
}
window.addEventListener('resize', resize);
resize();

// perspective: ring radius for a given depth z
function radiusAt(z) { return view.base / (1 + Math.max(0, z) * CONFIG.RADIUS_K); }
// raw perspective — valid past the ball plane (z < 0) so the checker grid and
// features can slide off toward the screen edges instead of freezing at the rim.
// Capped so near-singular depths stay drawable.
function radiusRaw(z) {
  const d = 1 + z * CONFIG.RADIUS_K;
  const cap = (view.w + view.h) * 1.6;
  return d < view.base / cap ? cap : Math.min(view.base / d, cap);
}

// =============================================================================
// Sequence generation (procedural — fresh every sequence, never hardcoded)
// =============================================================================
function tierFor(level) { return level <= 2 ? 1 : level <= 4 ? 2 : 3; }

function genSequence(level) {
  const tier = tierFor(level);
  let types, steps, startMax, tables;
  if (tier === 1) { types = ['asc']; steps = [2, 5, 10]; startMax = 20; tables = []; }
  else if (tier === 2) { types = ['asc', 'desc', 'mul']; steps = [3, 4, 25]; startMax = 60; tables = [3, 4]; }
  else { types = ['asc', 'desc', 'mul']; steps = [6, 7, 8, 50]; startMax = 120; tables = [6, 7, 8, 9]; }

  let seq, step, guard = 0;
  do {
    const type = pick(types);
    if (type === 'mul' && tables.length) {
      const n = pick(tables); step = n;
      seq = [1, 2, 3, 4, 5].map(i => n * i);
    } else if (type === 'desc') {
      step = pick(steps);
      // start snapped to a multiple of step so the sequence reads cleanly
      const top = step * (4 + randInt(0, Math.floor(startMax / step)));
      seq = [0, 1, 2, 3, 4].map(i => top - step * i);
    } else {
      step = pick(steps);
      const start = step * randInt(0, Math.floor(startMax / step));
      seq = [0, 1, 2, 3, 4].map(i => start + step * i);
    }
    guard++;
    const ok = seq.every(v => v >= 0 && v <= CONFIG.NUM_CEIL);
    const fresh = !state.prevGen || state.prevGen.first !== seq[0] || state.prevGen.step !== step;
    if (ok && fresh) break;
  } while (guard < 40);

  state.prevGen = { first: seq[0], step };
  return { seq, step };
}

function distractors(target, step) {
  const cands = [target + step, target - step, target + 1, target - 1, target + 2, target - 2, target + step * 2];
  const out = [];
  for (const c of cands) { if (c !== target && c >= 0 && c <= CONFIG.NUM_CEIL && out.indexOf(c) === -1) out.push(c); if (out.length >= 2) break; }
  let k = 3;
  while (out.length < 2) { const c = target + k; if (c !== target && out.indexOf(c) === -1) out.push(c); k++; }
  return out.slice(0, 2);
}

function newSequence(levelUp) {
  if (levelUp) { state.level++; state.seqCleared++; }
  const g = genSequence(state.level);
  state.seq = g.seq; state.seqStep = g.step;
  state.collectIndex = 2;
  state.colorIndex++;
  // breathing room: hold the spawn director back a few seconds so the player
  // can read the new pattern before more numbers and holes arrive. Scaled by
  // current speed so the pause stays constant as the tunnel ramps up.
  state.sinceSpawn = Math.min(state.sinceSpawn, -currentSpeed() * CONFIG.PATTERN_THINK_SEC);
  updateStrip();
}

function currentHue() { return CONFIG.HUES[state.colorIndex % CONFIG.HUES.length]; }

// =============================================================================
// Feature spawning
// =============================================================================
function refillPlan() {
  const holes = state.level <= 2 ? 3 : state.level <= 4 ? 3 : 4;
  for (let i = 0; i < holes; i++) state.plan.push('hole');
  state.plan.push('gate');
}
function spawnGate() {
  const target = state.seq[state.collectIndex];
  const ds = distractors(target, state.seqStep);
  state.features.push({
    type: 'gate', z: CONFIG.Z_SPAWN, prevZ: CONFIG.Z_SPAWN, resolved: false,
    rot: Math.random() * TAU, values: shuffle([target, ds[0], ds[1]]), target,
  });
}
function spawnHole() {
  // hole is a gap snapped to the checker grid: segCount of SEGMENTS columns wide,
  // and depth-snapped to a tile row boundary so it stays flush with the grid as
  // both scroll by exactly the same dz per frame.
  const segCount = state.level <= 2 ? 2 : state.level <= 4 ? 3 : 4;
  const seg0 = randInt(0, CONFIG.SEGMENTS - 1);
  const ringStep = CONFIG.Z_VIEW / CONFIG.RINGS;
  const z = Math.ceil((state.scrollDist + CONFIG.Z_SPAWN) / ringStep) * ringStep - state.scrollDist;
  state.features.push({ type: 'hole', z, prevZ: z, resolved: false, seg0, segCount });
}
function holeArc(f) { return { start: f.seg0 / CONFIG.SEGMENTS * TAU, len: f.segCount / CONFIG.SEGMENTS * TAU }; }
function spawnPower() {
  const allowDouble = state.score < CONFIG.CAP - 70;
  const kind = (!allowDouble || Math.random() < 0.5) ? 'slow' : 'double';
  state.features.push({ type: 'power', kind, z: CONFIG.Z_SPAWN, prevZ: CONFIG.Z_SPAWN, resolved: false, ang: Math.random() * TAU });
}
function spawnNext() {
  if (!state.plan.length) refillPlan();
  const kind = state.plan.shift();
  if (kind === 'gate') spawnGate();
  else if (Math.random() < CONFIG.POWER_CHANCE && state.score < CONFIG.CAP - 30) spawnPower();
  else spawnHole();
}

// =============================================================================
// Scoring
// =============================================================================
function doubleActive() { return state.elapsed < state.doubleUntil; }
function slowActive() { return state.elapsed < state.slowUntil; }
function addScore(raw) {
  let pts = raw * (doubleActive() ? 2 : 1);
  pts = Math.round(pts * (1 - smoothstep(CONFIG.CAP_TAPER_START, CONFIG.CAP_TAPER_END, state.score)));
  if (pts < 0) pts = 0;
  state.score += pts;
  dom.scoreVal.textContent = String(state.score);
  return pts;
}
function ballScreenPos() {
  const r = radiusAt(0) * 0.74;
  return { x: view.cx + Math.cos(state.theta) * r, y: view.cy + Math.sin(state.theta) * r };
}
function floater(text, color) {
  const p = ballScreenPos();
  state.floaters.push({ x: p.x, y: p.y, text, color, t: 0 });
}
function burst(colors, n, speed) {
  const p = ballScreenPos();
  for (let i = 0; i < n; i++) {
    const a = Math.random() * TAU, v = speed * (0.4 + Math.random() * 0.8);
    state.sparks.push({
      x: p.x, y: p.y, vx: Math.cos(a) * v, vy: Math.sin(a) * v - speed * 0.3,
      size: 2 + Math.random() * 2.5, color: pick(colors), t: 0, life: 0.45 + Math.random() * 0.35,
    });
  }
}

// =============================================================================
// Resolve features. Holes are checked continuously while their row is under
// the ball (see update loop); gates/powers resolve when crossing the plane.
// =============================================================================
// true when enough of the ball's width hangs over the gap to fall in
function ballOverHole(f) {
  const a = holeArc(f);
  const halfW = (view.base * 0.075) / (radiusAt(0) * 0.74); // ball's angular half-width
  const overlap = arcOverlap(a.start, a.len, norm(state.theta - halfW), halfW * 2);
  return overlap >= halfW * 2 * CONFIG.HOLE_SENSE;
}
function resolveFeature(f) {
  f.resolved = true;
  if (f.type === 'gate') {
    const val = f.values[sectorOf(state.theta, f.rot)];
    if (val === f.target) onCorrect(); else onWrong();
  } else if (f.type === 'power') {
    let d = Math.abs(norm(state.theta) - norm(f.ang));
    if (d > Math.PI) d = TAU - d;
    if (d < 0.55) activatePower(f.kind);
  }
}
function onCorrect() {
  const pts = addScore(CONFIG.BASE_PTS * state.level);
  floater('+' + pts, '#fdd83d');
  burst(['#fdd83d', '#ffb800', '#fff2a8'], 10, 180);
  state.collectIndex++;
  playGood();
  if (state.collectIndex >= 5) {
    const bonus = addScore(CONFIG.COMBO_PTS * state.level);
    floater(COPY.combo + ' +' + bonus, '#7CFFB0');
    burst(['#7CFFB0', '#fdd83d'], 16, 240);
    playCombo();
    showToast(COPY.combo);
    newSequence(true);
  } else {
    updateStrip();
  }
}
function onWrong() {
  playBad();
  state.redFlash = 0.4;
  newSequence(false);
}
function activatePower(kind) {
  if (kind === 'slow') { state.slowUntil = state.elapsed + CONFIG.SLOWMO_SEC; showToast(COPY.slowmo); }
  else { state.doubleUntil = state.elapsed + CONFIG.DOUBLE_SEC; showToast(COPY.dbl); }
  burst(kind === 'slow' ? ['#46c8ff', '#bfeaff'] : ['#7CFFB0', '#5fe896'], 12, 200);
  playPower();
}

// =============================================================================
// Update
// =============================================================================
function currentSpeed() {
  const t = clamp((state.elapsed / CONFIG.GAME_DURATION_SEC) / CONFIG.SPEED_PEAK_FRAC, 0, 1);
  return lerp(CONFIG.SPEED_START, CONFIG.SPEED_END, t);
}

function update(dt) {
  if (state.shake > 0) state.shake -= dt;
  if (state.redFlash > 0) state.redFlash -= dt;

  // ease the displayed hue toward the current sequence hue (shortest path)
  const hueDiff = ((currentHue() - state.hue + 540) % 360) - 180;
  state.hue += hueDiff * Math.min(1, dt * CONFIG.HUE_EASE);

  // The round clock keeps ticking through the crash + continue prompt —
  // time is a shared budget (§1.2), so pausing here would be a free break.
  if (state.phase === 'CRASHED') {
    state.crashT += dt;
    if (advanceClock(dt)) { endGame('time'); return; }
    if (state.crashT > 0.9) {
      if (state.timer > 0.5) openContinue(); else endGame('crash');
    }
    decayFloaters(dt);
    return;
  }
  if (state.phase === 'CONTINUE') {
    if (advanceClock(dt)) { clearTimeout(contTimer); endGame('time'); return; }
    dom.contClock.textContent = COPY.contTimeLeft + ' ' + fmtClock(state.timer);
    decayFloaters(dt);
    return;
  }
  if (state.phase !== 'PLAYING') { decayFloaters(dt); return; }

  if (advanceClock(dt)) { endGame('time'); return; }

  // steer — eased angular velocity so starts/stops feel smooth, not snapped
  state.angVel += (state.holdDir * CONFIG.ROT_SPEED - state.angVel) * Math.min(1, dt * CONFIG.STEER_RESPONSE);
  state.theta = norm(state.theta + state.angVel * dt);
  const steer = Math.abs(state.angVel) / CONFIG.ROT_SPEED;
  state.ballSquash += ((1 - 0.15 * steer) - state.ballSquash) * Math.min(1, dt * 12);
  state.rollTilt += (Math.atan2(-state.angVel * 0.35, 1.7) - state.rollTilt) * Math.min(1, dt * 8);

  const speed = currentSpeed() * (slowActive() ? CONFIG.SLOWMO_MUL : 1);
  const dz = speed * dt;
  state.scrollDist += dz;
  state.rollPhase += dz * CONFIG.ROLL_RATE;

  // advance + resolve features
  const ringStep = CONFIG.Z_VIEW / CONFIG.RINGS;
  for (let i = state.features.length - 1; i >= 0; i--) {
    const f = state.features[i];
    f.z -= dz;
    if (!f.resolved) {
      if (f.type === 'hole') {
        // checked every frame while the one-row gap is under the ball (at
        // BALL_Z, its visual depth) — steering in or out mid-crossing counts
        if (f.z + ringStep < BALL_Z) f.resolved = true; // slipped past — dodged
        else if (f.z <= BALL_Z && ballOverHole(f)) { f.resolved = true; crash(f); }
      } else if (f.prevZ > 0 && f.z <= 0) resolveFeature(f);
    }
    f.prevZ = f.z;
    if (f.z < -1.0) state.features.splice(i, 1);
  }

  // spawn director
  state.sinceSpawn += dz;
  while (state.sinceSpawn >= CONFIG.FEATURE_GAP) { spawnNext(); state.sinceSpawn -= CONFIG.FEATURE_GAP; }

  decayFloaters(dt);
}

function decayFloaters(dt) {
  for (let i = state.floaters.length - 1; i >= 0; i--) {
    const f = state.floaters[i]; f.t += dt; f.y -= dt * 46;
    if (f.t > 0.85) state.floaters.splice(i, 1);
  }
  for (let i = state.sparks.length - 1; i >= 0; i--) {
    const s = state.sparks[i];
    s.t += dt; s.x += s.vx * dt; s.y += s.vy * dt;
    s.vy += 430 * dt; s.vx *= Math.max(0, 1 - 2.2 * dt);
    if (s.t > s.life) state.sparks.splice(i, 1);
  }
}

function crash(hole) {
  if (state.phase !== 'PLAYING') return;
  state.phase = 'CRASHED';
  state.crashT = 0; state.shake = 0.5; state.redFlash = 0.5;
  // the fall animation slides the ball to the center of the gap it fell into
  state.crashTheta0 = state.theta;
  state.crashTheta = hole ? norm(holeArc(hole).start + holeArc(hole).len / 2) : state.theta;
  burst(['#e23b46', '#ffd2d5', '#8f1119'], 14, 280);        // impact shards
  burst(['#2a3f66', '#51689a', '#8fa3cc'], 10, 150);        // tile dust from the rim
  playCrash();
}

// =============================================================================
// HUD
// =============================================================================
function fmtClock(secs) {
  const s = Math.ceil(secs);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}
// Advance the shared round clock. Returns true when time has run out.
function advanceClock(dt) {
  state.elapsed += dt;
  state.timer = Math.max(0, CONFIG.GAME_DURATION_SEC - state.elapsed);
  const sl = Math.ceil(state.timer);
  if (sl <= 10 && sl >= 1 && state.lastTick !== sl) { playTick(); state.lastTick = sl; }
  updateTimeHud();
  return state.timer <= 0;
}
function updateTimeHud() {
  dom.timeVal.textContent = fmtClock(state.timer);
  dom.timePill.classList.toggle('urgent', state.timer <= 10);
}
function updateStrip() {
  let html = '';
  for (let i = 0; i < 5; i++) {
    let cls = 'seq-cell', txt = '_';
    if (i < 2) { cls += ' seed'; txt = state.seq[i]; }
    else if (i < state.collectIndex) { cls += ' done'; txt = state.seq[i]; }
    else if (i === state.collectIndex) { cls += ' curr'; txt = '?'; }
    html += `<span class="${cls}">${txt}</span>`;
  }
  html += `<span class="lv-badge">Lv ${state.level}</span>`;
  dom.seqWrap.innerHTML = html;
}
let toastTimer = 0;
function showToast(text) {
  dom.toast.textContent = text; dom.toast.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => dom.toast.classList.remove('show'), 1100);
}

// =============================================================================
// Draw
// =============================================================================
function draw() {
  const sx = state.shake > 0 ? (Math.random() - 0.5) * state.shake * 22 : 0;
  const sy = state.shake > 0 ? (Math.random() - 0.5) * state.shake * 22 : 0;
  ctx.clearRect(0, 0, view.w, view.h);
  ctx.save();
  ctx.translate(view.cx + sx, view.cy + sy);

  drawTunnel();
  // features far -> near; holes stay visible past the ball plane so they
  // slide off the rim with the grid instead of vanishing at the edge
  const sorted = state.features.slice().sort((a, b) => b.z - a.z);
  for (const f of sorted) {
    if (f.z < (f.type === 'hole' ? -0.95 : -0.45)) continue;
    if (f.type === 'hole') drawHole(f);
    else if (f.type === 'gate') drawGate(f);
    else drawPower(f);
  }
  if (state.phase !== 'GAME_OVER') drawBall();
  ctx.restore();

  for (const f of state.floaters) drawFloater(f);
  drawSparks();
  if (state.redFlash > 0) { ctx.save(); ctx.globalAlpha = clamp(state.redFlash, 0, 0.5); ctx.fillStyle = '#b81c26'; ctx.fillRect(0, 0, view.w, view.h); ctx.restore(); }
}

function drawTunnel() {
  const hue = state.hue;
  const ringStep = CONFIG.Z_VIEW / CONFIG.RINGS;
  const shift = state.scrollDist % ringStep;
  const wraps = Math.floor(state.scrollDist / ringStep);
  const seg = CONFIG.SEGMENTS;
  const eps = 0.006; // tiny angular overlap — kills hairline seams between tiles
  // overscan rings continue the checker past the ball plane to the screen edges
  for (let k = CONFIG.RINGS; k >= 1 - CONFIG.OVERSCAN_RINGS; k--) {
    const zf = k * ringStep - shift;
    const zn = zf - ringStep;
    const rf = radiusRaw(zf), rn = radiusRaw(zn) + 0.75;
    const fade = clamp(1 - zf / CONFIG.Z_VIEW, 0.12, 1);
    const outer = clamp(1 + zn * 0.22, 0.3, 1); // gentle vignette past the ball plane
    for (let s = 0; s < seg; s++) {
      const a0 = s / seg * TAU, a1 = (s + 1) / seg * TAU + eps;
      const light = ((k + wraps + s) % 2) === 0;
      const L = ((light ? 46 : 30) * fade + 4) * outer;
      ctx.fillStyle = `hsl(${hue}, 58%, ${L}%)`;
      ctx.beginPath();
      ctx.arc(0, 0, rn, a0, a1);
      ctx.arc(0, 0, rf, a1, a0, true);
      ctx.closePath();
      ctx.fill();
    }
  }
  // center depth glow
  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, radiusAt(CONFIG.Z_VIEW) * 2.2);
  g.addColorStop(0, 'rgba(2,13,38,0.95)'); g.addColorStop(1, 'rgba(2,13,38,0)');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, radiusAt(CONFIG.Z_VIEW) * 2.2, 0, TAU); ctx.fill();
}

function drawHole(f) {
  // exactly one checker row deep, spawn-snapped to the grid — the gap sits flush
  // on tile boundaries for its whole life, so it reads as missing tiles
  const ringStep = CONFIG.Z_VIEW / CONFIG.RINGS;
  const z = f.z;
  const rO = radiusRaw(z);                // near lip — on a grid row boundary
  const rI = radiusRaw(z + ringStep);     // far edge — the next row boundary
  const a = holeArc(f), a0 = a.start, a1 = a.start + a.len;
  const hue = state.hue;
  const fade = clamp(1 - z / CONFIG.Z_VIEW, 0.12, 1);
  const outer = clamp(1 + z * 0.22, 0.3, 1);
  const aIn = clamp((CONFIG.Z_SPAWN + ringStep - z) / 0.8, 0, 1);
  ctx.save();
  ctx.globalAlpha = aIn;
  // darkest at the far edge so the gap reads as depth, not a painted decal
  const g = ctx.createRadialGradient(0, 0, rI, 0, 0, Math.max(rO, rI + 0.5));
  g.addColorStop(0, `hsl(${hue}, 60%, ${2 * fade * outer}%)`);
  g.addColorStop(1, `hsl(${hue}, 60%, ${(9 * fade + 2) * outer}%)`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0, 0, rO, a0, a1);
  ctx.arc(0, 0, rI, a1, a0, true);
  ctx.closePath();
  ctx.fill();
  // light catching the near lip of the gap
  ctx.strokeStyle = `hsla(${hue}, 65%, ${58 * fade}%, 0.35)`;
  ctx.lineWidth = clamp(2.4 / (1 + Math.max(0, z) * 0.5), 1, 2.4);
  ctx.beginPath(); ctx.arc(0, 0, rO, a0, a1); ctx.stroke();
  ctx.restore();
}

// glossy 3D orb — layered shading: drop shadow, 4-stop sphere gradient with a
// dark rim, bottom bounce-light, and twin specular glints
function glossyBall(x, y, rad, c1, c2, c3, c4) {
  const amb = ctx.globalAlpha;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.45)'; ctx.shadowBlur = rad * 0.55; ctx.shadowOffsetY = rad * 0.30;
  const g = ctx.createRadialGradient(x - rad * 0.35, y - rad * 0.42, rad * 0.08, x, y, rad * 1.05);
  g.addColorStop(0, c1); g.addColorStop(0.45, c2); g.addColorStop(0.8, c3); g.addColorStop(1, c4 || c3);
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, rad, 0, TAU); ctx.fill();
  ctx.restore();
  ctx.save();
  // bounce light reflected up from below — lifts the sphere off its shadow
  ctx.beginPath(); ctx.arc(x, y, rad, 0, TAU); ctx.clip();
  const bl = ctx.createRadialGradient(x, y + rad * 0.6, rad * 0.15, x, y + rad * 0.6, rad * 0.8);
  bl.addColorStop(0, 'rgba(255,255,255,0.16)'); bl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = bl; ctx.fillRect(x - rad, y + rad * 0.1, rad * 2, rad * 0.9);
  ctx.restore();
  ctx.save();
  // twin specular glints
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = amb * 0.5;
  ctx.beginPath(); ctx.ellipse(x - rad * 0.3, y - rad * 0.36, rad * 0.28, rad * 0.16, -0.6, 0, TAU); ctx.fill();
  ctx.globalAlpha = amb * 0.85;
  ctx.beginPath(); ctx.arc(x - rad * 0.44, y - rad * 0.5, rad * 0.07, 0, TAU); ctx.fill();
  ctx.restore();
}

function drawGate(f) {
  const r = radiusRaw(f.z);
  // fade in from the deep, fade out as the gate slides past the player
  const alpha = Math.min(clamp((CONFIG.Z_SPAWN - f.z) / 0.8 + 1e-6, 0, 1), clamp(1 + f.z * 2.2, 0, 1));
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  const orbR = clamp(r * 0.18, 12, 120);
  const playerSector = sectorOf(state.theta, f.rot);
  for (let i = 0; i < 3; i++) {
    const a = sectorCenter(f.rot, i);
    // gentle float + slow breathing, phase-offset per orb so they don't march in step
    const px = Math.cos(a) * r * 0.62;
    const py = Math.sin(a) * r * 0.62 + Math.sin(state.elapsed * 3.2 + i * 2.1) * orbR * 0.10;
    const oR = orbR * (1 + 0.035 * Math.sin(state.elapsed * 4.4 + i * 2.1));
    const isPlayer = i === playerSector && f.z < 4;
    if (isPlayer) {
      // spinning dashed ring marks the orb the player is lined up with
      ctx.save();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = oR * 0.13;
      ctx.shadowColor = '#fff'; ctx.shadowBlur = oR * 0.6;
      ctx.setLineDash([oR * 0.45, oR * 0.28]);
      ctx.lineDashOffset = -state.elapsed * oR * 2.4;
      ctx.beginPath(); ctx.arc(px, py, oR * 1.26, 0, TAU); ctx.stroke();
      ctx.restore();
    }
    // yellow collectible orb, distinct from the red running ball
    glossyBall(px, py, oR, '#fff7c4', '#fdd83d', '#ffb800', '#8a5400');
    // embossed number — light catch below, ink on top
    ctx.font = `800 ${oR * 0.9}px 'Roboto Mono', monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(String(f.values[i]), px, py + oR * 0.07);
    ctx.fillStyle = '#020d26';
    ctx.fillText(String(f.values[i]), px, py);
  }
  ctx.restore();
}

// small white sparkles orbiting a power orb on a tilted ring; the back pass
// draws the ones behind the sphere, the front pass the ones in front
function powerSparkles(px, py, rad, seed, front) {
  for (let k = 0; k < 3; k++) {
    const a = state.elapsed * 2.4 + seed + k * TAU / 3;
    const s = Math.sin(a);
    if (front ? s <= 0 : s > 0) continue;
    ctx.save();
    ctx.globalAlpha *= 0.85;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(px + Math.cos(a) * rad * 1.5, py + s * rad * 0.45, rad * (0.08 + 0.04 * s), 0, TAU);
    ctx.fill();
    ctx.restore();
  }
}

function drawPower(f) {
  const r = radiusRaw(f.z);
  const alpha = Math.min(clamp((CONFIG.Z_SPAWN - f.z) / 0.8 + 1e-6, 0, 1), clamp(1 + f.z * 2.2, 0, 1));
  if (alpha <= 0) return;
  const slow = f.kind === 'slow';
  const px = Math.cos(f.ang) * r * 0.62;
  const py = Math.sin(f.ang) * r * 0.62 + Math.sin(state.elapsed * 3.6 + f.ang * 5) * r * 0.015;
  const rad = clamp(r * 0.16, 10, 100) * (1 + 0.05 * Math.sin(state.elapsed * 4.5 + f.ang));
  const glow = slow ? '#46c8ff' : '#5dff9f'; // green ×2 — distinct from gold gates and blue slow-mo
  ctx.save();
  ctx.globalAlpha = alpha;
  powerSparkles(px, py, rad, f.ang, false);
  // pulsing colored under-glow
  ctx.save();
  ctx.shadowColor = glow; ctx.shadowBlur = rad * (0.8 + 0.25 * Math.sin(state.elapsed * 5));
  ctx.fillStyle = glow; ctx.globalAlpha = alpha * 0.55;
  ctx.beginPath(); ctx.arc(px, py, rad * 0.96, 0, TAU); ctx.fill();
  ctx.restore();
  // glassy sphere
  if (slow) glossyBall(px, py, rad, '#d9f5ff', '#49c9ff', '#1535a8', '#081543');
  else glossyBall(px, py, rad, '#dcffe9', '#5fe896', '#17a854', '#07522a');

    // hand-drawn clock with spinning hands — reads "time" on every platform,
    // unlike the ⏱ emoji it replaces

    ctx.lineWidth = rad * 0.11;
    ctx.beginPath(); ctx.arc(px, py, rad * 0.52, 0, TAU); ctx.stroke();
    ctx.lineWidth = rad * 0.09;
    for (let k = 0; k < 4; k++) {
      const ta = k * Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(px + Math.cos(ta) * rad * 0.40, py + Math.sin(ta) * rad * 0.40);
      ctx.lineTo(px + Math.cos(ta) * rad * 0.50, py + Math.sin(ta) * rad * 0.50);
      ctx.stroke();
    }
    const mi = -Math.PI / 2 + state.elapsed * 2.6;      // minute hand spins
    const ho = -Math.PI / 2 + state.elapsed * 2.6 / 12; // hour hand follows
    ctx.lineWidth = rad * 0.10;
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + Math.cos(mi) * rad * 0.38, py + Math.sin(mi) * rad * 0.38); ctx.stroke();

    ctx.font = `800 ${rad * 0.88}px Poppins, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fillText('×2', px, py + rad * 0.07);
    ctx.fillStyle = '#031034';
    ctx.fillText('×2', px, py);

  ctx.restore();
}

function drawBall() {
  // crash = tumble into the gap: slide to its center, sink outward through the
  // floor, shrink and go dark — reads as falling in, not popping out of existence
  let theta = state.theta, sink = 0;
  if (state.crashT > 0) {
    theta = lerpAngle(state.crashTheta0, state.crashTheta, clamp(state.crashT / 0.3, 0, 1));
    const p = clamp(state.crashT / 0.7, 0, 1);
    sink = p * p; // ease-in — the drop accelerates like gravity
  }
  const r = radiusAt(0) * 0.74 * (1 + sink * 0.10);
  const bx = Math.cos(theta) * r, by = Math.sin(theta) * r;
  const rad = view.base * 0.075 * (1 - sink * 0.85);
  if (rad > 0.5 && sink < 1) {
    const sq = state.ballSquash;
    ctx.save();
    ctx.globalAlpha = 1 - sink * 0.6;
    ctx.translate(bx, by);
    ctx.rotate(theta + Math.PI);         // local +x points into the tunnel — the roll direction
    // soft contact shadow cast outward onto the tunnel wall
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    ctx.beginPath(); ctx.ellipse(-rad * 0.72, 0, rad * 0.45, rad * 1.02, 0, 0, TAU); ctx.fill();
    ctx.rotate(state.rollTilt);          // lean the roll axis while steering
    ctx.scale(sq, 1 / sq);               // press against the wall while steering
    // ambient glow behind the marble
    ctx.shadowColor = 'rgba(184,28,38,0.85)'; ctx.shadowBlur = 24;
    ctx.fillStyle = '#8f1119';
    ctx.beginPath(); ctx.arc(0, 0, rad, 0, TAU); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(0, 0, rad, 0, TAU); ctx.clip();
    // fixed light source — the shading stays put while the surface texture rolls,
    // which is what sells the rolling (a moving highlight reads as orbiting instead)
    const lightA = -2.1 - (theta + Math.PI + state.rollTilt);
    const lx = Math.cos(lightA) * rad * 0.36, ly = Math.sin(lightA) * rad * 0.36;
    const g = ctx.createRadialGradient(lx, ly, rad * 0.08, 0, 0, rad * 1.02);
    g.addColorStop(0, '#ffb3b8');
    g.addColorStop(0.35, '#e23b46');
    g.addColorStop(0.75, '#9c141d');
    g.addColorStop(1, '#2a0609');
    ctx.fillStyle = g; ctx.fillRect(-rad * 1.1, -rad * 1.1, rad * 2.2, rad * 2.2);
    // rolling meridian stripes — half-ellipses sweeping along the travel direction,
    // fading at the silhouette so they never pop in or out at the edges
    for (let i = 0; i < CONFIG.ROLL_STRIPES; i++) {
      const p = (state.rollPhase + i / CONFIG.ROLL_STRIPES) % 1;
      const phi = (p - 0.5) * Math.PI;
      const vis = Math.cos(phi);
      if (vis < 0.05) continue;
      const xr = Math.max(Math.abs(Math.sin(phi)) * rad, 0.001);
      ctx.strokeStyle = `rgba(52, 4, 9, ${0.34 * vis})`;
      ctx.lineWidth = rad * 0.16 * (0.45 + 0.55 * vis);
      ctx.beginPath();
      if (Math.sin(phi) >= 0) ctx.ellipse(0, 0, xr, rad, 0, -Math.PI / 2, Math.PI / 2);
      else ctx.ellipse(0, 0, xr, rad, 0, Math.PI / 2, Math.PI * 1.5);
      ctx.stroke();
    }
    // specular gloss pinned to the light, not the surface
    ctx.globalAlpha = 0.55; ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(lx, ly, rad * 0.30, rad * 0.17, Math.atan2(ly, lx) + Math.PI / 2, 0, TAU);
    ctx.fill();
    ctx.globalAlpha = 0.9;
    ctx.beginPath(); ctx.arc(lx * 1.15, ly * 1.15, rad * 0.07, 0, TAU); ctx.fill();
    // light falls away as the ball drops below the floor
    if (sink > 0) {
      ctx.globalAlpha = sink * 0.9; ctx.fillStyle = '#03081a';
      ctx.fillRect(-rad * 1.2, -rad * 1.2, rad * 2.4, rad * 2.4);
    }
    ctx.restore();
  }
  if (state.crashT > 0) {
    ctx.save(); ctx.globalAlpha = clamp(1 - state.crashT * 1.3, 0, 1);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    const rr = rad + state.crashT * 140;
    ctx.beginPath(); ctx.arc(bx, by, rr, 0, TAU); ctx.stroke(); ctx.restore();
  }
}

function drawSparks() {
  if (!state.sparks.length) return;
  ctx.save();
  for (const s of state.sparks) {
    const k = clamp(1 - s.t / s.life, 0, 1);
    ctx.globalAlpha = k;
    ctx.fillStyle = s.color;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size * (0.5 + 0.5 * k), 0, TAU); ctx.fill();
  }
  ctx.restore();
}

function drawFloater(f) {
  ctx.save(); ctx.globalAlpha = clamp(1 - f.t / 0.85, 0, 1);
  ctx.fillStyle = f.color; ctx.font = `800 20px Poppins, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 4;
  ctx.fillText(f.text, f.x, f.y); ctx.restore();
}

// =============================================================================
// Audio — Web Audio synthesis
// =============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; } }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(o) {

  const t = audioCtx.currentTime + (o.delay || 0), dur = o.dur || 0.15;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = o.type || 'sine'; osc.frequency.setValueAtTime(o.freq, t);
  if (o.freqEnd !== undefined) osc.frequency.exponentialRampToValueAtTime(Math.max(20, o.freqEnd), t + dur);
  g.gain.setValueAtTime(o.gain || 0.15, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g).connect(audioCtx.destination); osc.start(t); osc.stop(t + dur + 0.05);
}
function playGood() { playTone({ freq: 660, freqEnd: 880, type: 'triangle', dur: 0.13, gain: 0.18 }); }
function playCombo() { playTone({ freq: 660, type: 'triangle', dur: 0.12, gain: 0.16 }); playTone({ freq: 880, type: 'triangle', dur: 0.14, gain: 0.16, delay: 0.08 }); playTone({ freq: 1320, type: 'triangle', dur: 0.18, gain: 0.14, delay: 0.16 }); }
function playBad() { playTone({ freq: 240, freqEnd: 150, type: 'sawtooth', dur: 0.22, gain: 0.16 }); }
// cartoon tumble into the hole: impact thud, descending slide, soft boom below
function playCrash() {
  playTone({ freq: 170, freqEnd: 60, type: 'sine', dur: 0.15, gain: 0.28 });
  playTone({ freq: 750, freqEnd: 130, type: 'triangle', dur: 0.5, gain: 0.17 });
  playTone({ freq: 300, freqEnd: 45, type: 'sawtooth', dur: 0.35, gain: 0.1, delay: 0.05 });
  playTone({ freq: 85, freqEnd: 42, type: 'sine', dur: 0.3, gain: 0.22, delay: 0.42 });
}
function playPower() { playTone({ freq: 520, freqEnd: 1040, type: 'square', dur: 0.2, gain: 0.14 }); }
function playTick() { playTone({ freq: 1200, type: 'sine', dur: 0.06, gain: 0.1 }); }
// Continue-countdown ticker: a dry "tock" that rises in pitch as the count
// drops, so the final seconds feel urgent.
function playContTick(count) {
  const urgent = count <= 3;
  playTone({ freq: urgent ? 900 : 620, freqEnd: urgent ? 640 : 460,
             type: 'triangle', dur: 0.08, gain: urgent ? 0.16 : 0.11 });
}
// end-of-round celebration — rising arpeggio into a warm closing chord
function playFanfare(newBest) {
  const arp = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
  arp.forEach((f, i) => playTone({ freq: f, type: 'triangle', dur: 0.16, gain: 0.16, delay: i * 0.1 }));
  [261.63, 329.63, 392.0, 523.25].forEach(f => playTone({ freq: f, type: 'triangle', dur: 0.8, gain: 0.08, delay: 0.42 }));
  if (newBest) [1318.5, 1568.0, 2093.0].forEach((f, i) => playTone({ freq: f, type: 'sine', dur: 0.3, gain: 0.1, delay: 0.68 + i * 0.09 }));
}

// =============================================================================
// BGM — synthesized lofi loop, no asset files. Everything routes through one
// gain node so the mute button silences already-scheduled notes instantly.
// =============================================================================
const NOTE = n => 440 * Math.pow(2, (n - 69) / 12); // midi -> Hz
const BGM_CHORDS = [ // IV - iii - ii - I in C, the classic mellow descent
  { bass: NOTE(41), pad: [NOTE(53), NOTE(57), NOTE(60), NOTE(64)] }, // Fmaj7
  { bass: NOTE(40), pad: [NOTE(52), NOTE(55), NOTE(59), NOTE(62)] }, // Em7
  { bass: NOTE(38), pad: [NOTE(50), NOTE(53), NOTE(57), NOTE(60)] }, // Dm7
  { bass: NOTE(36), pad: [NOTE(48), NOTE(52), NOTE(55), NOTE(59)] }, // Cmaj7
];
const BGM_PENTA = [72, 74, 76, 79, 81, 84].map(NOTE); // C major pentatonic, high
const bgm = { gain: null, noise: null, timer: 0, nextBar: 0, bar: 0, playing: false };

function bgmEnsure() {
  if (!audioCtx) return false;
  if (!bgm.gain) {
    bgm.gain = audioCtx.createGain();
    bgm.gain.gain.value = 0;
    bgm.gain.connect(audioCtx.destination);
    const len = Math.floor(audioCtx.sampleRate * 0.1);
    bgm.noise = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = bgm.noise.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  }
  return true;
}
function bgmNote(o) {
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain(), lp = audioCtx.createBiquadFilter();
  osc.type = o.type || 'triangle'; osc.frequency.setValueAtTime(o.freq, o.t);
  lp.type = 'lowpass'; lp.frequency.value = o.cut || 1100; // lowpass = the "lofi" warmth
  g.gain.setValueAtTime(0.0001, o.t);
  g.gain.exponentialRampToValueAtTime(o.gain, o.t + (o.attack || 0.02));
  g.gain.exponentialRampToValueAtTime(0.0001, o.t + o.dur);
  osc.connect(lp).connect(g).connect(bgm.gain);
  osc.start(o.t); osc.stop(o.t + o.dur + 0.05);
}
function bgmHat(t) {
  const src = audioCtx.createBufferSource(), g = audioCtx.createGain(), hp = audioCtx.createBiquadFilter();
  src.buffer = bgm.noise;
  hp.type = 'highpass'; hp.frequency.value = 6000;
  g.gain.setValueAtTime(0.02, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);
  src.connect(hp).connect(g).connect(bgm.gain);
  src.start(t); src.stop(t + 0.08);
}
function bgmBar(t, bar) {
  const beat = 60 / CONFIG.MUSIC_TEMPO;
  const ch = BGM_CHORDS[bar % BGM_CHORDS.length];
  // warm pad — staggered chord tones with a slow swell
  ch.pad.forEach((f, i) => bgmNote({ freq: f, t: t + i * 0.03, dur: beat * 3.7, gain: 0.045, attack: 0.5, cut: 850 }));
  // laid-back bass on beats 1 and 3
  bgmNote({ freq: ch.bass, t, dur: beat * 1.7, type: 'sine', gain: 0.1, attack: 0.03, cut: 400 });
  bgmNote({ freq: ch.bass, t: t + beat * 2, dur: beat * 1.5, type: 'sine', gain: 0.085, attack: 0.03, cut: 400 });
  // soft off-beat hats
  for (let b = 0; b < 4; b++) bgmHat(t + (b + 0.5) * beat);
  // sparse pentatonic plucks so the loop never feels copy-pasted
  for (let b = 0; b < 4; b++) {
    if (Math.random() < 0.45) {
      bgmNote({ freq: pick(BGM_PENTA), t: t + b * beat + (Math.random() < 0.5 ? 0 : beat / 2), dur: beat * 0.9, type: 'sine', gain: 0.05, attack: 0.01, cut: 2200 });
    }
  }
}
function bgmTick() {
  if (!bgm.playing || !audioCtx) return;
  // while suspended or muted, pin the cursor to "now" so unmuting never
  // dumps a burst of catch-up bars
  if (audioCtx.state !== 'running' || state.muted) { bgm.nextBar = audioCtx.currentTime + 0.06; return; }
  const barDur = 60 / CONFIG.MUSIC_TEMPO * 4;
  if (bgm.nextBar < audioCtx.currentTime) bgm.nextBar = audioCtx.currentTime + 0.05;
  while (bgm.nextBar < audioCtx.currentTime + 0.9) { bgmBar(bgm.nextBar, bgm.bar++); bgm.nextBar += barDur; }
}
function startMusic() {
  ensureAudio();
  if (!bgmEnsure()) return;
  const t = audioCtx.currentTime;
  bgm.gain.gain.cancelScheduledValues(t);
  bgm.gain.gain.setValueAtTime(state.muted ? 0 : CONFIG.MUSIC_VOL, t);
  bgm.playing = true; bgm.bar = 0; bgm.nextBar = t + 0.1;
  clearInterval(bgm.timer); bgm.timer = setInterval(bgmTick, 200);
  bgmTick();
}
function stopMusic() {
  if (!bgm.playing) return;
  bgm.playing = false; clearInterval(bgm.timer);
  if (audioCtx && bgm.gain) {
    const t = audioCtx.currentTime;
    bgm.gain.gain.cancelScheduledValues(t);
    bgm.gain.gain.setValueAtTime(Math.max(bgm.gain.gain.value, 0.0001), t);
    bgm.gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
  }
}
function setMusicMuted(muted) {
  if (!audioCtx || !bgm.gain) return;
  const t = audioCtx.currentTime;
  bgm.gain.gain.cancelScheduledValues(t);
  bgm.gain.gain.setValueAtTime(!muted && bgm.playing ? CONFIG.MUSIC_VOL : 0, t);
}

// =============================================================================
// Lifecycle
// =============================================================================
function startGame() {
  claimLocked = false;
  claimUnavailable = false;
  state.phase = 'PLAYING';
  state.theta = Math.PI / 2; state.holdDir = 0; state.ballSquash = 1;
  state.angVel = 0; state.rollTilt = 0; state.hue = CONFIG.HUES[0];
  state.features = []; state.floaters = []; state.sparks = [];
  state.score = 0; state.level = START_LEVEL; state.seqCleared = 0;
  state.elapsed = 0; state.timer = CONFIG.GAME_DURATION_SEC;
  state.sinceSpawn = CONFIG.FEATURE_GAP; state.scrollDist = 0; state.rollPhase = 0; state.plan = []; state.prevGen = null;
  state.slowUntil = -1; state.doubleUntil = -1;
  state.crashT = 0; state.shake = 0; state.redFlash = 0; state.lastTick = 999;
  state.colorIndex = 0;
  const g = genSequence(state.level); state.seq = g.seq; state.seqStep = g.step; state.collectIndex = 2;
  dom.scoreVal.textContent = '0';
  updateStrip(); updateTimeHud();
  dom.menu.classList.add('hidden'); dom.gameOver.classList.add('hidden'); dom.cont.classList.add('hidden');
  dom.hud.classList.remove('hidden');
  dom.seqBar.classList.remove('hidden');
  dom.chevL.classList.remove('hidden'); dom.chevR.classList.remove('hidden');
  startMusic();
}

function openContinue() {
  state.phase = 'CONTINUE';
  state.contCountdown = CONFIG.CONTINUE_COUNT;
  dom.contCount.textContent = state.contCountdown;
  dom.contTier.textContent = COPY.contTier + ' ' + tierFor(state.level) + ' · ' + COPY.contLevel + ' ' + state.level;
  dom.contClock.textContent = COPY.contTimeLeft + ' ' + fmtClock(state.timer);
  dom.cont.classList.remove('hidden');
  playContTick(state.contCountdown);
  tickContinue();
}
let contTimer = 0;
function tickContinue() {
  clearTimeout(contTimer);
  contTimer = setTimeout(() => {
    if (state.phase !== 'CONTINUE') return;
    state.contCountdown--;
    if (state.contCountdown <= 0) { endGame('crash'); return; }
    dom.contCount.textContent = state.contCountdown;
    playContTick(state.contCountdown);
    tickContinue();
  }, 1000);
}
function doContinue() {
  clearTimeout(contTimer);
  dom.cont.classList.add('hidden');
  state.features = []; state.sinceSpawn = CONFIG.FEATURE_GAP; state.plan = [];
  state.theta = Math.PI / 2; state.crashT = 0;
  state.angVel = 0; state.rollTilt = 0; state.holdDir = 0;
  newSequence(false);          // fresh sequence, same level (D9)
  state.phase = 'PLAYING';
}

function endGame(reason) {
  if (state.phase === 'GAME_OVER') return;
  clearTimeout(contTimer);
  state.phase = 'GAME_OVER';
  const isNewBest = state.score > state.best;
  if (isNewBest) { state.best = state.score; storageSet(CONFIG.STORAGE_KEY_BEST, String(state.best)); }
  stopMusic();
  playFanfare(isNewBest);
  dom.goTitle.textContent = reason === 'time' ? COPY.timeUp : COPY.gameOver;
  dom.goNewBest.classList.toggle('hidden', !isNewBest);
  dom.finalStats.innerHTML =
    `<div class="label">${COPY.statScore}</div><div class="value">${state.score}</div>` +
    `<div class="label">${COPY.statLevel}</div><div class="value">${state.level}</div>` +
    `<div class="label">${COPY.statSeq}</div><div class="value">${state.seqCleared}</div>` +
    `<div class="label">${COPY.statBest}</div><div class="value">${state.best}</div>`;
  syncClaimButton();
  dom.cont.classList.add('hidden');
  dom.seqBar.classList.add('hidden');
  dom.chevL.classList.add('hidden'); dom.chevR.classList.add('hidden');
  setTimeout(() => { dom.hud.classList.add('hidden'); dom.gameOver.classList.remove('hidden'); }, reason === 'time' ? 250 : 600);
}
function isZeroScore() { return (state.score | 0) <= 0; }

// =============================================================================
// Input

function setHold(clientX) { state.holdDir = clientX < view.w / 2 ? 1 : -1; }
canvas.addEventListener('pointerdown', (e) => { e.preventDefault(); if (state.phase === 'PLAYING') setHold(e.clientX); }, { passive: false });
canvas.addEventListener('pointermove', (e) => { if (state.phase === 'PLAYING' && state.holdDir !== 0 && e.buttons) setHold(e.clientX); });

const keys = {};
window.addEventListener('keydown', (e) => {
  if (['ArrowLeft', 'ArrowRight', 'KeyA', 'KeyD'].indexOf(e.code) !== -1) {
    e.preventDefault(); keys[e.code] = true;

  }

// =============================================================================
// CLAIM SCORE — §6.5 callback + §6.6 Genet encrypted flow via claim-callback.js
// =============================================================================
let claimLocked = false;
let claimUnavailable = false;
const claimContext = window.ClaimCallback.getClaimContext();
window.ClaimCallback.applyPageTitleToHeading(claimContext.pageTitle, 'menuTitle');
function hasClaimCallback() {
  return !!window.ClaimCallback.resolveCallbackUrl(claimContext, CONFIG.CLAIM_FALLBACK_URL);
}
function syncClaimButton() {
  if (isZeroScore()) {
    dom.claimBtn.disabled = false;
    dom.claimBtn.textContent = COPY.retry;
    return;
  }
  if (!hasClaimCallback() || claimUnavailable) {
    dom.claimBtn.disabled = true;
    dom.claimBtn.textContent = COPY.claimUnavailable;
    return;
  }
  dom.claimBtn.disabled = claimLocked;
  dom.claimBtn.textContent = COPY.claim;
}
async function buildClaimUrl() {
  return window.ClaimCallback.buildClaimUrl({
    claimContext, score: Math.max(0, state.score | 0),
    gameName: CONFIG.GAME_NAME, fallbackUrl: CONFIG.CLAIM_FALLBACK_URL,
  });
}
dom.claimBtn.addEventListener('click', async () => {
  if (isZeroScore()) {
    claimLocked = false;
    claimUnavailable = false;
    startGame();
    return;
  }
  if (!hasClaimCallback()) {
    claimLocked = false;
    syncClaimButton();
    return;
  }
  if (claimLocked) return;
  claimLocked = true;
  syncClaimButton();
  try {
    const claimUrl = await buildClaimUrl();
    if (!claimUrl) {
      console.warn('[ball-rush] claim submit unavailable: invalid or missing callback context');
      claimLocked = false;
      claimUnavailable = true;
      syncClaimButton();
      return;
    }
    location.href = claimUrl;
  } catch (e) {
    console.warn('[ball-rush] claim failed:', e);
    claimLocked = false;
    claimUnavailable = true;
    syncClaimButton();
  }
});

dom.muteBtn.addEventListener('click', () => { state.muted = !state.muted; storageSet(CONFIG.STORAGE_KEY_MUTE, state.muted ? '1' : '0'); setMusicMuted(state.muted); updateMuteUI(); });
const MUTE_ICON_ON = '<path d="M3 9v6h4l5 4V5L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zm-2.5-9v2.1a7 7 0 0 1 0 13.8V21a9 9 0 0 0 0-18z"/>';
const MUTE_ICON_OFF = '<path d="M3 9v6h4l5 4V5L7 9H3zm16.6 3 2.5-2.5-1.4-1.4L18.2 10.6 15.7 8.1l-1.4 1.4L16.8 12l-2.5 2.5 1.4 1.4 2.5-2.5 2.5 2.5 1.4-1.4z"/>';
function updateMuteUI() {
  dom.muteBtn.querySelector('svg').innerHTML = state.muted ? MUTE_ICON_OFF : MUTE_ICON_ON;
  const label = state.muted ? COPY.audioOff : COPY.audioOn;
  dom.muteBtn.setAttribute('aria-pressed', state.muted ? 'true' : 'false');
  dom.muteBtn.setAttribute('aria-label', label); dom.muteBtn.setAttribute('title', label);
}
function showBest() { dom.bestText.innerHTML = state.best > 0 ? `${COPY.bestPrefix}: <b>${state.best}</b>` : '&nbsp;'; }

// =============================================================================
// Pause on tab hide
// =============================================================================
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (state.phase === 'PLAYING' && !state.paused) { state.paused = true; }
    if (audioCtx) audioCtx.suspend(); // freezes the music clock too — no catch-up burst
  } else {
    if (state.paused) { state.paused = false; lastT = 0; }
    if (audioCtx) audioCtx.resume();
  }
});

// =============================================================================
// Main loop
// =============================================================================
let lastT = 0;
function loop(t) {
  if (!lastT) lastT = t;
  const dt = Math.min((t - lastT) / 1000, 1 / 30);
  lastT = t;
  if (!state.paused) update(dt);
  draw();
  requestAnimationFrame(loop);
}

// =============================================================================
// Boot
// =============================================================================
showBest(); updateMuteUI();
if (qs.get('scene') === 'play') { ensureAudio(); startGame(); }
requestAnimationFrame(loop);

</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#020d26">
<title>Gem Merge — JDP Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="./vendor/matter.min.js"></script>
<style>
  :root {
    --jdp-black:        #031034;
    --jdp-blue:         #133B9F;
    --jdp-brick:        #9E131F;
    --jdp-light-red:    #AF1726;
    --jdp-dark-yellow:  #FFB603;
    --jdp-light-yellow: #FFD633;
    --jdp-white:        #FFFFFF;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: linear-gradient(180deg, #020d26 0%, #051335 60%, #0a1a45 100%);
    color: #fff;
    font-family: 'Poppins', -apple-system, 'Segoe UI', Roboto, sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  canvas#game {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    display: block;
    touch-action: none;
  }
  .hidden { display: none !important; }

  /* HUD — DESIGN.md §5.12 — Score · Next · Audio */
  #hud {
    position: fixed;
    top: max(8px, env(safe-area-inset-top));
    left: 8px;
    right: 8px;
    z-index: 10;
    display: flex;
    justify-content: center;
    pointer-events: none;
  }
  .hud-row {
    width: 100%;
    max-width: 28rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    pointer-events: auto;
    flex-shrink: 0;
  }
  /* JDP two-tone pill — DESIGN.md §5.2 */
  .jdp-pill {
    background: #FFFFFF;
    border: 2px solid var(--jdp-dark-yellow);
    border-radius: 30px;
    overflow: hidden;
    display: flex;
    align-items: stretch;
    min-width: 0;
    flex: 1;
    height: 32px;
  }
  .jdp-pill .pill-label {
    background: var(--jdp-brick);
    color: var(--jdp-light-yellow);
    padding: 0 12px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    white-space: nowrap;
  }
  .jdp-pill .pill-value {
    background: var(--jdp-blue);
    color: #FFFFFF;
    padding: 0 12px;
    font-size: 16px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex: 1;
    white-space: nowrap;
  }
  /* Next-gem pill variant: value half doubles as the auto-drop timer.
     --timer-fill is updated each frame (0 → 100%) to fill the white
     background from left with yellow, like a loading bar. */
  .jdp-pill.next .pill-value {
    background: linear-gradient(
      to right,
      var(--jdp-light-yellow) 0%,
      var(--jdp-light-yellow) var(--timer-fill, 0%),
      #FFFFFF var(--timer-fill, 0%),
      #FFFFFF 100%
    );
    padding: 0 8px;
    justify-content: center;
    position: relative;
  }
  .jdp-pill.next .pill-value img {
    width: 24px;
    height: 22px;
    display: block;
    position: relative;            /* sits above the gradient backdrop */
  }

  /* Audio toggle — DESIGN.md §5.11 */
  .mute {
    width: 44px; height: 44px;
    flex-shrink: 0;
    border-radius: 22px;
    border: 2px solid var(--jdp-dark-yellow);
    background: var(--jdp-brick);
    color: var(--jdp-light-yellow);
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    cursor: pointer;
    transition: transform 80ms ease;
  }
  .mute:active { transform: scale(0.92); }
  .mute svg { width: 22px; height: 22px; fill: currentColor; }

  /* In-game gem ladder — ROYGBIV reference, sized and positioned via JS to sit just below the bin */
  .gem-ladder {
    position: fixed;
    top: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
    background: rgba(2, 13, 38, 0.7);
    border: 1px solid rgba(255, 182, 3, 0.5);
    border-radius: 999px;
    padding: 6px 10px;
    z-index: 10;
    pointer-events: none;
    box-sizing: border-box;
  }
  .gem-ladder img {
    width: clamp(20px, 6vw, 32px);
    height: auto;
    display: block;
    flex-shrink: 0;
  }
  .gem-ladder .arrow {
    color: rgba(255, 214, 51, 0.6);
    font-size: clamp(10px, 2.4vw, 14px);
    line-height: 1;
    flex-shrink: 0;
  }

  /* End-run pill — small, low-weight, only visible during PLAYING */
  .end-run {
    position: fixed;
    bottom: max(12px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    background: rgba(2, 13, 38, 0.7);
    color: rgba(255, 214, 51, 0.85);
    border: 1px solid rgba(255, 182, 3, 0.5);
    border-radius: 999px;
    padding: 9px 20px;
    font: 700 13px/1 'Poppins', sans-serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    z-index: 10;
  }
  .end-run:active { transform: translateX(-50%) scale(0.94); }

  /* Overlays (menu / game over / confirm) */
  .overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(2, 13, 38, 0.82);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 20;
    padding: 16px;
  }
  .card {
    background: linear-gradient(180deg, #020d26 0%, #051335 100%);
    border: 3px solid var(--jdp-light-yellow);
    border-radius: 24px;
    padding: 28px 24px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 12px 0 rgba(0,0,0,0.4);
  }
  .card h1 {
    font-size: 40px;
    margin: 0 0 6px;
    font-weight: 700;
    color: var(--jdp-light-yellow);
    letter-spacing: 1px;
    text-shadow: 0 4px 0 var(--jdp-light-red);
  }
  .card h2 {
    font-size: 26px;
    margin: 0 0 16px;
    color: var(--jdp-light-yellow);
    font-weight: 700;
  }
  .card .sub { font-size: 14px; color: #FFFFFF; margin: 0 0 18px; opacity: 0.9; }
  .card .best { font-size: 14px; color: var(--jdp-light-yellow); margin: 0 0 18px; font-weight: 600; min-height: 20px; }
  .card .hint { font-size: 12px; color: rgba(255,255,255,0.6); margin: 12px 0 0; }
  .ladder {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin: 0 0 18px;
    flex-wrap: wrap;
  }
  .ladder img { width: 26px; height: 24px; opacity: 0.95; }
  .ladder .arrow { color: rgba(255,214,51,0.7); font-size: 14px; align-self: center; }
  .cta {
    background: linear-gradient(180deg, #FFE258 0%, #FFBA0A 100%);
    border: 1px solid var(--jdp-light-yellow);
    border-radius: 50px;
    padding: 14px 28px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 700;
    color: #DE0909;
    cursor: pointer;
    letter-spacing: 0.04em;
    box-shadow: 0 8px 0 #DE9D00;
    transition: transform 80ms ease, box-shadow 80ms ease;
    text-transform: uppercase;
    margin: 4px 0;
  }
  .cta:active { transform: translateY(6px); box-shadow: 0 2px 0 #DE9D00; }
  .cta.secondary {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 4px 0 rgba(0,0,0,0.4);
    font-size: 14px;
    padding: 10px 22px;
  }
  .cta.secondary:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.4); }
  .stats {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 6px 16px;
    margin: 0 0 18px;
    font-size: 14px;
  }
  .stats .label { color: rgba(255,255,255,0.7); text-align: left; }
  .stats .value { color: var(--jdp-light-yellow); font-weight: 700; text-align: right; }
  .claim-note {
    margin: 12px 0 0;
    color: #ff8a8a;
    font-size: 12px;
    font-weight: 700;
  }
  .new-best {
    display: inline-block;
    background: var(--jdp-light-yellow);
    color: #031034;
    border-radius: 999px;
    padding: 6px 14px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    margin: 0 0 12px;
    animation: pulse-new 0.5s ease-in-out infinite alternate;
  }
  @keyframes pulse-new { from { transform: scale(1); } to { transform: scale(1.06); } }

  @media (max-width: 420px) {
    .card h1 { font-size: 32px; }
    .jdp-pill .pill-value { font-size: 14px; }
  }

  /* ============================================================
     STANDARDIZED JDP START SCREEN (portable template)
     Roll this block + the #menu markup into any JDP game. Only the
     copy (#menuTitle text, #menuSub) and the two "Powered by" images
     change per game. Layout is adaptive from 360px phones to tablets.
     ============================================================ */
  #menu.jdp-start {
    padding: 0;
    background: #04122c;
    align-items: stretch;
    justify-content: flex-start;
    overflow-y: auto;
  }
  .jdp-frame {
    position: relative;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* small reserve so the orange splash stays clear of content on tall-content screens */
    padding-bottom: clamp(96px, 24vw, 132px);
    /* body copy on this screen uses Poppins (title overrides to Bebas Neue) */
    font-family: 'Poppins', system-ui, sans-serif;
    /* red-grid + navy background art (shared template asset) */
    background: #071733 url("assets/start/bg.webp?v=20260720.1") no-repeat top center / cover;
    overflow: hidden;
  }
  /* Gem placement mirrors the template (1080x1920): positions are % of the
     frame so they scale. Bokeh = soft blurred gems behind content (z1);
     sharp gems in front (z2, still behind the title/panel/logos at z3). */
  .jdp-bokeh { position: absolute; z-index: 1; pointer-events: none; opacity: 0.85; }
  .jdp-bokeh img { display: block; width: 100%; height: auto; }
  .jdp-bk1 { width: clamp(120px, 34vw, 180px); top: 44%;  right: -9%; }  /* top-right blur */
  .jdp-bk2 { width: clamp(130px, 38vw, 200px); top: 70%;  left: -11%; }  /* bottom-left blur */
  .jdp-gem { position: absolute; z-index: 4; pointer-events: none; }  /* in front of logos/mascot, behind title+panel */
  .jdp-gem img { display: block; width: 100%; height: auto; }
  /* two faceted rubies — top corners of the red band */
  .jdp-g1 { width: clamp(56px, 15vw, 74px);  top: 4.5%;  left: 1.5%;  transform: rotate(-8deg); }
  .jdp-g2 { width: clamp(58px, 15.5vw, 76px);top: 4.5%;  right: 1.5%; transform: rotate(10deg); }
  /* eight kelapa-sawit pebbles */
  .jdp-g3 { width: clamp(24px, 7vw, 32px);   top: 2.5%;  left: 25%;  }  /* top, left of centre */
  .jdp-g4 { width: clamp(26px, 7.5vw, 34px); top: 4%;    right: 23%; }  /* top, right of centre */
  .jdp-g5 { width: clamp(26px, 7.5vw, 34px); top: 9%;    left: 55%;  }  /* red band, lower centre */
  .jdp-g6 { width: clamp(28px, 8vw, 40px);   top: 45.5%; left: 24%;  }  /* beside "Powered by", left */
  .jdp-g7 { width: clamp(28px, 8vw, 40px);   top: 45.5%; right: 23%; }  /* beside "Powered by", right */
  .jdp-g8 { width: clamp(26px, 7.5vw, 36px); top: 53.5%; left: 4%;   }  /* far left, by MPOC */
  .jdp-g9 { width: clamp(22px, 6.5vw, 30px); top: 66.5%; left: 43%;  }  /* below MPOC, centre */
  .jdp-g10{ width: clamp(28px, 8vw, 38px);   top: 72.5%; right: 8%;  }  /* bottom right, by mascot */
  /* title — Bebas Neue, gold gradient fill (180°: #ffb000→#ffd80b) */
  .jdp-title {
    position: relative; z-index: 5; isolation: isolate;
    margin: clamp(58px, 14vw, 92px) 0 0;
    padding: 0 14px;
    /* heavy condensed display face (matches the arcade title reference) */
    font-family: 'Anton', 'Bebas Neue', sans-serif;
    font-weight: 400;
    font-size: clamp(42px, 14vw, 74px);
    line-height: 1.0;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    /* the visible face is the ::after gradient; the real <h1> is transparent and just
       carries layout + the neon glow (background-clip:text only paints on the pseudo here) */
    color: #ffd23f;   /* solid fallback if background-clip:text unsupported */
    -webkit-text-fill-color: transparent;
    /* faint cool glow only — the dark drop shadow is the separate ::before layer below,
       kept OFF the gold face so the letters keep their bright colour */
    text-shadow: 0 0 12px rgba(120,180,255,0.22);
  }
  /* dark letter-shaped shadow BEHIND the gold — offset copy, doesn't tint the face */
  .jdp-title::before {
    content: attr(data-text);
    position: absolute; left: 0; right: 0; top: 0; bottom: 0;
    z-index: -1; padding: inherit;
    font-family: 'Anton', 'Bebas Neue', sans-serif !important;
    color: rgba(0,0,0,0.55); -webkit-text-fill-color: rgba(0,0,0,0.55);
    transform: translate(3px, 5px);
    filter: blur(0.6px);
  }
  /* golden linear-gradient face — 180°: #ffb000 → #ffd80b (per reference) */
  .jdp-title::after {
    content: attr(data-text);
    position: absolute; left: 0; right: 0; top: 0; bottom: 0;
    z-index: 1; padding: inherit;
    font-family: 'Anton', 'Bebas Neue', sans-serif !important;
    background: linear-gradient(180deg, #ffb000 0%, #ffd80b 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent; -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 1px #d99500;
  }
  /* instructions panel */
  .jdp-panel {
    position: relative; z-index: 5;
    width: min(84%, 356px);
    margin: clamp(16px, 5vw, 30px) 0 0;
    padding: 20px 22px 24px;
    background: rgba(11, 32, 74, 0.5);
    border: 1.5px solid rgba(255,255,255,0.85);
    border-radius: 22px;
    text-align: center;
    -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
  }
  .jdp-panel .jdp-panel-head {
    font-weight: 800; color: #fff;
    font-size: clamp(15px, 4.4vw, 18px); margin: 0 0 10px;
  }
  #menu.jdp-start .sub {
    color: rgba(255,255,255,0.9);
    font-size: clamp(13px, 3.8vw, 15px);
    margin: 0; line-height: 1.5;
  }
  /* powered-by row */
  /* bottom margin guarantees a minimum gap between the logos and the CTA below */
  .jdp-powered { position: relative; z-index: 3; margin: clamp(12px, 4vw, 24px) 0 clamp(14px, 4.5vw, 26px); text-align: center; }
  .jdp-powered .lbl { color: #fff; font-size: 15px; font-weight: 600; margin: 0 0 14px; }
  /* bare logos on the background — no shared panel */
  .jdp-logos { display: inline-flex; align-items: center; justify-content: center; gap: clamp(10px, 4vw, 26px); }
  .jdp-logos img { width: auto; object-fit: contain; }
  /* MPOC mark sits directly on the background — no circle frame */
  .jdp-mpoc-ring { display: inline-flex; align-items: center; justify-content: center; }
  .jdp-mpoc   { height: clamp(84px, 26vw, 118px); }
  .jdp-mascot { height: clamp(108px, 34vw, 152px); }
  /* orange CTA */
  #menu.jdp-start .jdp-cta {
    position: relative; z-index: 3;
    margin: 0;   /* flows directly under the logos; gap comes from .jdp-powered's bottom margin */
    width: min(56%, 236px);
    padding: 12px 20px;
    border: 3px solid #FFD21E;
    border-radius: 36px;
    background: linear-gradient(180deg, #ff8f22 0%, #f26f0c 100%);
    color: #fff; font-weight: 800; letter-spacing: 0.5px;
    font-size: clamp(15px, 4.2vw, 19px);
    text-transform: none;
    box-shadow: 0 8px 0 rgba(150,60,0,0.45), 0 14px 26px rgba(0,0,0,0.35);
    cursor: pointer;
  }
  #menu.jdp-start .jdp-cta:active { transform: translateY(3px); box-shadow: 0 5px 0 rgba(150,60,0,0.45), 0 8px 16px rgba(0,0,0,0.35); }
  /* bottom orange liquid blob (shared template asset) */
  .jdp-blob {
    position: absolute; z-index: 1; left: 0; right: 0; bottom: -1px;
    width: 100%; pointer-events: none;
  }
  .jdp-blob img { display: block; width: 100%; height: auto; }
  /* controls line inside the instructions panel */
  #menu.jdp-start .jdp-panel .hint {
    margin: 12px 0 0; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.18);
    font-size: clamp(11px, 3.2vw, 13px);
    color: rgba(255,255,255,0.72); line-height: 1.9;
  }
  #menu.jdp-start .jdp-panel .hint kbd {
    background: rgba(255,214,51,0.16); border: 1px solid rgba(255,214,51,0.35);
    padding: 2px 7px; border-radius: 5px; color: #FFD633;
    font-family: inherit; font-size: 0.92em; white-space: nowrap;
  }
  /* device-adaptive controls: keyboard by default, touch on coarse pointers */
  #menu.jdp-start .jdp-panel .hint-touch { display: none; }
  @media (hover: none) and (pointer: coarse) {
    #menu.jdp-start .jdp-panel .hint-keys  { display: none; }
    #menu.jdp-start .jdp-panel .hint-touch { display: inline; }
  }
  /* hide only the best-score line on this screen (controls now shown above) */
  #menu.jdp-start .best { display: none; }
  @media (max-height: 860px) {
    .jdp-frame { padding-bottom: clamp(76px, 18vh, 104px); }
    .jdp-title { margin-top: clamp(34px, 7vh, 56px); font-size: clamp(38px, 10vw, 64px); }
    .jdp-panel { margin-top: clamp(12px, 2.8vh, 18px); padding: 16px 18px 18px; }
    .jdp-powered { margin: clamp(10px, 2.4vh, 18px) 0 clamp(10px, 2.8vh, 18px); }
    .jdp-powered .lbl { margin-bottom: 10px; }
    .jdp-mpoc { height: clamp(72px, 20vh, 96px); }
    .jdp-mascot { height: clamp(96px, 24vh, 126px); }
    .jdp-start .jdp-panel .hint { margin-top: 10px; padding-top: 10px; line-height: 1.65; }
  }

  @media (max-height: 720px) {
    .jdp-frame { padding-bottom: 70px; }
    .jdp-title { margin-top: 26px; font-size: clamp(34px, 8vw, 54px); }
    .jdp-panel { width: min(88%, 344px); margin-top: 10px; padding: 14px 16px 16px; border-radius: 18px; }
    .jdp-panel .jdp-panel-head { margin-bottom: 8px; font-size: clamp(14px, 3.4vw, 16px); }
    .jdp-start .sub { font-size: clamp(12px, 2.8vw, 14px); line-height: 1.4; }
    .jdp-powered { margin: 10px 0 12px; }
    .jdp-powered .lbl { font-size: 14px; margin-bottom: 8px; }
    .jdp-logos { gap: clamp(8px, 2vw, 18px); }
    .jdp-mpoc { height: clamp(60px, 16vh, 84px); }
    .jdp-mascot { height: clamp(80px, 20vh, 112px); }
    .jdp-start .jdp-cta { width: min(62%, 224px); padding: 11px 18px; font-size: clamp(14px, 3.6vw, 17px); box-shadow: 0 6px 0 rgba(150,60,0,0.45), 0 10px 18px rgba(0,0,0,0.35); }
    .jdp-blob { opacity: 0.82; }
    .jdp-start .jdp-panel .hint { font-size: 11px; line-height: 1.5; }
  }

</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="hud" class="hidden">
  <div class="hud-row">
    <div class="jdp-pill">
      <span class="pill-label">Score</span>
      <span id="scoreEl" class="pill-value">0</span>
    </div>
    <div class="jdp-pill next">
      <span class="pill-label" id="nextLabel">Next</span>
      <span class="pill-value" id="nextPillValue"><img id="nextGemImg" alt=""></span>
    </div>
    <button id="muteBtn" class="mute" aria-label="AUDIO ON" aria-pressed="false">
      <svg viewBox="0 0 24 24"></svg>
    </button>
  </div>
</div>

<div id="gemLadder" class="gem-ladder hidden"></div>

<button id="endRunBtn" class="end-run hidden">END RUN</button>

<!-- Start menu — standardized JDP template (see .jdp-* CSS above) -->
<div id="menu" class="overlay jdp-start">
  <div class="jdp-frame">
    <span class="jdp-bokeh jdp-bk1"><img src="assets/start/gem-bokeh.webp?v=20260720.1" alt=""></span>
    <span class="jdp-bokeh jdp-bk2"><img src="assets/start/gem-bokeh.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g1"><img src="assets/start/gem-ruby.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g2"><img src="assets/start/gem-ruby.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g3"><img src="assets/start/gem-a.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g4"><img src="assets/start/gem-b.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g5"><img src="assets/start/gem-a.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g6"><img src="assets/start/gem-b.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g7"><img src="assets/start/gem-a.webp?v=20260720.1" alt=""></span>
    <span class="jdp-gem jdp-g8"><img src="assets/start/gem-b.webp?v=20260720.1" alt=""></span>

// =============================================================================
// CONFIG — all tunables in one place (CLAUDE.md §2 pattern 1)
// =============================================================================
const CONFIG = {
  // World units — bin is a portrait-oriented box. Canvas scales to fit viewport.
  BIN_W: 360,
  BIN_H: 600,
  WALL: 6,                       // visual wall thickness in world units
  DROPPER_Y: -50,                // dropper sits this many units above bin top
  DANGER_LINE_Y: 70,             // world Y inside bin: gems crossing above this are "overflowing"
  DANGER_LINE_DROP_START_S: 180, // elapsed seconds after which the danger line starts lowering (3:00)
  DANGER_LINE_DROP_RATE: 1,      // world units per second the line drops past that point

  // Physics — feed into Matter.js via the PHYSICS wrapper
  GRAVITY: 980,                  // world units / s² (maps to engine.gravity.y)
  RESTITUTION: 0.15,             // per-body bounce (Matter Bodies.circle option)
  SLEEP_VEL: 6,                  // overflow check treats slower than this as "settled"

  // Drop cadence — hold time per gem index. Each band covers a closed range;
  // past the last `to` we use the floor. Tap drops the gem early, otherwise it
  // auto-drops when the held timer fills. This IS the difficulty curve.
  DROP_CADENCE: [
    { to: 15,  seconds: 6 },     // 0:00 → 1:30
    { to: 30,  seconds: 5 },     // 1:30 → 2:45
    { to: 50,  seconds: 4 },     // 2:45 → 4:05
    { to: 75,  seconds: 3 },     // 4:05 → 5:20
    { to: 100, seconds: 2 },     // 5:20 → 6:10
    { to: 200, seconds: 1 },     // 6:10 → 7:50
  ],
  DROP_CADENCE_FLOOR_S: 0.5,     // survival floor — applied to drop 201 and beyond

  // Score-driven stress — tapers seed pool toward red-only AND stretches the
  // auto-drop interval as score climbs, so supply thins well before the 500
  // cap. Window starts earlier than the cap so the slowdown is felt while
  // the player still has runway (BEST-PRACTICES.md §05 difficulty curve).
  SCORE_STRESS_START: 250,
  SCORE_STRESS_FULL:  450,
  SCORE_STRESS_HOLD_STRETCH: 2.5, // auto-drop interval × (1 + this × scoreStress) near cap

  // Award-brake — multiplies merge point gains by (1 - BRAKE_MAX × smoothstep)
  // across the BRAKE window. Counter still ticks (never freezes), but each
  // merge gets visibly stingier so the score asymptotes near 500 even with
  // a long on-board chain still firing (CLAUDE.md §1.4: world calms down).
  SCORE_AWARD_BRAKE_START: 460,
  SCORE_AWARD_BRAKE_FULL:  540,
  SCORE_AWARD_BRAKE_MAX:   0.9,
  CLAIM_PREPARE_RETRY_DELAY_MS: 1500,
  CLAIM_PREPARE_TIMEOUT_MS: 8000,

  // Tiny cooldown between drops — just enough to debounce a stray double-tap.
  DROP_COOLDOWN_S: 0.08,

  // Game-over rules
  OVERFLOW_GRACE_S:         0.25, // body above danger line for this long → game over (was 2.0)
  OVERFLOW_SPAWN_EXEMPT_S:  0.40, // fresh gems get this long to free-fall through the danger zone

  // Storage
  STORAGE_KEY_BEST: 'gem-merge:best',
  STORAGE_KEY_MUTE: 'gem-merge:mute',

  // Dev flags (via query string)
  DEBUG: QS.get('debug') === '1',
};

// =============================================================================
// GEMS — tier ladder follows DESIGN.md §6.2 rainbow order.
//        Drop pool = first four tiers only (classic Suika rule).
// =============================================================================
const GEMS = [
  // ROYGBIV — the seven rainbow colours from DESIGN.md §6.2 (drop teal + pink
  // per the doc's "stay evenly spaced along the rainbow" subset guidance).
  // Geometric size progression 24 → 120 (~+30 % per tier) so each tier is
  // unmistakably bigger than the one below it.
  // `bubble` = sprite scale inside the bubble. The diamond's widest vertex is
  // ~1.17 r from centre, so 1/1.17 ≈ 0.854 is the largest scale that keeps
  // every vertex inside the bubble at any rotation. Tune per gem if a
  // specific SVG visually under/over-fills.
  { name: 'red',    radius:  20, points: 1, bubble: 0.85, asset: 'red.svg'    },  // tier 0 (smallest)
  { name: 'orange', radius:  26, points: 2, bubble: 0.85, asset: 'orange.svg' },  // tier 1
  { name: 'yellow', radius:  34, points: 3, bubble: 0.85, asset: 'yellow.svg' },  // tier 2
  { name: 'green',  radius:  45, points: 4, bubble: 0.85, asset: 'green.svg'  },  // tier 3
  { name: 'blue',   radius:  58, points: 5, bubble: 0.85, asset: 'blue.svg'   },  // tier 4
  { name: 'indigo', radius:  76, points: 6, bubble: 0.85, asset: 'indigo.svg' },  // tier 5
  { name: 'purple', radius: 100, points: 7, bubble: 0.85, asset: 'purple.svg' },  // tier 6 (terminal — pair clears, +7)
];
const MAX_TIER = GEMS.length - 1;

// Drop-pool weights: indexed by tier, blended by stress.
// Calm play (stress 0): plenty of variety, easy chains.
// High stress (stress 1+): mostly reds, hard to start a chain.
// Drop pool: Red / Orange / Yellow are the workhorses, Green is a rare guest.
// (Blue / Indigo / Purple only via merging — weights 0.)
const DROP_WEIGHTS_CALM   = [45, 32, 20, 3, 0, 0, 0];
const DROP_WEIGHTS_STRESS = [100, 0, 0, 0, 0, 0, 0]; // full taper at score ≥ 500 — only reds spawn

// =============================================================================
// Asset preload — gem images load once, then reused via drawImage at any size.
// =============================================================================
const gemImages = new Array(GEMS.length).fill(null);
let gemsLoaded = 0;
let allGemsReady = false;

function preloadGems(onReady) {
  for (let i = 0; i < GEMS.length; i++) {
    const img = new Image();
    img.onload = () => {
      gemsLoaded += 1;
      if (gemsLoaded === GEMS.length) { allGemsReady = true; onReady(); }
    };
    img.onerror = () => {
      console.warn('Failed to load gem', GEMS[i].name);
      gemsLoaded += 1;
      if (gemsLoaded === GEMS.length) { allGemsReady = true; onReady(); }
    };
    img.src = `./assets/gems/${GEMS[i].asset}`;
    gemImages[i] = img;
  }
}

// =============================================================================
// Sandbox-safe storage (wrapped per CLAUDE.md §0.4 / §6.3)
// =============================================================================
function storageGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v === null ? fallback : v; }
  catch (e) { return fallback; }
}
function storageSet(key, value) {
  try { localStorage.setItem(key, value); } catch (e) {}
}

// =============================================================================
// PHYSICS — Matter.js wrapper exposing { init, addBody, removeBody, step, bodies }.
//   Game code reads x/y/vx/vy/radius/tier/lifetime/overflowTimer through this
//   wrapper and never touches Matter directly. Swap is one module replacement.
// =============================================================================
const PHYSICS = (() => {
  const { Engine, World, Bodies, Body, Events } = Matter;

  // Velocity in Matter is "position units per simulation step" (step = 16.67 ms
  // at the default 60 Hz). The rest of the game thinks in units/second, so we
  // convert at the wrapper boundary.
  const MATTER_HZ = 60;

  let engine = null;
  let world = null;
  const matterToWrapper = new Map();
  const myBodies = [];
  let pendingMerges = [];

  function init(bounds) {
    engine = Engine.create({
      gravity: { x: 0, y: CONFIG.GRAVITY / 1000, scale: 0.001 },
      positionIterations: 10,    // higher = stabler stacks (Suika needs stable towers)
      velocityIterations: 8,
      constraintIterations: 4,
    });
    world = engine.world;
    matterToWrapper.clear();
    myBodies.length = 0;
    pendingMerges = [];

    // Walls: static rectangles set OUTSIDE the playfield with their inner edge
    // exactly at the bin border, so bodies' circle bound rests right on it.
    const w = bounds.right - bounds.left;
    const h = bounds.bottom - bounds.top;
    const wallThick = 200;       // very thick → no chance of tunneling at speed
    const wallOpts = { isStatic: true, friction: 0.4, frictionStatic: 0.6, restitution: 0.05 };
    World.add(world, [
      // Floor
      Bodies.rectangle(
        bounds.left + w / 2,
        bounds.bottom + wallThick / 2,
        w + wallThick * 2, wallThick, wallOpts,
      ),
      // Left wall
      Bodies.rectangle(
        bounds.left - wallThick / 2,
        bounds.top + h / 2,
        wallThick, h + wallThick * 2, wallOpts,
      ),
      // Right wall
      Bodies.rectangle(
        bounds.right + wallThick / 2,
        bounds.top + h / 2,
        wallThick, h + wallThick * 2, wallOpts,
      ),
      // (no ceiling — dropper / overflow logic owns the top edge)
    ]);

    // Same-tier contact → queue a merge for the post-step phase.
    Events.on(engine, 'collisionStart', (e) => {
      for (const pair of e.pairs) {
        const a = matterToWrapper.get(pair.bodyA.id);
        const c = matterToWrapper.get(pair.bodyB.id);
        if (a && c && a.tier === c.tier && a._alive && c._alive) {
          pendingMerges.push([a, c]);
        }
      }
    });
  }

  function addBody({ x, y, radius, tier, vx = 0, vy = 0 }) {
    const matterBody = Bodies.circle(x, y, radius, {
      restitution: CONFIG.RESTITUTION,
      friction: 0.20,             // bumped — more rolling on contact, less sliding
      frictionStatic: 0.5,        // bumped — harder to start sliding, easier to tumble
      frictionAir: 0.006,         // gentle linear/angular drag → settles without feeling sluggish
      density: 0.0015,
      slop: 0.01,                 // tighter than default so visible gems sit flush
    });
    if (vx !== 0 || vy !== 0) {
      Body.setVelocity(matterBody, { x: vx / MATTER_HZ, y: vy / MATTER_HZ });
    }
    // Small initial spin so the gem visibly tumbles inside its bubble in flight
    // (a circular body has no contact torque while free-falling).
    Body.setAngularVelocity(matterBody, (Math.random() - 0.5) * 0.08);
    World.add(world, matterBody);

    // Wrapper exposes the surface the rest of the game depends on. Position +
    // velocity + angle are getters so the read always reflects the latest Matter state.
    const wrapper = {
      _matter: matterBody,
      id: matterBody.id,
      radius, tier,
      overflowTimer: 0,
      lifetime: 0,
      _alive: true,
      get x()     { return matterBody.position.x; },
      get y()     { return matterBody.position.y; },
      get vx()    { return matterBody.velocity.x * MATTER_HZ; },
      get vy()    { return matterBody.velocity.y * MATTER_HZ; },
      get angle() { return matterBody.angle; },
    };
    matterToWrapper.set(matterBody.id, wrapper);
    myBodies.push(wrapper);
    return wrapper;
  }

  function removeBody(wrapper) {
    if (!wrapper._alive) return;
    wrapper._alive = false;
    World.remove(world, wrapper._matter);
    matterToWrapper.delete(wrapper._matter.id);
    const i = myBodies.indexOf(wrapper);
    if (i !== -1) myBodies.splice(i, 1);
  }

  function step(dt, onMergePair) {
    // Track lifetime in seconds so the overflow grace logic stays unit-correct.
    for (const b of myBodies) b.lifetime += dt;

    // Substep to keep the per-step ms ≤ ~16.67 even on slow frames. Without
    // this Matter can mis-resolve a tall stack the player sees as "jitter".
    const totalMs = Math.min(dt * 1000, 50);
    const stepMs = 1000 / MATTER_HZ;
    const substeps = Math.max(1, Math.ceil(totalMs / stepMs));
    const subDt = totalMs / substeps;
    for (let i = 0; i < substeps; i++) Engine.update(engine, subDt);

    // Drain merge queue once per frame. Consumed-set prevents a body merging
    // twice in a single frame if it touched two same-tier neighbours at once.
    if (pendingMerges.length && onMergePair) {
      const consumed = new Set();
      for (const [a, c] of pendingMerges) {
        if (consumed.has(a.id) || consumed.has(c.id)) continue;
        if (!a._alive || !c._alive) continue;
        consumed.add(a.id); consumed.add(c.id);
        onMergePair(a, c);
      }
    }
    pendingMerges.length = 0;
  }

  // Dial gravity at runtime so the fall can feel "heavier" as cadence tightens.
  // multiplier is applied on top of the base CONFIG.GRAVITY set in init().
  function setGravity(multiplier) {
    if (!engine) return;
    engine.gravity.y = (CONFIG.GRAVITY / 1000) * multiplier;
  }

  return {
    init, addBody, removeBody, step, setGravity,
    get bodies() { return myBodies; },
  };
})();

// =============================================================================
// State
// =============================================================================
const state = {
  phase: 'MENU',                // MENU | PLAYING | GAME_OVER
  score: 0,
  merges: 0,
  topTier: 0,
  best: parseInt(storageGet(CONFIG.STORAGE_KEY_BEST, '0'), 10) || 0,
  muted: storageGet(CONFIG.STORAGE_KEY_MUTE, '0') === '1',
  startTime: 0,
  elapsedAtPause: 0,
  paused: false,
  pausedAt: 0,

  heldTier: 0,                  // tier index of the gem in the dropper
  nextTier: 0,                  // tier index queued to follow
  dropperX: 0,                  // world X where the held gem hovers (follows pointer)
  holdTime: 0,                  // seconds the current gem has been held
  cooldown: 0,                  // seconds until the next gem is droppable
  dropsPlaced: 0,               // total drops this run — indexes the §DROP_CADENCE table
  pointerActive: false,
  lastDropAt: 0,

  effects: [],                  // sparkle rings, +N floaters, screen flashes
  shake: { t: 0, mag: 0 },
};

// =============================================================================
// Sizing / viewport — canvas in CSS pixels, world coords scaled into a fitted box
// =============================================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const view = {
  w: 0, h: 0, dpr: 1,
  scale: 1,                     // world units → CSS pixels
  binPxX: 0, binPxY: 0,         // CSS-pixel top-left of bin
  binPxW: 0, binPxH: 0,
};

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  view.w = window.innerWidth;
  view.h = window.innerHeight;
  view.dpr = dpr;
  canvas.width = Math.floor(view.w * dpr);
  canvas.height = Math.floor(view.h * dpr);
  canvas.style.width = view.w + 'px';
  canvas.style.height = view.h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Reserve top space for HUD (~52 px) and bottom space for gem ladder + end-run pill.
  const reserveTop = 60;
  const reserveBottom = 112;
  const availW = view.w - 24;
  const availH = view.h - reserveTop - reserveBottom;
  // Bin world dimensions plus a dropper headroom band above (CONFIG.DROPPER_Y).
  const worldW = CONFIG.BIN_W;
  const worldH = CONFIG.BIN_H + (-CONFIG.DROPPER_Y) + 40;  // include dropper band + margin
  const scale = Math.min(availW / worldW, availH / worldH);
  view.scale = scale;

  // Centre the world box horizontally.
  view.binPxW = CONFIG.BIN_W * scale;
  view.binPxH = CONFIG.BIN_H * scale;
  view.binPxX = (view.w - view.binPxW) / 2;
  view.binPxY = reserveTop + (-CONFIG.DROPPER_Y) * scale;

  // Pin the in-game gem ladder to the bin width and just below the bin's bottom edge.
  const ladderEl = document.getElementById('gemLadder');
  if (ladderEl) {
    ladderEl.style.left = view.binPxX + 'px';
    ladderEl.style.width = view.binPxW + 'px';
    ladderEl.style.top = (view.binPxY + view.binPxH + 10) + 'px';
  }
}
window.addEventListener('resize', resize);
resize();

// World → CSS pixels. Bin world origin (0,0) is bin top-left interior.
function worldToPx(wx, wy) {
  return { x: view.binPxX + wx * view.scale, y: view.binPxY + wy * view.scale };
}

// =============================================================================
// Cadence + drop-pool — the §05 difficulty curve, driven by drops placed
// =============================================================================
function elapsedSeconds() {
  if (!state.startTime) return 0;
  if (state.paused) return state.elapsedAtPause;
  return (performance.now() - state.startTime) / 1000;
}
function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function smoothstep(edge0, edge1, x) {
  const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
  return t * t * (3 - 2 * t);
}

// Score-based stress is kept (drives drop-pool skew near the 500 cap per §05).
// Time-based stress is gone — cadence handles all the time pressure now.
function scoreStress() {
  return smoothstep(CONFIG.SCORE_STRESS_START, CONFIG.SCORE_STRESS_FULL, state.score);
}

// Award-brake — scales raw merge points down as score crosses the BRAKE
// window. Returns the integer points to actually credit (and to display in
// the floater) so the HUD and the visible "+N" stay in sync.
function brakedAward(raw) {
  const brake = smoothstep(CONFIG.SCORE_AWARD_BRAKE_START, CONFIG.SCORE_AWARD_BRAKE_FULL, state.score);
  const mult = 1 - CONFIG.SCORE_AWARD_BRAKE_MAX * brake;
  return Math.max(0, Math.round(raw * mult));
}

// Pick a drop tier weighted by score stress. Pass `forbidden` to exclude one
// tier from the roll — used to enforce "no back-to-back same colour".
function pickDropTier(forbidden = -1) {
  const s = clamp(scoreStress(), 0, 1);
  const weights = new Array(GEMS.length).fill(0);
  let total = 0;
  for (let i = 0; i < weights.length; i++) {
    if (i === forbidden) continue;
    weights[i] = lerp(DROP_WEIGHTS_CALM[i], DROP_WEIGHTS_STRESS[i], s);
    total += weights[i];
  }
  if (total === 0) return 0;   // safety net — only fires if the pool is empty
  let roll = Math.random() * total;
  for (let i = 0; i < weights.length; i++) {
    roll -= weights[i];
    if (roll <= 0) return i;
  }
  return 0;
}

// Hold time for the nth drop (1-indexed). `state.dropsPlaced` is the count of
// drops already committed; the currently-held gem is drop #(dropsPlaced + 1).
function holdTimeForDrop(n) {
  for (const band of CONFIG.DROP_CADENCE) {
    if (n <= band.to) return band.seconds;
  }
  return CONFIG.DROP_CADENCE_FLOOR_S;
}
function autoDropAfterSeconds() {
  const base = holdTimeForDrop(state.dropsPlaced + 1);
  // Stretch the interval as score nears the 500 cap so the world calms down
  // rather than the counter freezing (CLAUDE.md §1.4).
  return base * (1 + CONFIG.SCORE_STRESS_HOLD_STRETCH * scoreStress());
}

// After DANGER_LINE_DROP_START_S elapsed, the danger line lowers by
// DANGER_LINE_DROP_RATE world units per second — the playable area shrinks
// until overflow becomes unavoidable. Clamped at the bin floor so it can't
// render outside the bin if a run somehow lasts long enough.
function currentDangerLineY() {
  const elapsed = elapsedSeconds();
  const base = CONFIG.DANGER_LINE_Y;
  if (elapsed <= CONFIG.DANGER_LINE_DROP_START_S) return base;
  const drop = (elapsed - CONFIG.DANGER_LINE_DROP_START_S) * CONFIG.DANGER_LINE_DROP_RATE;
  return Math.min(base + drop, CONFIG.BIN_H);
}

// Gravity multiplier rises as the cadence tightens — calmer drops at the
// start feel light, late-game drops feel heavier. Maps the current hold time
// linearly from the slowest band (1.0×) to the survival floor (GRAVITY_MAX×).
const GRAVITY_MAX_MULT = 2.0;
function gravityMultiplier() {
  const slowest = CONFIG.DROP_CADENCE[0].seconds;
  const fastest = CONFIG.DROP_CADENCE_FLOOR_S;
  const hold = autoDropAfterSeconds();
  const t = clamp((slowest - hold) / (slowest - fastest), 0, 1);
  return lerp(1.0, GRAVITY_MAX_MULT, t);
}

// =============================================================================
// Gameplay actions — drop, merge, game-over
// =============================================================================
function rollNextTier() {
  state.heldTier = state.nextTier;
  // Forbid the newly-held tier so the next drop is always a different colour.
  state.nextTier = pickDropTier(state.heldTier);
  state.holdTime = 0;
  updateNextPreview();
}

function dropHeldGem() {
  if (state.phase !== 'PLAYING') return;
  if (state.cooldown > 0) return;
  const gem = GEMS[state.heldTier];
  const x = clamp(state.dropperX, gem.radius, CONFIG.BIN_W - gem.radius);
  PHYSICS.addBody({
    x,
    y: 0 + gem.radius + 2,        // just inside the bin from the top
    radius: gem.radius,
    tier: state.heldTier,
  });
  state.dropsPlaced += 1;
  state.cooldown = CONFIG.DROP_COOLDOWN_S;
  state.lastDropAt = performance.now();
  rollNextTier();
  playDrop(state.heldTier);
}

function onMerge(a, c) {
  if (a.tier === MAX_TIER) {
    // Terminal pair clear (two top-tier purples) — vaporize both, large bonus, screen flash.
    PHYSICS.removeBody(a);
    PHYSICS.removeBody(c);
    const mx = (a.x + c.x) / 2;
    const my = (a.y + c.y) / 2;
    const awarded = brakedAward(GEMS[MAX_TIER].points);
    state.score += awarded;
    state.merges += 1;
    if (awarded > 0) spawnFloater(mx, my, `+${awarded}`, '#FFE258', 22);
    spawnRing(mx, my, GEMS[MAX_TIER].radius * 1.6, '#FFD633');
    state.effects.push({ kind: 'flash', t: 0, dur: 0.35 });
    state.shake = { t: 0.4, mag: 6 };
    playPinkClear();
    return;
  }
  const newTier = a.tier + 1;
  const newGem = GEMS[newTier];
  const mx = (a.x + c.x) / 2;
  const my = (a.y + c.y) / 2;
  const mvx = (a.vx + c.vx) / 2;
  const mvy = (a.vy + c.vy) / 2;
  PHYSICS.removeBody(a);
  PHYSICS.removeBody(c);
  PHYSICS.addBody({ x: mx, y: my, radius: newGem.radius, tier: newTier, vx: mvx, vy: mvy });
  const awarded = brakedAward(newGem.points);
  state.score += awarded;
  state.merges += 1;
  if (newTier > state.topTier) state.topTier = newTier;
  if (awarded > 0) spawnFloater(mx, my, `+${awarded}`, '#FFFFFF', 16);
  spawnRing(mx, my, newGem.radius * 1.4, gemColorHex(newTier));
  playMerge(newTier);
}

function gemColorHex(tier) {
  // Loose hue cue for ring effects — ROYGBIV, matches the GEMS ladder order.
  return ['#9E131F','#FF8A1A','#FFD633','#37C25A','#1E63E0','#3F2BA8','#7C2DB0'][tier];
}

function spawnFloater(x, y, text, color, size) {
  state.effects.push({ kind: 'floater', x, y, text, color, size, t: 0, dur: 0.85 });
}
function spawnRing(x, y, baseR, color) {
  state.effects.push({ kind: 'ring', x, y, baseR, color, t: 0, dur: 0.45 });
}

function updateOverflow(dt) {
  // Game over the moment any settled gem's top edge crosses the danger line.
  // Fresh gems get a short OVERFLOW_SPAWN_EXEMPT_S window to fall through the
  // danger zone; after that the OVERFLOW_GRACE_S timer is just a single-frame
  // jitter filter (≈0.25 s feels near-instant to the player).
  if (state.phase !== 'PLAYING') return;
  const dangerY = currentDangerLineY();
  for (const b of PHYSICS.bodies) {
    const topEdge = b.y - b.radius;
    if (topEdge >= dangerY) { b.overflowTimer = 0; continue; }
    if (b.lifetime < CONFIG.OVERFLOW_SPAWN_EXEMPT_S) { b.overflowTimer = 0; continue; }
    b.overflowTimer += dt;
    if (b.overflowTimer > CONFIG.OVERFLOW_GRACE_S) {
      endGame('overflow');
      return;
    }
  }
}

// =============================================================================
// Drawing
// =============================================================================
function drawBin() {
  const { binPxX, binPxY, binPxW, binPxH } = view;
  // Wall plate behind the interior — brick-red translucent inside.
  ctx.save();
  ctx.fillStyle = 'rgba(155, 19, 31, 0.18)';
  roundRect(binPxX, binPxY, binPxW, binPxH, 18 * view.scale);
  ctx.fill();
  // Border — DESIGN.md §5.12 style: 2 px Dark Yellow.
  ctx.strokeStyle = '#FFB603';
  ctx.lineWidth = Math.max(2, 2 * view.scale);
  roundRect(binPxX, binPxY, binPxW, binPxH, 18 * view.scale);
  ctx.stroke();
  // Danger line — dashed.
  const dangerPx = worldToPx(0, currentDangerLineY());
  ctx.setLineDash([8, 6]);
  ctx.strokeStyle = 'rgba(255, 214, 51, 0.55)';
  ctx.lineWidth = Math.max(1, 1.5 * view.scale);
  ctx.beginPath();
  ctx.moveTo(binPxX + 4, dangerPx.y);
  ctx.lineTo(binPxX + binPxW - 4, dangerPx.y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawDropper() {
  if (state.phase !== 'PLAYING') return;
  const gem = GEMS[state.heldTier];
  const x = clamp(state.dropperX, gem.radius, CONFIG.BIN_W - gem.radius);
  // Vertical guide line down to bin floor
  const top = worldToPx(x, CONFIG.DROPPER_Y);
  const bot = worldToPx(x, CONFIG.BIN_H);
  ctx.save();
  ctx.strokeStyle = 'rgba(255, 214, 51, 0.22)';
  ctx.lineWidth = Math.max(1, 1 * view.scale);
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(top.x, top.y);
  ctx.lineTo(bot.x, bot.y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
  // Held gem (hidden during the brief debounce cooldown after a drop).
  if (state.cooldown <= 0) {
    drawGemSprite(x, CONFIG.DROPPER_Y, state.heldTier);
  }
}

// Source SVGs have transparent padding inside the 1000×900 viewBox:
//   visible diamond spans x∈[40,960], y∈[50,880]
//   → 92.0 % wide, 92.2 % tall, with the visible centre 1.67 % below the
//     sprite centre (more top padding than bottom).
const SPRITE_VIS_W_FRAC        = 0.920;
const SPRITE_VIS_H_FRAC        = 0.922;
const SPRITE_VIS_CENTER_Y_FRAC = 0.5167;

function drawGemSprite(wx, wy, tier, scale = 1, angle = 0) {
  const gem = GEMS[tier];
  const img = gemImages[tier];
  const p = worldToPx(wx, wy);
  const r = gem.radius * view.scale * scale;
  const tint = gemColorHex(tier);

  // Layer order (back → front), so the gem appears to be inside the glass:
  //   1. Bubble back-side (radial fill — depth cue)
  //   2. Gem sprite (the object inside)
  //   3. Bubble front-side (outer rim + inner refraction + specular shine)

  // 1. Soft radial fill: bright spot at upper-left fading to a gem-tinted rim.
  //    Suggests volumetric glass without overpowering the gem inside.
  const fill = ctx.createRadialGradient(
    p.x - r * 0.35, p.y - r * 0.35, r * 0.1,   // light source upper-left
    p.x, p.y, r,
  );
  fill.addColorStop(0,    'rgba(255, 255, 255, 0.22)');
  fill.addColorStop(0.65, 'rgba(255, 255, 255, 0)');
  fill.addColorStop(1,    tint + '28');         // ~16 % alpha tint at the rim
  ctx.fillStyle = fill;
  ctx.beginPath();
  ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
  ctx.fill();

  // 2. Gem sprite — scaled by this tier's per-gem `bubble` ratio.
  const gr = r * (gem.bubble || 0.85);
  const drawW = (2 * gr) / SPRITE_VIS_W_FRAC;
  const drawH = (2 * gr) / SPRITE_VIS_H_FRAC;
  if (img && img.complete && img.naturalWidth) {
    if (angle !== 0) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(angle);
      ctx.drawImage(
        img,
        -drawW / 2,
        -drawH * SPRITE_VIS_CENTER_Y_FRAC,
        drawW, drawH,
      );
      ctx.restore();
    } else {
      ctx.drawImage(
        img,
        p.x - drawW / 2,
        p.y - drawH * SPRITE_VIS_CENTER_Y_FRAC,
        drawW, drawH,
      );
    }
  } else {
    // Fallback: solid disc tinted by tier so missing assets don't blank the playfield.
    ctx.fillStyle = tint;
    ctx.beginPath();
    ctx.arc(p.x, p.y, gr, 0, Math.PI * 2);
    ctx.fill();
  }

  // 3a. Outer rim — gem-tinted "wall" of the bubble (this is what visually
  //     touches walls and neighbouring bubbles; matches body radius exactly).
  ctx.strokeStyle = tint + 'B0';                // ~70 % alpha
  ctx.lineWidth = Math.max(1.5, 1.8 * view.scale);
  ctx.beginPath();
  ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
  ctx.stroke();

  // 3b. Inner refraction ring — subtle white inset overlaid on top of the gem
  //     to suggest glass thickness from the viewer's side.
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.20)';
  ctx.lineWidth = Math.max(1, 1.0 * view.scale);
  ctx.beginPath();
  ctx.arc(p.x, p.y, r * 0.88, 0, Math.PI * 2);
  ctx.stroke();

  // 3c. Specular highlight — small arc in the upper-left, drawn ON TOP of
  //     the gem so it reads as a reflection on the glass surface.
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.70)';
  ctx.lineWidth = Math.max(1.5, 2 * view.scale);
  ctx.beginPath();
  ctx.arc(p.x, p.y, r * 0.80, Math.PI * 1.15, Math.PI * 1.40);
  ctx.stroke();
}

function drawBodies() {
  // Body rotates from friction torque; we render the inner gem with that
  // rotation but the bubble stays upright. The bubble (body-radius circle)
  // is what touches walls / neighbours, so visuals match the physics exactly.
  for (const b of PHYSICS.bodies) drawGemSprite(b.x, b.y, b.tier, 1, b.angle);
}

function drawEffects() {
  for (const e of state.effects) {
    if (e.kind === 'flash') {
      const alpha = (1 - e.t / e.dur) * 0.55;
      ctx.save();
      ctx.fillStyle = `rgba(255, 230, 120, ${alpha})`;
      ctx.fillRect(0, 0, view.w, view.h);
      ctx.restore();
    } else if (e.kind === 'ring') {
      const k = e.t / e.dur;
      const alpha = 1 - k;
      const r = e.baseR * (0.6 + k * 1.4) * view.scale;
      const p = worldToPx(e.x, e.y);
      ctx.save();
      ctx.globalAlpha = Math.max(0, alpha) * 0.85;
      ctx.strokeStyle = e.color;
      ctx.lineWidth = Math.max(2, 2.5 * view.scale * (1 - k));
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    } else if (e.kind === 'floater') {
      const k = e.t / e.dur;
      const alpha = 1 - k;
      const p = worldToPx(e.x, e.y - k * 28);
      ctx.save();
      ctx.globalAlpha = Math.max(0, alpha);
      ctx.fillStyle = e.color;
      ctx.font = `800 ${Math.round(e.size * view.scale)}px Poppins, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.6)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 2;
      ctx.fillText(e.text, p.x, p.y);
      ctx.restore();
    }
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
}

function drawDebug() {
  if (!CONFIG.DEBUG) return;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(8, view.h - 84, 200, 76);
  ctx.fillStyle = '#FFD633';
  ctx.font = '11px Poppins, monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`drop #${state.dropsPlaced + 1}  hold ${autoDropAfterSeconds().toFixed(2)}s`, 12, view.h - 80);
  ctx.fillText(`held ${state.holdTime.toFixed(2)}s  cooldown ${state.cooldown.toFixed(2)}s`, 12, view.h - 66);
  ctx.fillText(`gravity ×${gravityMultiplier().toFixed(2)}  stress ${scoreStress().toFixed(2)}`, 12, view.h - 52);
  ctx.fillText(`bodies: ${PHYSICS.bodies.length}  danger y=${currentDangerLineY().toFixed(0)}`, 12, view.h - 38);
  ctx.fillText(`elapsed: ${elapsedSeconds().toFixed(1)}s`, 12, view.h - 24);
  ctx.restore();
}

// =============================================================================
// Audio — Web Audio synthesis (CLAUDE.md §0.4)
// =============================================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(opts) {
  if (state.muted) return;
  ensureAudio();
  if (!audioCtx) return;
  const t = audioCtx.currentTime + (opts.delay || 0);
  const dur = opts.dur || 0.15;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = opts.type || 'sine';
  osc.frequency.setValueAtTime(opts.freq, t);
  if (opts.freqEnd !== undefined) {
    osc.frequency.exponentialRampToValueAtTime(Math.max(20, opts.freqEnd), t + dur);
  }
  g.gain.setValueAtTime(opts.gain || 0.12, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + dur + 0.05);
}
function playDrop(tier) {
  // Lower-pitched thud for bigger gems
  const base = 320 - tier * 18;
  playTone({ freq: base, freqEnd: base * 0.55, type: 'triangle', dur: 0.14, gain: 0.16 });
}
function playMerge(newTier) {
  // Each merge climbs the scale — feels like an arpeggio chain
  const base = 380 + newTier * 70;
  playTone({ freq: base, type: 'triangle', dur: 0.12, gain: 0.16 });
  playTone({ freq: base * 1.5, type: 'sine', dur: 0.18, gain: 0.10, delay: 0.04 });
}
function playPinkClear() {
  const base = 660;
  for (let i = 0; i < 4; i++) {
    playTone({ freq: base * Math.pow(1.25, i), type: 'triangle', dur: 0.18, gain: 0.16, delay: i * 0.06 });
  }
}
function playGameOver() {
  playTone({ freq: 280, freqEnd: 80, type: 'sawtooth', dur: 0.6, gain: 0.22 });
}

function syncClaimButton() {
  if (isZeroScore()) {

    dom.claimBtn.disabled = false;

  }

    dom.claimBtn.textContent = COPY.claim;

  dom.claimNote.classList.add('hidden');
  dom.claimBtn.disabled = claimLocked;
  dom.claimBtn.textContent = COPY.claim;

// =============================================================================
// Lifecycle
// =============================================================================
function startGame() {
  claimLocked = false;
  claimUnavailable = false;
  claimErrorMessage = '';
  claimTouchArmed = false;
  claimUrlReady = null;
  claimPreparing = false;
  claimPrepareSeq++;
  state.phase = 'PLAYING';
  state.score = 0;
  state.merges = 0;
  state.topTier = 0;
  state.startTime = performance.now();
  state.elapsedAtPause = 0;
  state.paused = false;
  state.cooldown = 0;
  state.holdTime = 0;
  state.dropsPlaced = 0;
  state.effects = [];
  state.shake = { t: 0, mag: 0 };
  state.dropperX = CONFIG.BIN_W / 2;
  if (dom.nextPillValue) {
    dom.nextPillValue.style.setProperty('--timer-fill', '0%');
  }

  PHYSICS.init({ left: 0, right: CONFIG.BIN_W, top: CONFIG.DROPPER_Y - 100, bottom: CONFIG.BIN_H });

  state.nextTier = pickDropTier();
  rollNextTier();

  dom.menu.classList.add('hidden');
  dom.gameOver.classList.add('hidden');
  dom.endConfirm.classList.add('hidden');
  dom.hud.classList.remove('hidden');
  dom.endRunBtn.classList.remove('hidden');
  dom.gemLadder.classList.remove('hidden');
  updateHud();
}

function endGame(reason) {
  if (state.phase === 'GAME_OVER') return;
  state.phase = 'GAME_OVER';
  state.elapsedAtPause = elapsedSeconds();

  const isNewBest = state.score > state.best;
  if (isNewBest) {
    state.best = state.score;
    storageSet(CONFIG.STORAGE_KEY_BEST, String(state.best));
  }

  // Only one end-of-game string per CLAUDE.md §6.4 — this game has no countdown,
  // so every termination is GAME OVER. TIME'S UP! is reserved for round-timer games.
  dom.goTitle.textContent = COPY.gameOver;
  dom.goNewBest.classList.toggle('hidden', !isNewBest);

  const topGemName = GEMS[state.topTier].name.charAt(0).toUpperCase() + GEMS[state.topTier].name.slice(1);
  dom.finalStats.innerHTML =
    `<div class="label">${COPY.statScore}</div><div class="value">${state.score}</div>` +
    `<div class="label">${COPY.statMerges}</div><div class="value">${state.merges}</div>` +
    `<div class="label">${COPY.statTopGem}</div><div class="value">${topGemName}</div>` +
    `<div class="label">${COPY.statBest}</div><div class="value">${state.best}</div>`;
  syncClaimButton();
  prepareClaimUrl();

  dom.endRunBtn.classList.add('hidden');
  dom.gemLadder.classList.add('hidden');
  // Brief delay so the overflow / final merge reads before the modal swoops in.
  setTimeout(() => {
    dom.hud.classList.add('hidden');
    dom.gameOver.classList.remove('hidden');
  }, reason === 'overflow' ? 600 : 250);
  if (reason === 'overflow') playGameOver();
}

// =============================================================================
// CLAIM SCORE callback flow - supports default callback flow (sec 6.5) and Genet encrypted flow (sec 6.6)
// =============================================================================
let claimLocked = false;
let claimUnavailable = false;
let claimErrorMessage = '';
let claimTouchArmed = false;
let claimUrlReady = null;
let claimPrepareSeq = 0;
let claimPreparing = false;
const claimContext = window.ClaimCallback.getClaimContext();
window.ClaimCallback.applyPageTitleToHeading(claimContext.pageTitle, 'menuTitle');

function hasClaimCallback() {
  return !!window.ClaimCallback.resolveCallbackUrl(claimContext, null);
}

function getClaimErrorMessage(error) {
  const detail = error && typeof error.message === 'string' ? error.message.trim() : '';
  return detail ? `${COPY.claimFailed}: ${detail}` : COPY.claimFailed;
}

function withTimeout(promise, ms) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error('timed out')), ms);
    promise.then(
      (value) => { clearTimeout(timer); resolve(value); },
      (error) => { clearTimeout(timer); reject(error); }
    );
  });
}

async function submitClaim() {
  if (isZeroScore()) {
    claimErrorMessage = '';
    startGame();
    return;
  }
  if (claimLocked) return;
  if (claimUrlReady) {
    claimLocked = true;
    syncClaimButton();
    window.location.assign(claimUrlReady);
    return;
  }
  if (claimPreparing || claimUnavailable) return;
  await prepareClaimUrl(false);
}

async function prepareClaimUrl(retry) {
  claimUrlReady = null;

  if (isZeroScore()) {
    claimPreparing = false;
    return;
  }
  if (!hasClaimCallback()) {
    claimPreparing = false;
    claimUnavailable = true;
    claimErrorMessage = '';
    syncClaimButton();
    return;
  }

  const extra = {
    merges: state.merges,
    top_tier: state.topTier,
    duration_ms: Math.round(elapsedSeconds() * 1000),
  };
  const seq = ++claimPrepareSeq;
  claimPreparing = true;
  claimUnavailable = false;
  claimErrorMessage = '';
  syncClaimButton();

  try {
    const url = await withTimeout(window.ClaimCallback.buildClaimUrl({
      claimContext,
      score: Math.max(0, state.score | 0),
      gameName: 'gem-merge',
      fallbackUrl: null,
      extraData: extra,
      extraQuery: extra,
    }), CONFIG.CLAIM_PREPARE_TIMEOUT_MS);

    if (seq !== claimPrepareSeq) return;
    if (url) {
      claimUrlReady = url;
      claimPreparing = false;
      claimLocked = true;
      syncClaimButton();
      window.location.assign(claimUrlReady);
      return;
    } else {
      console.log('[gem-merge] claim prepare unavailable: invalid or missing callback context', extra);
      claimPreparing = false;
      claimUnavailable = true;
      claimErrorMessage = '';
      syncClaimButton();
    }
  } catch (e) {
    if (seq !== claimPrepareSeq) return;
    console.warn('[gem-merge] claim prepare failed:', e);
    claimPreparing = false;
    claimUnavailable = false;
    claimErrorMessage = getClaimErrorMessage(e);
    syncClaimButton();
  }
}
// =============================================================================
// Input — pointer position drives dropper, click drops, keyboard fallback
// =============================================================================
function pointerToWorldX(clientX) {
  return (clientX - view.binPxX) / view.scale;
}

function handlePointerMove(clientX) {
  if (state.phase !== 'PLAYING') return;
  state.dropperX = clamp(pointerToWorldX(clientX), 0, CONFIG.BIN_W);
  state.pointerActive = true;
}

canvas.addEventListener('mousemove', (e) => handlePointerMove(e.clientX));
canvas.addEventListener('mousedown', (e) => {
  e.preventDefault();
  if (state.phase !== 'PLAYING') return;
  handlePointerMove(e.clientX);
  dropHeldGem();
});
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (e.touches.length) handlePointerMove(e.touches[0].clientX);
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length) handlePointerMove(e.touches[0].clientX);
}, { passive: false });
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (state.phase === 'PLAYING') dropHeldGem();
}, { passive: false });

window.addEventListener('keydown', (e) => {
  if (state.phase !== 'PLAYING') return;
  const step = 18;
  if (e.code === 'ArrowLeft')  { state.dropperX = clamp(state.dropperX - step, 0, CONFIG.BIN_W); e.preventDefault(); }
  if (e.code === 'ArrowRight') { state.dropperX = clamp(state.dropperX + step, 0, CONFIG.BIN_W); e.preventDefault(); }
  if (e.code === 'Space' && !e.repeat) { dropHeldGem(); e.preventDefault(); }
});

dom.startBtn.addEventListener('click', () => { ensureAudio(); startGame(); });
dom.claimBtn.addEventListener('click', submitClaim);
dom.claimBtn.addEventListener('touchstart', () => {
  claimTouchArmed = true;
}, { passive: true });
dom.claimBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  e.stopPropagation();
  if (!claimTouchArmed) {
    const noteText = String(dom.claimNote.textContent || '').trim();
    if (!dom.claimBtn.disabled && !isZeroScore() && dom.claimNote.classList.contains('hidden') && !noteText) {
      dom.claimNote.textContent = COPY.claimFailed;
      dom.claimNote.classList.remove('hidden');
    }
    return;
  }
  claimTouchArmed = false;
  if (!dom.claimBtn.disabled) dom.claimBtn.click();
}, { passive: false });
dom.claimBtn.addEventListener('touchcancel', () => {
  claimTouchArmed = false;
}, { passive: true });
dom.muteBtn.addEventListener('click', () => {
  state.muted = !state.muted;
  storageSet(CONFIG.STORAGE_KEY_MUTE, state.muted ? '1' : '0');
  updateMuteUI();
  if (!state.muted) { ensureAudio(); playTone({ freq: 660, type: 'sine', dur: 0.08, gain: 0.1 }); }
});

dom.endRunBtn.addEventListener('click', () => {
  if (state.phase !== 'PLAYING') return;
  state.paused = true;
  state.pausedAt = performance.now();
  state.elapsedAtPause = (state.pausedAt - state.startTime) / 1000;
  dom.endConfirm.classList.remove('hidden');
});
dom.cancelEndBtn.addEventListener('click', () => {
  if (state.paused) {
    const pausedFor = performance.now() - state.pausedAt;
    state.startTime += pausedFor;
    state.paused = false;
  }
  dom.endConfirm.classList.add('hidden');
});
dom.confirmEndBtn.addEventListener('click', () => {
  dom.endConfirm.classList.add('hidden');
  endGame('early');
  // Show the game-over card sooner on a deliberate end.
  setTimeout(() => {
    dom.hud.classList.add('hidden');
    dom.gameOver.classList.remove('hidden');
  }, 100);
});

// Pause clock on tab hide so the wall-clock timer can't run away invisibly.
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (state.phase === 'PLAYING' && !state.paused) {
      state.paused = true;
      state.pausedAt = performance.now();
      state.elapsedAtPause = (state.pausedAt - state.startTime) / 1000;
    }
  } else {
    if (state.paused && state.phase === 'PLAYING') {
      const pausedFor = performance.now() - state.pausedAt;
      state.startTime += pausedFor;
      state.paused = false;
      lastT = 0;
    }
  }
});

// =============================================================================
// Main loop
// =============================================================================
let lastT = 0;
function loop(t) {
  if (!lastT) lastT = t;
  const dt = Math.min((t - lastT) / 1000, 1 / 30);
  lastT = t;

  if (state.phase === 'PLAYING' && !state.paused) {
    // Drop cadence (CONFIG.DROP_CADENCE): cooldown debounces a fresh drop,
    // then the held gem appears and its hold timer ticks. When the timer
    // fills, the gem auto-drops. The Next pill background is the visual.
    let fillPct = 0;
    if (state.cooldown > 0) {
      state.cooldown = Math.max(0, state.cooldown - dt);
    } else {
      state.holdTime += dt;
      const limit = autoDropAfterSeconds();
      fillPct = clamp(state.holdTime / limit, 0, 1) * 100;
      if (state.holdTime >= limit) dropHeldGem();
    }
    if (dom.nextPillValue) {
      dom.nextPillValue.style.setProperty('--timer-fill', `${fillPct}%`);
    }

    // Heavier feel as cadence tightens — tied to the same hold-time curve.
    PHYSICS.setGravity(gravityMultiplier());
    PHYSICS.step(dt, onMerge);
    updateOverflow(dt);
    if (state.shake.t > 0) state.shake.t -= dt;

    // Effects
    for (let i = state.effects.length - 1; i >= 0; i--) {
      const e = state.effects[i];
      e.t += dt;
      if (e.t > e.dur) state.effects.splice(i, 1);
    }

    updateHud();
  }

  // Render
  ctx.clearRect(0, 0, view.w, view.h);
  if (state.shake.t > 0) {
    const m = state.shake.mag * (state.shake.t / 0.4);
    ctx.save();
    ctx.translate((Math.random() - 0.5) * m, (Math.random() - 0.5) * m);
  }
  drawBin();
  drawBodies();
  drawDropper();
  drawEffects();
  if (state.shake.t > 0) ctx.restore();
  drawDebug();

  requestAnimationFrame(loop);
}

// =============================================================================
// Boot
// =============================================================================
showBest();
updateMuteUI();
preloadGems(() => {
  renderLadderPreview();
  state.nextTier = pickDropTier();
  state.heldTier = pickDropTier();
  updateNextPreview();
  // Dev jump — ?scene=gameover&score=487 lands straight on the end card.
  const scene = QS.get('scene');
  if (scene === 'gameover') {
    state.score = parseInt(QS.get('score') || '0', 10) || 0;
    state.merges = parseInt(QS.get('merges') || '0', 10) || 0;
    state.topTier = parseInt(QS.get('top') || '0', 10) || 0;
    if (state.score > state.best) state.best = state.score;
    dom.menu.classList.add('hidden');
    endGame('early');
  }
});
requestAnimationFrame(loop);

</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JDP Games</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #151c33;
      --text: #e9eefc;
      --muted: #9db0e8;
      --accent: #53d3ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #1f2b55 0%, var(--bg) 55%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    main {
      width: min(760px, 100%);
      background: rgba(21, 28, 51, 0.85);
      border: 1px solid rgba(83, 211, 255, 0.2);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 2vw + 1rem, 2.3rem);
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    a {
      display: block;
      text-decoration: none;
      color: var(--text);
      background: var(--card);
      border: 1px solid rgba(83, 211, 255, 0.2);
      border-radius: 12px;
      padding: 14px 16px;
      font-weight: 600;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    a:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    small { color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>JDP Games</h1>
    <p>Static game previews hosted on GitHub Pages.</p>
    <ul>
      <li><a href="./bubble-shooter/">Bubble Shooter <small>(/bubble-shooter/)</small></a></li>
      <li><a href="./ruby-rhythm/">Ruby Rhythm <small>(/ruby-rhythm/)</small></a></li>
      <li><a href="./wordscapes/">Wordscapes <small>(/wordscapes/)</small></a></li>
    </ul>
  </main>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#020d26">
<title>Kataku</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&family=Roboto+Mono:wght@700&display=swap');

  :root {
    --navy: #020d26;
    --royal: #1535a8;
    --ruby: #b81c26;
    --darkRed: #a21520;
    --yellow: #fdd83d;
    --orange: #ffb800;
    --tile: #1a2548;
    --tile-empty: #0f1a3a;
    --tile-border: #2a3a6a;
    --tile-correct: #6aaa64;
    --tile-present: #fdd83d;
    --tile-absent: #3a3a3c;
    --key-bg: #4a5680;
    --key-text: #ffffff;
    --text: #ffffff;
    --muted: #b6c0e0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--navy); color: var(--text);
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden; user-select: none;
  }
  body {
    background:
      radial-gradient(ellipse at top, rgba(21,53,168,0.35) 0%, transparent 60%),
      var(--navy);
    display: flex; align-items: center; justify-content: center;
  }
  #app {
    position: relative;
    width: 100%; max-width: 480px; height: 100dvh; max-height: 900px;
    display: flex; flex-direction: column;
    padding: max(8px, env(safe-area-inset-top)) 8px max(8px, env(safe-area-inset-bottom)) 8px;
  }
  /* Top HUD bar — DESIGN.md §5.12 (Score · Time · Audio) */
  #hud {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    padding: 4px 0 8px;
    flex-shrink: 0;
  }
  .jdp-pill {
    flex: 1;
    display: flex; align-items: stretch;
    background: #fff;
    border: 2px solid #FFB603;
    border-radius: 30px;
    overflow: hidden;
    height: 40px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.25);
  }
  .jdp-pill .pill-label {
    background: #9E131F;
    color: #FFD633;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex; align-items: center;
    padding: 0 10px;
  }
  .jdp-pill .pill-value {
    flex: 1;
    background: #133B9F;
    color: #fff;
    font-weight: 800;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 6px;
    font-variant-numeric: tabular-nums;
  }
  .jdp-pill .pill-value.font-mono { font-family: 'Roboto Mono', monospace; font-size: 15px; }
  @keyframes pulse-urgent {
    0%, 100% { transform: scale(1); color: #FFFFFF; }
    50%      { transform: scale(1.15); color: #FFD633; }
  }
  .pulse-urgent { animation: pulse-urgent 0.8s infinite; display: inline-block; }

  /* Audio toggle — DESIGN.md §5.11 (in-row variant per §5.12) */
  .mute {
    flex-shrink: 0;
    width: 44px; height: 44px;
    border-radius: 22px;
    border: 2px solid #FFB603;
    background: #9E131F;
    color: #FFD633;
    display: flex; align-items: center; justify-content: center;
    padding: 0; cursor: pointer;
    transition: transform 80ms ease;
  }
  .mute:active { transform: scale(0.92); }
  .mute svg { width: 22px; height: 22px; fill: currentColor; }

  /* Multiplier badge — secondary state, sits below the HUD row */
  #multRow {
    display: flex; justify-content: center;
    padding: 0 0 6px;
  }
  .mult-badge {
    background: var(--yellow); color: var(--navy);
    border-radius: 12px; padding: 4px 10px;
    font-weight: 900; font-size: 13px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.25);
  }
  .mult-badge.x12 { background: #ffcc66; }
  .mult-badge.x15 { background: var(--orange); }
  .mult-badge.x20 { background: #ff7a59; color: #fff; }

  /* Board */
  #board-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
  #board {
    display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px;
    width: 100%; max-width: 330px; aspect-ratio: 5 / 6;
  }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  .row.is-active .tile:not(.correct):not(.present):not(.absent) {
    border-color: #8ea6f7;
    box-shadow: inset 0 0 0 1px rgba(142, 166, 247, 0.22);
  }
  .tile {
    background: var(--tile-empty);
    border: 2px solid var(--tile-border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: clamp(20px, 7vw, 30px);
    color: var(--text); text-transform: uppercase;
    transition: transform 0.12s ease, background 0.3s ease, border-color 0.3s ease;
  }
  .tile.filled { border-color: #6a7aa8; transform: scale(1.04); animation: pop 0.12s ease; }
  .tile.correct { background: var(--tile-correct); border-color: var(--tile-correct); color: #fff; }
  .tile.present { background: var(--tile-present); border-color: var(--tile-present); color: var(--navy); }
  .tile.absent  { background: var(--tile-absent);  border-color: var(--tile-absent);  color: #fff; }
  .tile.flip { animation: flip 0.5s ease forwards; }
  @keyframes pop { 0% { transform: scale(0.9); } 100% { transform: scale(1.04); } }
  @keyframes flip {
    0%   { transform: rotateX(0); }
    45%  { transform: rotateX(90deg); }
    55%  { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }
  .row.shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* Message */
  #message {
    min-height: 28px; text-align: center;
    font-size: 14px; font-weight: 600;
    margin: 6px 0; color: var(--muted);
    transition: opacity 0.2s ease;
  }
  #message.flash { color: var(--yellow); }
  #message .pts { color: var(--yellow); font-weight: 900; }
  .float-pts {
    position: fixed; pointer-events: none;
    color: var(--yellow); font-weight: 900; font-size: 28px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    animation: floatPts 1s ease forwards;
    z-index: 20;
  }
  @keyframes floatPts {
    0% { transform: translate(-50%, 0); opacity: 1; }
    100% { transform: translate(-50%, -60px); opacity: 0; }
  }

  /* Keyboard */
  #keyboard {
    display: flex; flex-direction: column; gap: 5px;
    padding: 4px 0 0;
  }
  .krow { display: flex; gap: 4px; justify-content: center; }
  .key {
    flex: 1; min-width: 0; max-width: 44px;
    height: 48px;
    border: none; border-radius: 6px;
    background: var(--key-bg); color: var(--key-text);
    font-weight: 700; font-size: 14px; text-transform: uppercase;
    cursor: pointer; padding: 0;
    box-shadow: 0 2px 0 rgba(0,0,0,0.3);
    transition: transform 80ms ease, background 0.3s ease;
  }
  .key:active { transform: scale(0.94) translateY(1px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
  .key.wide { flex: 1.6; max-width: 64px; font-size: 11px; }
  .key[data-key="ENTER"] {
    background: var(--yellow); color: var(--navy);
    font-size: 18px; font-weight: 900;
    box-shadow: 0 2px 0 var(--orange);
  }
  .key[data-key="BACK"] { font-size: 18px; font-weight: 900; }
  .key.correct { background: var(--tile-correct); }
  .key.present { background: var(--tile-present); color: var(--navy); }
  .key.absent  { background: var(--tile-absent); color: #888; }

  /* Overlays */
  .overlay {
    position: fixed; inset: 0; background: rgba(2,13,38,0.92);
    display: flex; align-items: center; justify-content: center;
    z-index: 40; padding: 16px;
    backdrop-filter: blur(4px);
  }
  .overlay.hidden { display: none; }
  .card {
    background: linear-gradient(160deg, #142244 0%, #0b1530 100%);
    border: 2px solid var(--tile-border);
    border-radius: 18px;
    padding: 24px 20px;
    max-width: 380px; width: 100%;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .card h1 {
    margin: 0 0 8px;
    font-size: 40px; font-weight: 900;
    color: var(--yellow);
    letter-spacing: 1px;
    text-shadow: 0 3px 0 var(--darkRed);
  }
  .card h2 {
    margin: 0 0 12px; font-size: 28px; font-weight: 900;
    color: var(--yellow);
  }
  .card p { margin: 6px 0; color: var(--muted); font-size: 14px; line-height: 1.5; }
  .card .best { color: var(--orange); font-weight: 700; font-size: 15px; margin: 12px 0; }
  .cta {
    display: block; width: 100%;
    margin-top: 16px; padding: 16px;
    background: var(--yellow); color: var(--navy);
    border: none; border-radius: 12px;
    font-weight: 900; font-size: 18px; letter-spacing: 0.5px;
    cursor: pointer; text-transform: uppercase;
    box-shadow: 0 4px 0 var(--orange);
    transition: transform 80ms ease;
  }
  .cta:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--orange); }
  .cta:disabled {
    opacity: 0.7;
    cursor: default;
    box-shadow: none;
    transform: none;
  }
  .skip-btn {
    margin-top: 8px;
    padding: 8px 14px;
    background: transparent; color: var(--muted);
    border: 2px solid var(--tile-border);
    border-radius: 10px;
    font-weight: 700; font-size: 13px; text-transform: uppercase;
    cursor: pointer;
    align-self: center;
  }
  .skip-btn:active { transform: scale(0.96); }
  .skip-wrap { display: flex; justify-content: center; padding: 4px 0; }

  .stats { text-align: left; margin: 12px 0; font-size: 14px; }
  .stats .row-stat { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .stats .row-stat:last-child { border-bottom: none; }
  .stats .label { color: var(--muted); }
  .stats .val { color: var(--text); font-weight: 700; }
  /* Final score hero on the end-of-game modal */
  .final-score-hero {
    margin: 18px 0 14px;
    padding: 14px 12px;
    background: linear-gradient(180deg, rgba(253,216,61,0.10) 0%, rgba(255,184,0,0.04) 100%);
    border: 2px solid rgba(253,216,61,0.35);
    border-radius: 14px;
  }
  .final-score-label {
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 4px;
  }
  .final-score-value {
    font-size: 64px; font-weight: 900;
    line-height: 1;
    color: var(--yellow);
    text-shadow: 0 3px 0 var(--darkRed), 0 6px 18px rgba(255,184,0,0.35);
    font-variant-numeric: tabular-nums;
  }

  /* Unsolved-word reveal on the end-of-game modal */
  .answer-reveal { margin: 14px 0 4px; }
  .answer-label {
    font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 8px;
  }
  .answer-tiles { display: flex; gap: 5px; justify-content: center; }
  .answer-tile {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    background: var(--tile-correct); color: #fff;
    border-radius: 6px;
    font-weight: 900; font-size: 20px;
  }
  .claim-note {
    margin: 12px 0 0;
    color: #ff8a8a;
    font-size: 12px;
    font-weight: 700;
  }

  .new-best {
    display: inline-block; padding: 6px 12px;
    background: var(--orange); color: var(--navy);
    border-radius: 20px; font-weight: 900; font-size: 13px;
    margin: 8px 0;
    animation: nbpulse 1s ease-in-out infinite alternate;
  }
  @keyframes nbpulse { from { transform: scale(1); } to { transform: scale(1.08); } }

  .hidden { display: none !important; }

  /* Tight viewports */
  @media (max-height: 700px) {
    .card h1 { font-size: 32px; }
    .tile { font-size: clamp(18px, 6vw, 26px); }
    .key { height: 42px; }
  }
  @media (max-width: 380px) {
    .key { height: 44px; font-size: 13px; }
    .key.wide { font-size: 10px; }
  }
</style>
</head>
<body>

<div id="app">
  <header id="hud" class="hidden">
    <div class="jdp-pill">
      <span class="pill-label">Score</span>
      <span class="pill-value" id="scorePill">0</span>
    </div>
    <div class="jdp-pill">
      <span class="pill-label">Time</span>
      <span class="pill-value font-mono" id="timerPill">03:00</span>
    </div>
    <button id="muteBtn" class="mute" aria-label="AUDIO ON" aria-pressed="false">
      <svg viewBox="0 0 24 24"></svg>
    </button>
  </header>
  <div id="multRow" class="hidden">
    <div class="mult-badge" id="multBadge">×1.0</div>
  </div>

  <div id="board-wrap" class="hidden">
    <div id="board"></div>
  </div>

  <div id="message" class="hidden"></div>

  <div class="skip-wrap hidden" id="skipWrap">
    <button id="skipBtn" class="skip-btn"></button>
  </div>

  <div id="keyboard" class="hidden"></div>
</div>

<div id="menu" class="overlay">
  <div class="card">
    <h1 id="menuTitle">KATAKU</h1>
    <p id="menuSub"></p>
    <p class="best" id="bestText">&nbsp;</p>
    <button id="startBtn" class="cta" type="button"></button>
    <p id="menuHint" style="font-size:12px;margin-top:14px;"></p>
  </div>
</div>

<div id="gameOver" class="overlay hidden">
  <div class="card">
    <h2 id="goTitle"></h2>
    <div id="goNewBest" class="hidden"><span class="new-best" id="newBestLabel">NEW BEST!</span></div>
    <div id="goAnswer" class="answer-reveal hidden">
      <div class="answer-label" id="goAnswerLabel"></div>
      <div class="answer-tiles" id="goAnswerTiles"></div>
    </div>
    <div class="final-score-hero">
      <div class="final-score-label" id="goFinalLabel"></div>
      <div class="final-score-value" id="goFinalValue">0</div>
    </div>
    <div id="finalStats" class="stats"></div>
    <button id="claimBtn" class="cta" type="button"></button>
    <p id="claimNote" class="claim-note hidden"></p>
  </div>
</div>

<script src="./claim-callback.js?v=20260708.2"></script>
<script>
(() => {
'use strict';

// =============================================================================
// CONFIG — all tuning lives here
// =============================================================================
const CONFIG = {
  GAME_NAME: 'kataku',
  ROUND_MS: 180 * 1000,
  WORD_LEN: 5,
  MAX_GUESSES: 6,
  STORAGE_KEY_BEST: 'kataku:best',
  STORAGE_KEY_MUTE: 'kataku:mute',
  // Base score by guess number (1..6) — doubled for easier scoring
  BASE_BY_GUESS: { 1: 200, 2: 140, 3: 100, 4: 60, 5: 40, 6: 20 },
  // Streak: +10 per consecutive solve, cap at +50
  STREAK_BONUS_STEP: 10,
  STREAK_BONUS_CAP: 50,
  SKIP_COST: 15,
  PARTIAL_PER_GREEN: 10,
  // Free clues for the opening puzzles of each new run. 3 letters per clue
  // dropped into row 0 with green/yellow/grey statuses per the criteria.
  // Each clue covers 3 of the 5 columns; the other 2 columns of row 0 stay empty.
  // Index 0 = first puzzle, 1 = second, 2 = third. Beyond that: no clue.
  CLUES: [
    { total: 3, minGreens: 2,   maxYellows: 1 },  // puzzle 1
    { total: 3, minGreens: 1,   maxYellows: 2 },  // puzzle 2
    { total: 3, exactGreens: 0, maxYellows: 3 },  // puzzle 3
  ],
  // Time multiplier zones: applied based on time REMAINING at solve
  // (time elapsed from start: 0..90 -> x1, 90..120 -> x1.2, 120..150 -> x1.5, 150..180 -> x2)
  MULT_ZONES: [
    { fromRemMs: 180000, toRemMs: 90000, mult: 1.0, label: '×1.0', cls: '' },
    { fromRemMs: 90000,  toRemMs: 60000, mult: 1.2, label: '×1.2', cls: 'x12' },
    { fromRemMs: 60000,  toRemMs: 30000, mult: 1.5, label: '×1.5', cls: 'x15' },
    { fromRemMs: 30000,  toRemMs: 0,     mult: 2.0, label: '×2.0', cls: 'x20' },
  ],
  // Difficulty ramp — question pool selected by time ELAPSED at puzzle load.
  // Only easy/medium/hard are asked as questions; super/ultra stay in DICT so
  // players may still GUESS them, but they are never picked as the target.
  POOL_WINDOWS: [
    { fromMs: 0,      toMs: 60000,  pool: 'easy' },
    { fromMs: 60000,  toMs: 150000, pool: 'medium' },
    { fromMs: 150000, toMs: 180000, pool: 'hard' },
  ],
  URGENT_THRESHOLD_MS: 10000,
  // Callback fallback must come from the launch context or platform config,
  // not a public hardcoded URL in the game bundle.
  CLAIM_URL: null,
};

// =============================================================================
// Language + copy
// =============================================================================
const lang = new URLSearchParams(location.search).get('lang') === 'ms' ? 'ms' : 'en';
const COPY = {
  en: {
    start: 'START GAME', timeUp: "TIME'S UP!", gameOver: 'GAME OVER',
    audioOn: 'AUDIO ON', audioOff: 'AUDIO OFF', claim: 'CLAIM SCORE', retry: 'RETRY',
    claimUnavailable: 'CALLBACK UNAVAILABLE',
    claimFailed: 'Unable to claim score',
    skip: 'SKIP (−15)',
    menuSub: 'Guess as many 5-letter Bahasa Melayu words as you can in 3 minutes. The later you solve, the more each puzzle is worth.',
    menuHint: 'Tip: green = right letter & spot, yellow = wrong spot, gray = not in the word.',
    best: 'Best',
    final: 'Final score',
    solved: 'Puzzles solved',
    avgGuess: 'Avg guesses',
    bestPuzzle: 'Best puzzle',
    skipped: 'Skips used',
    streak: 'Longest streak',
    notInList: 'Not in word list',
    tooShort: 'Not enough letters',
    plus: '+',
    answerWas: 'Answer:',
    streakLabel: 'Streak',
    newBest: 'NEW BEST!',
    wordWas: 'The word was',
  },
  ms: {
    start: 'MULA MAIN', timeUp: 'MASA TAMAT!', gameOver: 'PERMAINAN TAMAT',
    audioOn: 'AUDIO ON', audioOff: 'AUDIO OFF', claim: 'TUNTUT SKOR', retry: 'RETRY',
    claimUnavailable: 'PANGGIL BALIK TIADA',
    claimFailed: 'Tidak dapat tuntut skor',
    skip: 'LANGKAU (−15)',
    menuSub: 'Teka seberapa banyak perkataan 5 huruf Bahasa Melayu dalam 3 minit. Semakin lewat anda selesai, semakin tinggi mata setiap teka.',
    menuHint: 'Tip: hijau = huruf & tempat betul, kuning = tempat salah, kelabu = tiada dalam perkataan.',
    best: 'Terbaik',
    final: 'Skor akhir',
    solved: 'Teka selesai',
    avgGuess: 'Purata cubaan',
    bestPuzzle: 'Teka terbaik',
    skipped: 'Langkauan',
    streak: 'Siri terpanjang',
    notInList: 'Tiada dalam senarai',
    tooShort: 'Huruf tidak cukup',
    plus: '+',
    answerWas: 'Jawapan:',
    streakLabel: 'Siri',
    newBest: 'TERBAIK BAHARU!',
    wordWas: 'Perkataan itu',
  },
}[lang];

// =============================================================================
// Sandbox-safe storage
// =============================================================================
function storageGet(k, d) { try { const v = localStorage.getItem(k); return v === null ? d : v; } catch (e) { return d; } }
function storageSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }

// =============================================================================
// Encrypted word lists (XOR + base64). Source words are not visible in
// plaintext; readers see only the encoded blob.
// Key kept short and not labelled to slow down casual extraction.
// =============================================================================

// =============================================================================
// Board + keyboard build
// =============================================================================
function buildBoard() {
  dom.board.innerHTML = '';
  state.rows = [];
  for (let r = 0; r < CONFIG.MAX_GUESSES; r++) {
    const row = document.createElement('div'); row.className = 'row';
    row.dataset.row = String(r);
    const tiles = [];
    for (let c = 0; c < CONFIG.WORD_LEN; c++) {
      const t = document.createElement('div'); t.className = 'tile';
      row.appendChild(t);
      tiles.push({ el: t, ch: '', status: '' });
    }
    dom.board.appendChild(row);
    state.rows.push(tiles);
  }
  syncActiveRow();
}

const KEY_ROWS = [
  'QWERTYUIOP'.split(''),
  'ASDFGHJKL'.split(''),
  ['ENTER', ...'ZXCVBNM'.split(''), 'BACK'],
];
const TILE_STATUS_RANK = { absent: 0, present: 1, correct: 2 };
const keyEls = {};
function buildKeyboard() {
  dom.keyboard.innerHTML = '';
  keyEls['ENTER'] = null; keyEls['BACK'] = null;
  for (const row of KEY_ROWS) {
    const div = document.createElement('div'); div.className = 'krow';
    for (const k of row) {
      const b = document.createElement('button');
      b.className = 'key';
      if (k === 'ENTER' || k === 'BACK') b.classList.add('wide');
      b.textContent = k === 'ENTER' ? '⏎' : k === 'BACK' ? '⌫' : k;
      b.dataset.key = k;
      b.addEventListener('click', (e) => { e.preventDefault(); ensureAudio(); handleKey(k); });
      div.appendChild(b);
      keyEls[k] = b;
    }
    dom.keyboard.appendChild(div);
  }
}

function paintKeyboard() {
  for (const k in keyEls) {
    const el = keyEls[k]; if (!el || k === 'ENTER' || k === 'BACK') continue;
    el.classList.remove('correct', 'present', 'absent');
    const s = state.keyStatus[k];
    if (s) el.classList.add(s);
  }
}

function upgradeKeyStatus(letter, status) {
  const currentStatus = state.keyStatus[letter];
  if (!currentStatus || TILE_STATUS_RANK[status] > TILE_STATUS_RANK[currentStatus]) {
    state.keyStatus[letter] = status;
  }
}

function renderTile(tile) {
  tile.el.textContent = tile.ch;
  tile.el.className = 'tile';
  if (tile.ch) {
    tile.el.classList.add('filled');
  }
  if (tile.status) {
    tile.el.classList.add(tile.status);
    tile.el.classList.remove('filled');
  }
}

function syncActiveRow() {
  Array.from(dom.board.children).forEach((rowEl, idx) => {
    rowEl.classList.toggle('is-active', state.scene === 'play' && !state.locked && idx === state.curRow);
  });
}

function clearBoard() {
  for (const row of state.rows) {
    for (const tile of row) {
      tile.ch = '';
      tile.status = '';
      renderTile(tile);
    }
  }
}

// =============================================================================
// Word selection (per pool by elapsed time)
// =============================================================================
function currentPool() {
  const e = state.elapsedMs;
  for (const w of CONFIG.POOL_WINDOWS) {
    if (e >= w.fromMs && e < w.toMs) return w.pool;
  }
  return 'hard';
}
function pickWord() {
  const pool = POOLS[currentPool()];
  return pool[Math.floor(Math.random() * pool.length)];
}

// =============================================================================
// Multiplier + zone
// =============================================================================
function zoneFor(remMs) {
  for (let i = 0; i < CONFIG.MULT_ZONES.length; i++) {
    const z = CONFIG.MULT_ZONES[i];
    if (remMs <= z.fromRemMs && remMs > z.toRemMs) return { ...z, idx: i };
  }
  // final-zone catch
  const last = CONFIG.MULT_ZONES[CONFIG.MULT_ZONES.length - 1];
  return { ...last, idx: CONFIG.MULT_ZONES.length - 1 };
}

function updateMultBadge(z) {
  dom.multBadge.className = 'mult-badge' + (z.cls ? ' ' + z.cls : '');
  dom.multBadge.textContent = z.label;
  state.curMultLabel = z.label;
}

function updateTimerCls(remMs, z) {
  const p = dom.timerPill;
  if (remMs <= CONFIG.URGENT_THRESHOLD_MS) {
    if (!p.classList.contains('pulse-urgent')) p.classList.add('pulse-urgent');
  } else {
    p.classList.remove('pulse-urgent');
  }
}

function fmtTime(ms) {
  const s = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return (m < 10 ? '0' + m : m) + ':' + (ss < 10 ? '0' + ss : ss);
}

// =============================================================================
// Run lifecycle
// =============================================================================
function startRun() {
  claimLocked = false;
  claimUnavailable = false;
  syncClaimButton();
  dom.menu.classList.add('hidden');
  dom.gameOver.classList.add('hidden');
  dom.hud.classList.remove('hidden');
  dom.multRow.classList.remove('hidden');
  dom.boardWrap.classList.remove('hidden');
  dom.message.classList.remove('hidden');
  dom.skipWrap.classList.remove('hidden');
  dom.keyboard.classList.remove('hidden');

  state.scene = 'play';
  state.startTs = performance.now();
  state.elapsedMs = 0;
  state.remainingMs = CONFIG.ROUND_MS;
  state.score = 0;
  state.streak = 0;
  state.longestStreak = 0;
  state.solvedCount = 0;
  state.totalGuesses = 0;
  state.bestPuzzle = 0;
  state.skipped = 0;
  state.zoneStats = { x10: 0, x12: 0, x15: 0, x20: 0 };
  state.prevZoneIdx = 0;
  state.puzzleIndex = 0;
  state.solvedThisPuzzle = false;

  buildBoard();
  buildKeyboard();
  loadNewPuzzle();
  updateScore();
  loop();
}

function loop() {
  if (state.scene !== 'play') return;
  const now = performance.now();
  state.elapsedMs = now - state.startTs;
  state.remainingMs = CONFIG.ROUND_MS - state.elapsedMs;

  const z = zoneFor(state.remainingMs);
  if (z.idx !== state.prevZoneIdx) {
    state.prevZoneIdx = z.idx;
    sfx.zoneUp();
    flashMessage('×' + z.mult.toFixed(1).replace('.0','') + (lang==='ms' ? ' zon!' : ' zone!'));
  }
  updateMultBadge(z);
  updateTimerCls(state.remainingMs, z);
  dom.timerPill.textContent = fmtTime(state.remainingMs);

  if (state.remainingMs <= 0) {
    endRun('timeUp');
    return;
  }
  state.rafId = requestAnimationFrame(loop);
}

function endRun(reason) {
  cancelAnimationFrame(state.rafId);
  state.scene = 'over';
  syncActiveRow();

  // Partial credit on timeout for any tiles already submitted in the active row
  if (reason === 'timeUp' && !state.locked && state.curRow < CONFIG.MAX_GUESSES) {
    // Look at the last submitted row (curRow - 1 if any guesses made on this puzzle and not yet solved/failed)
    // Per spec: "last submitted guess in the active puzzle"
    // We award per the CURRENT multiplier (which is the timeUp zone → ×2.0 by definition).
    let lastRow = -1;
    for (let r = state.curRow - 1; r >= 0; r--) {
      if (state.rows[r] && state.rows[r][0].status) { lastRow = r; break; }
    }
    if (lastRow >= 0) {
      let greens = 0;
      for (const t of state.rows[lastRow]) if (t.status === 'correct') greens++;
      if (greens > 0) {
        const base = greens * CONFIG.PARTIAL_PER_GREEN;
        const z = zoneFor(0);
        const pts = Math.round(base * z.mult);
        state.score += pts;
        addZoneStat(z, pts);
      }
    }
  }

  sfx.timeUp();
  showGameOver(reason);
}

// =============================================================================
// Puzzle lifecycle
// =============================================================================
function loadNewPuzzle() {
  state.target = pickWord();
  state.curRow = 0;
  state.curCol = 0;
  state.locked = false;
  state.solvedThisPuzzle = false;
  state.keyStatus = {};
  clearBoard();
  applyClueToRow0();
  paintKeyboard();
  syncActiveRow();
  dom.message.textContent = '';
  state.puzzleIndex++;
}

// =============================================================================
// Clue (first 3 puzzles of each run) — finds a real dictionary word that,
// when matched against the target, satisfies the criteria, then occupies row 0.
// =============================================================================
function _shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function _matchesCriteria(result, c) {
  let greens = 0, yellows = 0;
  for (const s of result) {
    if (s === 'correct') greens++;
    else if (s === 'present') yellows++;
  }
  // `total` = greens + yellows must equal this (rest of the 5 are grey).
  if (c.total       !== undefined && greens + yellows !== c.total) return false;
  if (c.minGreens   !== undefined && greens  <  c.minGreens)   return false;
  if (c.exactGreens !== undefined && greens !== c.exactGreens)  return false;
  if (c.maxYellows  !== undefined && yellows >  c.maxYellows)   return false;
  return true;
}

function _findClueWord(target, criteria) {
  // Search the full dictionary in random order; return the first match.
  const dict = _shuffle([...DICT]);
  for (const w of dict) {
    if (w === target) continue;
    const r = _evalGuess(w, target);
    if (_matchesCriteria(r, criteria)) return { word: w, result: r };
  }
  return null;
}

function applyClueToRow0() {
  const cfg = CONFIG.CLUES[state.puzzleIndex];
  if (!cfg) return;  // puzzle 4+: no clue

  const found = _findClueWord(state.target, cfg);
  if (!found) return;  // no dictionary word satisfies the criteria → graceful skip

  const row = state.rows[0];
  for (let i = 0; i < CONFIG.WORD_LEN; i++) {
    const t = row[i];
    if (found.result[i] === 'absent') {
      t.ch = '';
      t.status = '';
      renderTile(t);
      continue;
    }

    t.ch = found.word[i];
    t.status = found.result[i];
    renderTile(t);
    upgradeKeyStatus(t.ch, found.result[i]);
  }
  // The clue counts as the player's first guess; they start typing on row 1.
  state.curRow = 1;
  state.totalGuesses++;
  paintKeyboard();
  syncActiveRow();
}

function lockAndAdvance() {
  state.locked = true;
  syncActiveRow();
  // Skip-cooldown briefly to prevent double-fire
  setTimeout(() => {
    if (state.scene === 'play') loadNewPuzzle();
  }, 1200);
}

// =============================================================================
// Input
// =============================================================================
function handleKey(k) {
  if (state.scene !== 'play' || state.locked) return;
  if (!state.rows[state.curRow]) return;
  if (k === 'ENTER') return submitRow();
  if (k === 'BACK')  return backspace();
  if (/^[A-Z]$/.test(k)) typeLetter(k);
}

function typeLetter(ch) {
  if (state.curCol >= CONFIG.WORD_LEN) return;
  const t = state.rows[state.curRow][state.curCol];
  t.ch = ch;
  renderTile(t);
  state.curCol++;
  sfx.type();
}
function backspace() {
  if (state.curCol <= 0) return;
  state.curCol--;
  const t = state.rows[state.curRow][state.curCol];
  t.ch = '';
  t.status = '';
  renderTile(t);
}

function submitRow() {
  if (state.curCol < CONFIG.WORD_LEN) {
    flashMessage(COPY.tooShort, true);
    shakeRow();
    sfx.invalid();
    return;
  }
  const guess = state.rows[state.curRow].map(t => t.ch).join('');
  if (!DICT.has(guess)) {
    flashMessage(COPY.notInList, true);
    shakeRow();
    sfx.invalid();
    return;
  }
  evaluateRow(guess);
}

function shakeRow() {
  const el = dom.board.children[state.curRow];
  el.classList.remove('shake'); void el.offsetWidth;
  el.classList.add('shake');
}

// Wordle-style evaluation: returns ['correct'|'present'|'absent', ...] for each position.
function _evalGuess(guess, target) {
  const N = CONFIG.WORD_LEN;
  const result = new Array(N).fill('absent');
  const remain = {};
  for (const ch of target) remain[ch] = (remain[ch] || 0) + 1;
  for (let i = 0; i < N; i++) {
    if (guess[i] === target[i]) { result[i] = 'correct'; remain[guess[i]]--; }
  }
  for (let i = 0; i < N; i++) {
    if (result[i] === 'correct') continue;
    const ch = guess[i];
    if (remain[ch] > 0) { result[i] = 'present'; remain[ch]--; }
  }
  return result;
}

function evaluateRow(guess) {
  sfx.submit();
  const result = _evalGuess(guess, state.target);
  // animate
  for (let i = 0; i < CONFIG.WORD_LEN; i++) {
    const t = state.rows[state.curRow][i];
    t.status = result[i];
    upgradeKeyStatus(t.ch, result[i]);
    setTimeout(() => {
      t.el.classList.add('flip');
      setTimeout(() => {
        t.el.classList.add(result[i]);
        t.el.classList.remove('filled');
        paintKeyboard();
      }, 240);
      setTimeout(() => t.el.classList.remove('flip'), 500);
    }, i * 120);
  }

  state.totalGuesses++;
  const solved = result.every(s => s === 'correct');
  const usedRow = state.curRow + 1;
  state.curRow++;
  state.curCol = 0;
  syncActiveRow();

  // After flip animation completes
  setTimeout(() => {
    if (solved) onSolve(usedRow);
    else if (state.curRow >= CONFIG.MAX_GUESSES) onFail();
  }, CONFIG.WORD_LEN * 120 + 260);
}

// =============================================================================
// Scoring
// =============================================================================
function streakBonus() {
  return Math.min(CONFIG.STREAK_BONUS_CAP, state.streak * CONFIG.STREAK_BONUS_STEP);
}
function addZoneStat(z, pts) {
  if (z.cls === 'x12') state.zoneStats.x12 += pts;
  else if (z.cls === 'x15') state.zoneStats.x15 += pts;
  else if (z.cls === 'x20') state.zoneStats.x20 += pts;
  else state.zoneStats.x10 += pts;
}
function updateScore() { dom.scorePill.textContent = String(state.score); }

function onSolve(guessNum) {
  state.solvedThisPuzzle = true;
  state.solvedCount++;
  state.streak++;
  if (state.streak > state.longestStreak) state.longestStreak = state.streak;
  const base = CONFIG.BASE_BY_GUESS[guessNum] || 0;
  const bonus = streakBonus();
  const z = zoneFor(state.remainingMs);
  const pts = Math.round((base + bonus) * z.mult);
  state.score += pts;
  if (pts > state.bestPuzzle) state.bestPuzzle = pts;
  addZoneStat(z, pts);
  updateScore();
  floatPoints(pts);
  sfx.correct();
  flashMessage(`+${pts}  (${base}${bonus?'+'+bonus:''} ${z.label})`);
  lockAndAdvance();
}

function onFail() {
  state.streak = 0;
  sfx.fail();
  flashMessage(`${COPY.answerWas} ${state.target}`);
  lockAndAdvance();
}

dom.skipBtn.addEventListener('click', () => {
  if (state.scene !== 'play' || state.locked) return;
  ensureAudio();
  state.score = Math.max(0, state.score - CONFIG.SKIP_COST);
  state.skipped++;
  state.streak = 0;
  updateScore();
  sfx.skip();
  flashMessage(`−${CONFIG.SKIP_COST}  ${COPY.answerWas} ${state.target}`);
  lockAndAdvance();
});

// =============================================================================
// Message + floating points
// =============================================================================
let msgTimer = 0;
function flashMessage(text, isError) {
  dom.message.textContent = text;
  dom.message.classList.toggle('flash', !isError);
  dom.message.style.opacity = '1';
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => { dom.message.style.opacity = '0.6'; }, 1200);
}
function floatPoints(pts) {
  const el = document.createElement('div');
  el.className = 'float-pts';
  el.textContent = `+${pts}`;
  const rect = dom.scorePill.getBoundingClientRect();
  el.style.left = (rect.left + rect.width / 2) + 'px';
  el.style.top  = (rect.top + rect.height + 4) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// =============================================================================
// Physical keyboard
// =============================================================================
window.addEventListener('keydown', (e) => {
  if (state.scene !== 'play') return;
  if (e.key === 'Enter') { e.preventDefault(); ensureAudio(); handleKey('ENTER'); return; }
  if (e.key === 'Backspace') { e.preventDefault(); handleKey('BACK'); return; }
  if (/^[a-zA-Z]$/.test(e.key)) { ensureAudio(); handleKey(e.key.toUpperCase()); }
});

// =============================================================================
// Game over
// =============================================================================
function showGameOver(reason) {
  // Persist best
  let newBest = false;
  if (state.score > state.best) {
    state.best = state.score;
    storageSet(CONFIG.STORAGE_KEY_BEST, String(state.best));
    newBest = true;
  }

  dom.goTitle.textContent = reason === 'timeUp' ? COPY.timeUp : COPY.gameOver;
  dom.goNewBest.classList.toggle('hidden', !newBest);
  dom.goFinalLabel.textContent = COPY.final;
  dom.goFinalValue.textContent = String(state.score);

  // Reveal the unsolved answer, if any (player didn't crack the current puzzle).
  if (!state.solvedThisPuzzle && state.target) {
    dom.goAnswerLabel.textContent = COPY.wordWas;
    dom.goAnswerTiles.innerHTML = state.target.split('')
      .map(ch => `<span class="answer-tile">${ch}</span>`).join('');
    dom.goAnswer.classList.remove('hidden');
  } else {
    dom.goAnswer.classList.add('hidden');
  }

  const avg = state.solvedCount > 0
    ? (state.totalGuesses / state.solvedCount).toFixed(1)
    : '—';

  const zs = state.zoneStats;
  const zoneRow = (label, val) =>
    `<div class="row-stat"><span class="label">${label}</span><span class="val">${val}</span></div>`;

  dom.finalStats.innerHTML = [
    zoneRow(COPY.solved, state.solvedCount),
    zoneRow(COPY.avgGuess, avg),
    zoneRow(COPY.bestPuzzle, state.bestPuzzle),
    zoneRow(COPY.streak, state.longestStreak),
    zoneRow(COPY.skipped, state.skipped),
    zoneRow('×1.0', zs.x10),
    zoneRow('×1.2', zs.x12),
    zoneRow('×1.5', zs.x15),
    zoneRow('×2.0', zs.x20),
  ].join('');

  syncClaimButton();
  dom.gameOver.classList.remove('hidden');
}

// =============================================================================
// CLAIM SCORE - single end-of-game CTA (CLAUDE.md sections 6.5 / 6.6)
// =============================================================================
let claimLocked = false;
let claimUnavailable = false;
let claimErrorMessage = '';
const claimContext = window.ClaimCallback.getClaimContext();
window.ClaimCallback.applyPageTitleToHeading(claimContext.pageTitle, 'menuTitle');

function hasClaimCallback() {
  return !!window.ClaimCallback.resolveCallbackUrl(claimContext, CONFIG.CLAIM_URL);
}

function getClaimErrorMessage(error) {
  const detail = error && typeof error.message === 'string' ? error.message.trim() : '';
  return detail ? `${COPY.claimFailed}: ${detail}` : COPY.claimFailed;
}

function syncClaimButton() {
  if (isZeroScore()) {
    dom.claimNote.classList.add('hidden');
    dom.claimBtn.disabled = false;
    dom.claimBtn.textContent = COPY.retry;
    return;
  }

  const noteText = claimErrorMessage || (claimUnavailable ? COPY.claimUnavailable : '');
  if (noteText) {
    dom.claimNote.textContent = noteText;
    dom.claimNote.classList.remove('hidden');
    dom.claimBtn.disabled = true;
    dom.claimBtn.textContent = COPY.claim;
    return;
  }

  dom.claimNote.classList.add('hidden');
  dom.claimBtn.disabled = claimLocked;
  dom.claimBtn.textContent = COPY.claim;
}

async function buildClaimUrl() {
  return window.ClaimCallback.buildClaimUrl({
    claimContext,
    score: Math.max(0, state.score | 0),
    gameName: CONFIG.GAME_NAME,
    fallbackUrl: CONFIG.CLAIM_URL,
    extraData: {
      solved: state.solvedCount,
      total_guesses: state.totalGuesses,
      skipped: state.skipped,
    },
  });
}

dom.claimBtn.addEventListener('click', async () => {
  if (isZeroScore()) {
    claimLocked = false;
    claimUnavailable = false;
    claimErrorMessage = '';
    startRun();
    return;
  }
  if (!hasClaimCallback()) {
    claimLocked = false;
    claimUnavailable = true;
    claimErrorMessage = '';
    syncClaimButton();
    return;
  }
  if (claimLocked) return;
  claimLocked = true;
  claimErrorMessage = '';
  syncClaimButton();
  try {
    const claimUrl = await buildClaimUrl();
    if (!claimUrl) {
      console.warn('[kataku] claim submit unavailable: invalid or missing callback context');
      claimLocked = false;
      claimUnavailable = true;
      claimErrorMessage = '';
      syncClaimButton();
      return;
    }
    window.location.assign(claimUrl);
  } catch (e) {
    console.warn('[kataku] claim submit failed:', e);
    claimLocked = false;
    claimUnavailable = true;
    claimErrorMessage = getClaimErrorMessage(e);
    syncClaimButton();
  }
});

// =============================================================================
// Dev jump: ?scene=over
// =============================================================================
(function devJump() {
  const s = new URLSearchParams(location.search).get('scene');
  if (s === 'over') {
    state.score = 245; state.solvedCount = 4; state.totalGuesses = 14;
    state.bestPuzzle = 100; state.longestStreak = 3; state.skipped = 1;
    state.zoneStats = { x10: 80, x12: 60, x15: 45, x20: 60 };
    // Simulate "timer expired while puzzle was still in progress"
    state.target = 'BUKAN';
    state.solvedThisPuzzle = false;
    showGameOver('timeUp');
  }
})();

})();
</script>

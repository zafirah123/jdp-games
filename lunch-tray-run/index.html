<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Lunch Tray Run</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Roboto+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#031034; --blue:#133B9F; --brick:#9E131F; --lightRed:#AF1726;
    --darkYellow:#FFB603; --yellow:#FFD633; --white:#fff;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    background:var(--navy); color:#fff; font-family:'Poppins',system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    height:100dvh; overflow:hidden; user-select:none; -webkit-user-select:none;
    padding:max(8px,env(safe-area-inset-top)) 8px 8px;
  }

  /* HUD (DESIGN.md §5.12) */
  .hud{ width:100%; max-width:28rem; display:flex; justify-content:space-between; align-items:center; gap:8px; z-index:10; flex-shrink:0; }
  .hud-spacer{ flex:1; }   /* holds the Score pill to its previous width now that Time is hidden */
  .jdp-pill{ flex:1; display:flex; align-items:center; height:40px; overflow:hidden; background:#fff; border:2px solid var(--darkYellow); border-radius:30px; }
  .pill-label{ background:var(--brick); color:var(--yellow); font-weight:700; font-size:10px; letter-spacing:.04em; text-transform:uppercase; padding:0 10px; height:100%; display:flex; align-items:center; }
  .pill-value{ background:var(--blue); color:#fff; font-weight:800; font-size:16px; padding:0 10px; height:100%; flex:1; display:flex; align-items:center; justify-content:center; }
  .pill-value.mono{ font-family:'Roboto Mono',monospace; }
  @keyframes pulse-urgent{ 0%,100%{ transform:scale(1); color:#fff; } 50%{ transform:scale(1.15); color:var(--yellow); } }
  .pulse-urgent{ animation:pulse-urgent .8s infinite; }

  .mute{
    flex-shrink:0;
    width:44px; height:44px; border-radius:22px; border:2px solid var(--darkYellow); background:var(--brick);
    color:var(--yellow); display:flex; align-items:center; justify-content:center; padding:0; cursor:pointer;
    transition:transform 80ms ease;
  }
  .mute:active{ transform:scale(.92); }
  .mute svg{ width:22px; height:22px; fill:currentColor; }

  .stage{ position:relative; width:100%; max-width:28rem; flex:1; margin-top:8px; border-radius:18px; overflow:hidden; background:#0a1430; box-shadow:0 10px 30px rgba(0,0,0,.4); }
  canvas{ display:block; width:100%; height:100%; touch-action:none; }

  .endrun{
    position:absolute; top:10px; left:10px; z-index:12; font-weight:700; font-size:11px; letter-spacing:.04em;
    color:#fff; background:rgba(3,16,52,.6); border:1.5px solid rgba(255,182,3,.6); border-radius:20px;
    padding:7px 12px; cursor:pointer; backdrop-filter:blur(2px); transition:transform 80ms ease; display:none;
  }
  .endrun:active{ transform:scale(.94); }

  .overlay{
    position:absolute; inset:0; z-index:20; display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:26px 22px; gap:14px;
    background:linear-gradient(180deg,rgba(3,16,52,.86),rgba(3,16,52,.94)); backdrop-filter:blur(3px);
  }
  .overlay.show{ display:flex; }
  .title{ font-weight:800; font-size:34px; line-height:1.02; letter-spacing:.5px; color:var(--yellow); text-shadow:0 3px 0 var(--brick),0 5px 14px rgba(0,0,0,.4); }
  .subtitle{ font-weight:600; font-size:13px; color:#cfd6e6; max-width:18rem; line-height:1.5; }
  .headline{ font-weight:800; font-size:30px; color:var(--yellow); letter-spacing:.5px; }
  .newbest{ font-weight:800; font-size:14px; color:var(--navy); background:var(--yellow); padding:5px 14px; border-radius:20px; letter-spacing:.06em; animation:pop .4s ease; display:none; }
  @keyframes pop{ 0%{transform:scale(.5);opacity:0} 60%{transform:scale(1.12)} 100%{transform:scale(1)} }
  .scorecard{ display:flex; gap:10px; margin:2px 0; }
  .scorebox{ background:rgba(255,255,255,.06); border:1.5px solid rgba(255,182,3,.5); border-radius:14px; padding:10px 18px; min-width:96px; }
  .scorebox .k{ font-size:10px; letter-spacing:.1em; color:#aeb6c8; text-transform:uppercase; font-weight:600; }
  .scorebox .v{ font-size:26px; font-weight:800; color:#fff; }
  .hint{ font-size:11px; color:#9aa3b8; font-weight:500; }

  .btn{
    font-weight:700; font-size:18px; cursor:pointer; border-radius:50px; padding:14px 30px; border:1px solid var(--yellow);
    color:#DE0909; background:linear-gradient(180deg,#FFE258,#FFBA0A); box-shadow:0 7px 0 #DE9D00;
    transition:transform 70ms ease, box-shadow 70ms ease; letter-spacing:.4px; min-width:200px;
  }
  .btn:active{ transform:translateY(5px); box-shadow:0 2px 0 #DE9D00; }
  .btn.secondary{ color:var(--yellow); background:linear-gradient(180deg,#CF1B27,#821322); border-color:#fff; box-shadow:0 7px 0 #640A19; font-size:15px; padding:12px 24px; min-width:160px; }
  .btn.secondary:active{ box-shadow:0 2px 0 #640A19; }
  .btn[disabled]{ filter:saturate(.4) brightness(.9); pointer-events:none; }
  .btnrow{ display:flex; flex-direction:column; gap:12px; align-items:center; }
</style>
</head>
<body>

  <div class="hud">
    <div class="jdp-pill"><span class="pill-label" id="lblScore">Score</span><span class="pill-value" id="score">0</span></div>
    <div class="hud-spacer"></div>
    <button id="muteBtn" class="mute" aria-label="AUDIO ON" aria-pressed="false">
      <svg viewBox="0 0 24 24"><path id="muteIcon" d=""/></svg>
    </button>
  </div>

  <div class="stage" id="stage">
    <canvas id="cv"></canvas>
    <button class="endrun" id="endRunBtn">END RUN</button>

    <div class="overlay show" id="startOverlay">
      <div class="title" id="gameTitle">LUNCH<br>TRAY RUN</div>
      <div class="subtitle" id="startSub"></div>
      <div class="hint" id="startHint"></div>
      <button class="btn" id="startBtn">START GAME</button>
    </div>

    <div class="overlay" id="overOverlay">
      <div class="headline" id="overHeadline">TIME'S UP!</div>
      <div class="newbest" id="newBest">NEW BEST!</div>
      <div class="scorecard">
        <div class="scorebox"><div class="k" id="lblFinal">Score</div><div class="v" id="finalScore">0</div></div>
        <div class="scorebox"><div class="k" id="lblBest">Best</div><div class="v" id="bestScore">0</div></div>
      </div>
      <div class="btnrow"><button class="btn" id="claimBtn">CLAIM SCORE</button></div>
      <div class="hint" id="claimStatus"></div>
    </div>
  </div>

<script>
"use strict";
/* ============================================================
   LUNCH TRAY RUN — vanilla JS + Canvas 2D, single file
   One depth-layered view, one shared 3-control scheme:
     · BACKGROUND — canteen floor : ◀ ▶ weave to dodge obstacles
     · FOREGROUND — phone in hand : JUMP (↑/Space/tap) the offline
       dino runner over cacti
   Trip on the floor OR crash the dino → the run ends.
   ============================================================ */

/* ---------- CONFIG (all tuning lives here) ---------- */
const GAME_NAME = 'lunch-tray-run';
const CONFIG = {
  roundDurationMs: 3 * 60 * 1000,
  rampCompleteAt: 0.85,
  scoreTarget: 500, hardenStart: 380, hardenEnd: 500,    // scoreTarget = points for a full base run; not a ceiling

  floorSplit: 0.55,                    // floor area height fraction; phone below
  horizonRatio: 0.20,                  // far end of the floor (within floor area)

  // floor — 3-lane road, switch LEFT / RIGHT
  lanes: 3,
  laneTween: 16,                       // how fast the lane highlight slides
  floorIntroMs: 12000,                 // road stays empty at first — learn the dino jump first
  player: { row: 0.86 },               // collision row as perspective progress (0=far, 1=near)
  floor:  {
    speed:        { start: 250, end: 460 },
    spawnEveryMs: { start: 2600, end: 650 },   // sparse at first, builds up over the round
    doubleChance: { start: 0.04, end: 0.32 },  // two-lane waves get common only later
    baseW: 58, baseH: 52,
  },

  // phone dino runner — JUMP (units relative to the phone screen)
  dino:   { jumpK: 2.33, gravK: 6.48, sizeFrac: 0.22 },   // apex ≈ 0.42·screenH, air ≈ 0.72 s
  cactus: {
    speed:        { start: 0.85, end: 1.5 },   // screen-widths / second
    spawnEveryMs: { start: 1300, end: 760 },
  },

  // power-ups (one aid, one frenzy)
  shield: { spawnEveryMs: 15000, chance: 0.7, size: 38 },           // aid — on the floor
  focus:  { spawnEveryMs: 21000, chance: 0.6, sizeFrac: 0.15,       // frenzy — in the runner
            durationMs: 5000, slow: 1, scoreBoost: 2 },            // slow:1 = keep full speed, just 2× points

  stumbleMs: 1500,                     // floor trip → lose control this long (timer keeps running)
  // soft round: no hard time-up — cacti escalate hard as you approach 3 min so the run ends by losing hearts
  cactusTaper: { startMs: 150000, fullMs: 180000, minFactor: 0.35, strength: 0.55 },
};
// Survive the whole round (no Focus boost) → exactly scoreTarget. Focus or longer survival
// can push the score past it (no hard cap). 500 / 180s ≈ 2.78 points/sec.
CONFIG.scoreRatePerSec = CONFIG.scoreTarget / (CONFIG.roundDurationMs / 1000);

/* ---------- Language (URL-driven, §6.4) ---------- */
const lang = new URLSearchParams(location.search).get('lang') === 'ms' ? 'ms' : 'en';
const COPY = {
  en: {
    score:'Score', time:'Time', best:'Best', start:'START GAME',
    timeUp:"TIME'S UP!", gameOver:'GAME OVER', audioOn:'AUDIO ON', audioOff:'AUDIO OFF',
    claim:'CLAIM SCORE', retry:'RETRY', endRun:'END RUN',
    sub:'Cross the canteen without tripping — while playing the dino game on your phone. Both at once.',
    hint:'◀ ▶ switch lane · TAP phone / Space to jump',
    claiming:'Sending your score…', claimed:'Score claimed! 🎉', claimFail:'Saved. (offline)',
  },
  ms: {
    score:'Skor', time:'Masa', best:'Terbaik', start:'MULA MAIN',
    timeUp:'MASA TAMAT!', gameOver:'PERMAINAN TAMAT', audioOn:'AUDIO ON', audioOff:'AUDIO OFF',
    claim:'TUNTUT SKOR', retry:'RETRY', endRun:'TAMAT',
    sub:'Rentas kantin tanpa tersadung — sambil main permainan dino di telefon. Serentak.',
    hint:'◀ ▶ tukar lorong · KETIK telefon / Space untuk lompat',
    claiming:'Menghantar skor…', claimed:'Skor dituntut! 🎉', claimFail:'Disimpan. (luar talian)',
  },
}[lang];

/* ---------- Utilities ---------- */
const clamp = (x,lo,hi)=>Math.max(lo,Math.min(hi,x));
const lerp  = (a,b,t)=>a+(b-a)*t;
const rand  = (a,b)=>a+Math.random()*(b-a);
const now   = ()=>performance.now();
const aabb  = (a,b)=>a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
function store(k,v){ try{ if(v===undefined) return localStorage.getItem(k); localStorage.setItem(k,v); }catch(_){ return null; } }

/* ---------- Canvas ---------- */
const stageEl=document.getElementById('stage'), canvas=document.getElementById('cv'), ctx=canvas.getContext('2d');
const dpr=Math.min(window.devicePixelRatio||1,2.5);
const view={ w:360, h:600 };
function resize(){
  const r=stageEl.getBoundingClientRect();
  view.w=r.width; view.h=r.height;
  canvas.width=Math.round(r.width*dpr); canvas.height=Math.round(r.height*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,150));
new ResizeObserver(resize).observe(stageEl);

/* ---------- Layout (recomputed each frame) ---------- */
function layout(){
  const W=view.w, H=view.h;
  const floorBottom=Math.round(H*CONFIG.floorSplit);
  const horizonY=Math.round(floorBottom*CONFIG.horizonRatio);
  // phone (foreground)
  const py=Math.round(H*0.585), px=Math.round(W*0.07), pw=W-2*px, ph=H-py-8;
  const m=Math.round(pw*0.05), notch=Math.round(ph*0.06);
  const rsx=px+m, rsy=py+m+notch, rsw=pw-2*m, rsh=ph-2*m-notch;
  const gy=rsy+rsh-Math.max(8,Math.round(rsh*0.06));
  const dsize=Math.round(rsh*CONFIG.dino.sizeFrac);
  return { W,H, floorBottom, horizonY, phone:{px,py,pw,ph,notch}, R:{rsx,rsy,rsw,rsh,gy,dsize} };
}

/* ---------- State ---------- */
let state=null;
function freshState(){
  return {
    scene:'start', scoreFloat:0, score:0,
    elapsed:0,
    lane:1, renderLane:1,
    dinoY:0, dinoVy:0, dinoSquash:0, dinoRun:0, airBoost:0,
    hearts:3, dinoHurtUntil:0, stumbleUntil:0,
    heartTrigger: 100 + Math.floor(Math.random()*51), heartSpawned:false,   // one-time extra-heart rescue (score 100–150)
    thumbTap:0, tapSide:1,
    floorObs:[], cacti:[], pickups:[], particles:[], floats:[],
    floorTimer:0, cactusTimer:0, shieldTimer:0, focusTimer:0,
    scrollFloor:0, scrollRunner:0,
    shield:false, focusUntil:0, invulnUntil:0,
    crashTimer:0, shake:0,
    overReason:'timeup', claimed:false, suspicious:false,
  };
}

/* ============================================================
   AUDIO — Web Audio synthesis (zero asset bytes)
   ============================================================ */
const Audio_=(()=>{
  let ac=null, master=null, bgmTimer=null, muted=store(GAME_NAME+':mute')==='1';
  function ctxInit(){ if(ac) return; const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    ac=new AC(); master=ac.createGain(); master.gain.value=muted?0:0.9; master.connect(ac.destination); }
  function tone(freq,dur,type='sine',gain=0.2,glideTo=null,t0=0){
    if(!ac||muted) return; const t=ac.currentTime+t0; const o=ac.createOscillator(), g=ac.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,t);
    if(glideTo) o.frequency.exponentialRampToValueAtTime(Math.max(40,glideTo),t+dur);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(gain,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02);
  }
  function noise(dur,gain=0.3){
    if(!ac||muted) return; const t=ac.currentTime, n=Math.floor(dur*ac.sampleRate);
    const buf=ac.createBuffer(1,n,ac.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
    const src=ac.createBufferSource(); src.buffer=buf; const g=ac.createGain();
    g.gain.setValueAtTime(gain,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.setValueAtTime(1800,t); f.frequency.exponentialRampToValueAtTime(200,t+dur);
    src.connect(f); f.connect(g); g.connect(master); src.start(t); src.stop(t+dur);
  }
  const sfx={
    jump(){ tone(520,0.14,'square',0.16,840); },
    step(){ tone(180,0.05,'square',0.05); },
    shield(){ tone(523,0.10,'triangle',0.18); tone(784,0.16,'triangle',0.18,null,0.07); },
    focus(){ [659,880,1175].forEach((f,i)=>tone(f,0.16,'sine',0.16,null,i*0.08)); },
    life(){ [523,659,784,1047,1319].forEach((f,i)=>tone(f,0.18,'sine',0.17,null,i*0.07)); },
    block(){ tone(180,0.18,'sawtooth',0.16,90); },
    hurt(){ tone(330,0.12,'square',0.16,170); tone(220,0.16,'square',0.12,130,null,0.05); },
    stumble(){ tone(150,0.22,'sawtooth',0.18,70); noise(0.2,0.2); tone(240,0.12,'square',0.10,120,0.07); },
    crash(){ noise(0.5,0.34); tone(300,0.5,'sawtooth',0.18,70); },
    timeup(){ [660,520,390].forEach((f,i)=>tone(f,0.2,'sine',0.2,null,i*0.18)); },
    best(){ [523,659,784,1047].forEach((f,i)=>tone(f,0.18,'triangle',0.18,null,i*0.09)); },
    button(){ tone(420,0.07,'square',0.14); },
  };
  function startBgm(){ if(bgmTimer||!ac) return; const scale=[392,440,523,587,659,587,523,440]; let i=0;
    const step=()=>{ if(!muted){ tone(scale[i%scale.length],0.32,'triangle',0.05); if(i%2===0) tone(scale[i%scale.length]/2,0.5,'sine',0.035);} i++; };
    step(); bgmTimer=setInterval(step,300); }
  function stopBgm(){ if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; } }
  return { init:ctxInit, sfx, startBgm, stopBgm, isMuted:()=>muted,
    resume(){ if(ac&&ac.state==='suspended') ac.resume(); },
    setMuted(m){ muted=m; store(GAME_NAME+':mute',m?'1':'0'); if(master&&ac) master.gain.setTargetAtTime(m?0:0.9,ac.currentTime,0.02); if(m) stopBgm(); } };
})();

/* ---------- Mute button (DESIGN.md §5.11) ---------- */
const ICON_ON='M3 9v6h4l5 4V5L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z';
const ICON_OFF='M3 9v6h4l5 4V5L7 9H3zm16.6 3 2.5-2.5-1.4-1.4L18.2 10.6 15.7 8.1l-1.4 1.4L16.8 12l-2.5 2.5 1.4 1.4 2.5-2.5 2.5 2.5 1.4-1.4z';
const muteBtn=document.getElementById('muteBtn'), muteIcon=document.getElementById('muteIcon');
function renderMute(){ const m=Audio_.isMuted(); muteIcon.setAttribute('d',m?ICON_OFF:ICON_ON);
  muteBtn.setAttribute('aria-pressed',m?'true':'false'); muteBtn.setAttribute('aria-label',m?COPY.audioOff:COPY.audioOn); muteBtn.title=m?COPY.audioOff:COPY.audioOn; }
muteBtn.addEventListener('click',()=>{ Audio_.init(); const m=!Audio_.isMuted(); Audio_.setMuted(m); renderMute();
  if(!m){ Audio_.resume(); Audio_.sfx.button(); if(state.scene==='playing') Audio_.startBgm(); } });
renderMute();

/* ============================================================
   INPUT — keyboard + tap zones (floor=switch lane, phone=jump)
   ============================================================ */
const lostControl=()=>now()<state.stumbleUntil;          // stumbling → inputs ignored
function moveLane(dir){ if(state.scene!=='playing'||lostControl()) return;
  const n=clamp(state.lane+dir,0,CONFIG.lanes-1); if(n!==state.lane){ state.lane=n; Audio_.sfx.step(); } }
function doJump(){ if(state.scene!=='playing'||lostControl()) return;
  const full=CONFIG.dino.jumpK*layout().R.rsh;
  if(state.dinoY<=0.5){                                    // ground jump
    state.dinoVy=full; state.dinoSquash=1; state.airBoost=1;
    state.thumbTap=1; state.tapSide=-state.tapSide; Audio_.sfx.jump();
  } else if(state.airBoost>0){                             // mid-air tap → boost higher (once)
    state.airBoost--; state.dinoVy=Math.min(state.dinoVy+full*0.6, full*1.2);
    state.thumbTap=1; state.tapSide=-state.tapSide; Audio_.sfx.jump();
  } }
addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','Space','KeyA','KeyD','KeyW'].includes(e.code)) e.preventDefault();
  if(e.repeat) return;
  if(e.code==='ArrowLeft'||e.code==='KeyA') moveLane(-1);
  else if(e.code==='ArrowRight'||e.code==='KeyD') moveLane(1);
  else if(e.code==='ArrowUp'||e.code==='Space'||e.code==='KeyW') doJump();
});
function localPt(e){ const r=canvas.getBoundingClientRect(); return { x:e.clientX-r.left, y:e.clientY-r.top }; }
canvas.addEventListener('pointerdown',e=>{ Audio_.init(); Audio_.resume(); if(state.scene!=='playing') return;
  const pt=localPt(e);
  if(pt.y < layout().phone.py) moveLane(pt.x < view.w/2 ? -1 : 1); else doJump(); });

/* ============================================================
   DIFFICULTY
   ============================================================ */
function rampT(){ return clamp(state.elapsed/(CONFIG.roundDurationMs*CONFIG.rampCompleteAt),0,1); }
function hardness(){ return clamp((state.score-CONFIG.hardenStart)/(CONFIG.hardenEnd-CONFIG.hardenStart),0,1); }
function ramp(range){ const t=rampT(), s=hardness(); let v=lerp(range.start,range.end,t);
  if(range.start>range.end) v*=(1-0.35*s); else v*=(1+0.40*s); return v; }

/* ============================================================
   SPAWNING
   ============================================================ */
const FLOOR_TYPES=['sign','crate','barrier','cone','brick'];
const randLane=()=>(Math.random()*CONFIG.lanes)|0;
const randType=()=>FLOOR_TYPES[(Math.random()*FLOOR_TYPES.length)|0];
function spawnFloor(){
  const L=layout(), c=CONFIG.floor, span=L.floorBottom-L.horizonY;
  // don't drop an obstacle onto a shield that's still near the top (keep the diamond grabbable)
  const avoid=new Set();
  for(const p of state.pickups) if(p.layer==='floor' && p.y < L.horizonY+span*0.55) avoid.add(p.lane);
  let lanes=[]; for(let i=0;i<CONFIG.lanes;i++) if(!avoid.has(i)) lanes.push(i);
  if(!lanes.length) lanes=[randLane()];
  const lane=lanes.splice((Math.random()*lanes.length)|0,1)[0];
  state.floorObs.push({ lane, y:L.horizonY, baseW:c.baseW, baseH:c.baseH, type:randType(), passed:false });
  // sometimes a second obstacle in a different lane — always leaves a lane open
  if(lanes.length && Math.random()<ramp(c.doubleChance)){
    const l2=lanes[(Math.random()*lanes.length)|0];
    state.floorObs.push({ lane:l2, y:L.horizonY-rand(20,70), baseW:c.baseW, baseH:c.baseH, type:randType(), passed:false });
  }
}
function spawnCactus(){
  const R=layout().R;
  const h=rand(0.12,0.22)*R.rsh, w=rand(0.05,0.085)*R.rsw, dbl=Math.random()<0.3;
  state.cacti.push({ x:R.rsx+R.rsw, w:dbl?w*2.1:w, h, fly:0, type:'cactus' });
}
function spawnShield(){
  if(state.shield) return;
  const L=layout(), s=CONFIG.shield.size, span=L.floorBottom-L.horizonY;
  // pick a lane with no obstacle near the top, so the diamond isn't stacked on an obstacle
  const blocked=new Set();
  for(const o of state.floorObs) if(o.y < L.horizonY+span*0.55) blocked.add(o.lane);
  const free=[]; for(let i=0;i<CONFIG.lanes;i++) if(!blocked.has(i)) free.push(i);
  if(!free.length) return;            // no clear lane right now — skip this attempt
  const lane=free[(Math.random()*free.length)|0];
  state.pickups.push({ kind:'shield', layer:'floor', lane, y:L.horizonY, w:s, h:s, t:0, passed:false });
}
function spawnFocus(){ const R=layout().R, s=CONFIG.focus.sizeFrac*R.rsh;
  state.pickups.push({ kind:'focus', layer:'phone', x:R.rsx+R.rsw, y:R.gy-R.dsize-R.rsh*0.32, w:s, h:s, t:0 }); }
function spawnHeart(){ const R=layout().R, s=CONFIG.focus.sizeFrac*R.rsh*1.15;     // extra-heart pickup, in the runner
  state.pickups.push({ kind:'heart', layer:'phone', x:R.rsx+R.rsw, y:R.gy-R.dsize-R.rsh*0.30, w:s, h:s, t:0 }); }

/* ---------- particles / floats ---------- */
function burst(x,y,color,n=12,spd=180){ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, v=rand(spd*0.3,spd);
  state.particles.push({ x,y, vx:Math.cos(a)*v, vy:Math.sin(a)*v-60, life:rand(0.4,0.8), t:0, color, r:rand(2,4) }); } }
function floatText(x,y,text,color){ state.floats.push({ x,y,text,color,t:0,life:0.9 }); }

/* ============================================================
   FLOOR — 3-lane road perspective helpers
   Gentle convergence (wide flat road), not a single vanishing point.
   ============================================================ */
function floorProgress(L,y){ return clamp((y-L.horizonY)/(L.floorBottom-L.horizonY),0,1); }
function floorScale(L,y){ return lerp(0.5,1.12,floorProgress(L,y)); }
function roadEdges(L,p){ const W=L.W; return { l:lerp(W*0.30,W*0.03,p), r:lerp(W*0.70,W*0.97,p) }; }      // far→near
function laneEdgeX(L,frac,p){ const e=roadEdges(L,p); return lerp(e.l,e.r,frac); }
function laneCenterX(L,lane,p){ return laneEdgeX(L,(lane+0.5)/CONFIG.lanes,p); }

/* ============================================================
   UPDATE
   ============================================================ */
function update(dt){
  const L=layout(), R=L.R;
  const focusActive=now()<state.focusUntil, slow=focusActive?CONFIG.focus.slow:1;

  if(state.scene==='playing'){
    state.elapsed += dt*1000;            // soft round — no hard time-up; difficulty hard-tapers near 3 min

    state.scoreFloat+=dt*CONFIG.scoreRatePerSec*(focusActive?CONFIG.focus.scoreBoost:1);
    state.score=Math.floor(state.scoreFloat);            // no hard cap — Focus/longer survival can exceed 500

    // one-time extra-heart rescue: appears once, only while at 1 heart, at a random score in 100–150
    if(!state.heartSpawned && state.hearts===1 && state.score>=state.heartTrigger && state.score<=150){ state.heartSpawned=true; spawnHeart(); }

    // lane highlight easing
    state.renderLane += (state.lane-state.renderLane)*Math.min(1,CONFIG.laneTween*dt);

    // dino physics
    const grav=CONFIG.dino.gravK*R.rsh, maxJ=R.rsh-R.dsize-4;
    state.dinoVy-=grav*dt; state.dinoY+=state.dinoVy*dt;
    if(state.dinoY<=0){ state.dinoY=0; state.dinoVy=0; }
    else if(state.dinoY>maxJ){ state.dinoY=maxJ; if(state.dinoVy>0) state.dinoVy=0; }   // keep it on-screen
    state.dinoSquash=Math.max(0,state.dinoSquash-dt*4);
    state.thumbTap=Math.max(0,state.thumbTap-dt*6);          // quick tap-press decay
    state.dinoRun+=dt*12*slow;

    // scroll — the canteen floor halts during a stumble (you stopped walking);
    // the phone dino runner keeps moving on its own accumulator.
    const stumbling = now()<state.stumbleUntil;
    const floorSpd = stumbling ? 0 : ramp(CONFIG.floor.speed)*slow;
    const cactusSpd = ramp(CONFIG.cactus.speed)*R.rsw*slow;
    state.scrollFloor += floorSpd*dt;
    state.scrollRunner += cactusSpd*dt;

    // spawns — cacti keep coming even during a stumble, so tripping on the floor genuinely
    // threatens the dino's hearts (you can't jump while stumbling). That's the floor's stake.
    { state.cactusTimer+=dt*1000;
      const tp=CONFIG.cactusTaper;
      const taper=clamp((state.elapsed-tp.startMs)/(tp.fullMs-tp.startMs),0,1)+Math.max(0,(state.elapsed-tp.fullMs)/40000);   // 0 at 150s → 1 at 180s, more after
      const interval=ramp(CONFIG.cactus.spawnEveryMs)*Math.max(tp.minFactor,1-tp.strength*Math.min(taper,1.6));
      if(state.cactusTimer>=interval){ state.cactusTimer=0; spawnCactus(); } }
    state.focusTimer+=dt*1000; if(state.focusTimer>=CONFIG.focus.spawnEveryMs){ state.focusTimer=0; if(Math.random()<CONFIG.focus.chance) spawnFocus(); }
    if(state.elapsed>=CONFIG.floorIntroMs && !stumbling){
      state.floorTimer+=dt*1000; if(state.floorTimer>=ramp(CONFIG.floor.spawnEveryMs)){ state.floorTimer=0; spawnFloor(); }
      state.shieldTimer+=dt*1000; if(state.shieldTimer>=CONFIG.shield.spawnEveryMs){ state.shieldTimer=0; if(Math.random()<CONFIG.shield.chance) spawnShield(); }
    }

    // move
    for(const o of state.floorObs) o.y+=floorSpd*dt;
    for(const c of state.cacti) c.x-=cactusSpd*dt;
    for(const p of state.pickups){ p.t+=dt; if(p.layer==='floor') p.y+=floorSpd*dt; else p.x-=cactusSpd*dt; }
    state.floorObs=state.floorObs.filter(o=>o.y<L.floorBottom+40);
    state.cacti=state.cacti.filter(c=>c.x+c.w>R.rsx-4);
    state.pickups=state.pickups.filter(p=> p.layer==='floor' ? p.y<L.floorBottom+40 : p.x+p.w>R.rsx-4);

    const ROW=CONFIG.player.row;
    const rowXY=()=>({ x:laneCenterX(L,state.renderLane,ROW), y:lerp(L.horizonY,L.floorBottom,ROW) });
    const dino={ x:R.rsx+R.rsw*0.16, y:R.gy-R.dsize-state.dinoY, w:R.dsize*0.82, h:R.dsize };
    const invuln=now()<state.invulnUntil;

    // pickups — floor = lane match at the player row; phone = AABB on the dino
    for(const p of state.pickups){
      if(p.dead) continue;
      let hit=false;
      if(p.layer==='floor'){ if(!p.passed && floorProgress(L,p.y)>=ROW){ if(p.lane===state.lane) hit=true; else p.passed=true; } }
      else hit=aabb(dino,p);
      if(hit){ p.dead=true;
        if(p.kind==='shield'){ const a=rowXY(); state.shield=true; Audio_.sfx.shield(); floatText(a.x,a.y,'SHIELD','#7fd4ff'); burst(a.x,a.y,'#7fd4ff'); }
        else if(p.kind==='heart'){ state.hearts=Math.min(3,state.hearts+1); Audio_.sfx.life(); floatText(p.x+p.w/2,p.y+p.h/2,'+1 ♥','#e23b3b'); burst(p.x+p.w/2,p.y+p.h/2,'#e23b3b',18); }
        else { state.focusUntil=now()+CONFIG.focus.durationMs; Audio_.sfx.focus(); floatText(p.x+p.w/2,p.y+p.h/2,'2× SCORE!','#FFD633'); burst(p.x+p.w/2,p.y+p.h/2,'#FFD633',16); }
      }
    }
    state.pickups=state.pickups.filter(p=>!p.dead);

    // collisions — floor = same lane reaches the player row; phone = AABB
    const floorSafe = invuln || lostControl();              // can't trip again while already stumbling
    for(const o of state.floorObs){
      if(o.passed) continue;
      if(floorProgress(L,o.y)>=ROW){
        if(o.lane===state.lane && !floorSafe){ const a=rowXY(); hitObstacle('floor',o,a.x,a.y); break; }
        else o.passed=true;
      }
    }
    if(!invuln && now()>=state.dinoHurtUntil && state.scene==='playing')
      for(const c of state.cacti){ if(aabb(dino,cactusRect(R,c))){ hitObstacle('phone',c,dino.x+dino.w/2,dino.y+dino.h/2); break; } }
  }

  if(state.scene==='crashing'){       // dino out of hearts → short death beat → Game Over
    state.crashTimer+=dt*1000; state.shake=Math.max(0,state.shake-dt*60);
    if(state.crashTimer>900) endGame('over');
  }

  for(const p of state.particles){ p.t+=dt; p.vy+=520*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }
  state.particles=state.particles.filter(p=>p.t<p.life);
  for(const f of state.floats){ f.t+=dt; f.y-=40*dt; }
  state.floats=state.floats.filter(f=>f.t<f.life);
  if(state.shake>0 && state.scene!=='crashing') state.shake=Math.max(0,state.shake-dt*60);
}
function cactusRect(R,c){ const inset=c.w*0.18; return { x:c.x+inset, y:R.gy-c.h-c.fly, w:c.w-inset*2, h:c.h }; }

function hitObstacle(layer,o,fx,fy){
  if(layer==='floor'){
    if(state.shield){                     // floor Shield blocks ONE floor obstacle — floor-only
      state.shield=false; o.passed=true; state.floorObs=state.floorObs.filter(x=>x!==o);
      Audio_.sfx.block(); burst(fx,fy,'#7fd4ff',14); floatText(fx,fy,'BLOCKED!','#7fd4ff'); return;
    }
    // floor trip → stumble: lose control for a beat (timer keeps running, no Continue).
    // While stumbling the player can't jump, so the dino is exposed to cacti.
    state.floorObs=state.floorObs.filter(x=>x!==o);
    state.stumbleUntil=now()+CONFIG.stumbleMs; state.shake=16;     // one quick trip-jolt; floor keeps scrolling
    Audio_.sfx.stumble(); burst(fx,fy,'#ffd27f',18,220); floatText(fx,fy,'STUMBLE!','#ffce54');
    return;                               // run continues — only time-up or 0 hearts ends it
  }
  // layer==='phone' — dino runner has 3 hearts: a cactus costs a heart (brief grace)
  state.cacti=state.cacti.filter(x=>x!==o);
  state.hearts--; state.dinoHurtUntil=now()+1000; state.shake=8;
  Audio_.sfx.hurt(); burst(fx,fy,'#e2541d',16,200); floatText(fx,fy,'-1 ♥','#e23b3b');
  if(state.hearts>0) return;              // still alive — keep playing
  // out of hearts → Game Over
  state.scene='crashing'; state.crashTimer=0; state.shake=14;
  Audio_.sfx.crash(); Audio_.stopBgm();
  burst(fx,fy,'#8a8a8a', 22, 260);
}

/* ============================================================
   DRAW
   ============================================================ */
function draw(){
  const L=layout(), W=L.W, H=L.H;
  ctx.clearRect(0,0,W,H);
  let sx=0,sy=0; if(state.shake>0){ sx=rand(-state.shake,state.shake); sy=rand(-state.shake,state.shake); }
  ctx.save(); ctx.translate(sx,sy);

  drawFloor(L);
  if(state.scene==='playing'||state.scene==='crashing'){
    drawLaneMarker(L);
    for(const o of state.floorObs) drawFloorObstacle(L,o);
    for(const p of state.pickups) if(p.layer==='floor') drawFloorPickup(L,p);
  }
  drawPhone(L);   // foreground, with the runner clipped inside its screen

  // crash debris over everything
  for(const p of state.particles) drawParticle(p);
  for(const f of state.floats) drawFloat(f);
  ctx.restore();

  if(state.scene==='crashing' && state.crashTimer<200){ ctx.fillStyle=`rgba(255,255,255,${0.7*(1-state.crashTimer/200)})`; ctx.fillRect(0,0,W,H); }
}

function drawFloor(L){
  const W=L.W, H=L.H, hY=L.horizonY, bY=L.floorBottom;
  // perspective progress at the top & bottom of the canvas (top is < 0 → far distance)
  const span=bY-hY, pTop=(0-hY)/span, pBot=(H-hY)/span;
  const eT=roadEdges(L,pTop), eB=roadEdges(L,pBot);
  // grass at the sides of the road, fading lighter toward the far distance (top) — open horizon, no wall
  const grd=ctx.createLinearGradient(0,0,0,bY);
  grd.addColorStop(0,'#bcd6a6'); grd.addColorStop(0.45,'#8fb85f'); grd.addColorStop(1,'#6fa247');
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
  // the road converges upward toward a vanishing point above the screen → looks endless
  const road=ctx.createLinearGradient(0,0,0,H);
  road.addColorStop(0,'#efe9da'); road.addColorStop(0.5,'#ece0c4'); road.addColorStop(1,'#dccb9f');
  ctx.fillStyle=road; ctx.beginPath();
  ctx.moveTo(eT.l,0); ctx.lineTo(eT.r,0); ctx.lineTo(eB.r,H); ctx.lineTo(eB.l,H); ctx.closePath(); ctx.fill();
  // distance haze at the very top so the road melts into the horizon
  const haze=ctx.createLinearGradient(0,0,0,H*0.20);
  haze.addColorStop(0,'rgba(233,234,230,.92)'); haze.addColorStop(1,'rgba(233,234,230,0)');
  ctx.fillStyle=haze; ctx.fillRect(0,0,W,Math.ceil(H*0.20));
  // scrolling cross-tiles (perspective) for motion
  ctx.strokeStyle='rgba(140,110,60,.30)'; ctx.lineWidth=2;
  for(let k=0;k<20;k++){ let t=((k+(state.scrollFloor/150)%1)/7); t=t*t; const y=hY+span*t; if(y>H) break; const e=roadEdges(L,t);
    ctx.globalAlpha=clamp(t*1.6,0,1); ctx.beginPath(); ctx.moveTo(e.l,y); ctx.lineTo(e.r,y); ctx.stroke(); }
  ctx.globalAlpha=1;
  // lane divider lines (dashed, scrolling) from the far distance to the bottom
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=3; ctx.setLineDash([14,12]); ctx.lineDashOffset=-(state.scrollFloor*0.5)%26;
  for(let i=1;i<CONFIG.lanes;i++){ const f=i/CONFIG.lanes; ctx.beginPath(); ctx.moveTo(laneEdgeX(L,f,pTop),0); ctx.lineTo(laneEdgeX(L,f,pBot),H); ctx.stroke(); }
  ctx.setLineDash([]);
  // road edge kerbs
  ctx.strokeStyle='rgba(120,90,50,.55)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(eT.l,0); ctx.lineTo(eB.l,H); ctx.moveTo(eT.r,0); ctx.lineTo(eB.r,H); ctx.stroke();
}

function drawLaneMarker(L){
  const lane=state.renderLane, hY=L.horizonY, bY=L.floorBottom, H=L.H, n=CONFIG.lanes;
  const stumbling = now()<state.stumbleUntil;          // red, uncontrollable while stumbling
  // highlight the current lane the FULL length of the road (far distance at top → bottom of screen)
  const span=bY-hY, pTop=(0-hY)/span, pBot=(H-hY)/span;
  const fL=lane/n, fR=(lane+1)/n;
  ctx.fillStyle = stumbling ? 'rgba(226,59,58,.20)' : 'rgba(255,214,51,.16)'; ctx.beginPath();
  ctx.moveTo(laneEdgeX(L,fL,pTop),0); ctx.lineTo(laneEdgeX(L,fR,pTop),0);
  ctx.lineTo(laneEdgeX(L,fR,pBot),H); ctx.lineTo(laneEdgeX(L,fL,pBot),H); ctx.closePath(); ctx.fill();
  // the walker's shadow — head + sloped shoulders + torso, as one connected silhouette
  // (its lower body is hidden behind the phone). Sways gently left/right while walking.
  const u=L.W, sway=Math.sin(state.scrollFloor/70)*u*0.02;
  const cx=laneCenterX(L,lane,1)+sway, py=L.phone.py;
  const shW=u*0.18, twW=u*0.16, neckW=u*0.055, headR=u*0.07;
  const shoulderY=py-u*0.02, neckY=shoulderY-u*0.05, headCy=neckY-headR*0.55, bottomY=L.H;   // body runs straight down off-screen
  ctx.fillStyle = stumbling ? 'rgba(150,30,30,.34)' : 'rgba(0,0,0,.30)';
  ctx.beginPath();
  // body: torso sides (narrower) rise to wider sloped shoulders and a neck; bottom hidden behind phone
  ctx.moveTo(cx-twW, bottomY);
  ctx.lineTo(cx-shW, shoulderY+u*0.05);
  ctx.quadraticCurveTo(cx-shW, shoulderY, cx-neckW, neckY);
  ctx.lineTo(cx+neckW, neckY);
  ctx.quadraticCurveTo(cx+shW, shoulderY, cx+shW, shoulderY+u*0.05);
  ctx.lineTo(cx+twW, bottomY);
  ctx.closePath();
  // head — unioned in the same fill so it connects cleanly at the neck (no two-bubble look)
  ctx.moveTo(cx+headR, headCy); ctx.arc(cx, headCy, headR, 0, Math.PI*2);
  ctx.fill();
  if(state.shield) drawAura(cx, shoulderY, shW, '#7fd4ff');
}

function drawFloorObstacle(L,o){
  const p=floorProgress(L,o.y), s=floorScale(L,o.y), cx=laneCenterX(L,o.lane,p);
  const w=o.baseW*s, h=o.baseH*s, x=cx-w/2, y=o.y-h;
  ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(cx,o.y,w*0.5,5*s,0,0,Math.PI*2); ctx.fill();
  switch(o.type){
    case 'sign':                                   // yellow wet-floor triangle with a !
      ctx.fillStyle='#f5c518'; ctx.beginPath(); ctx.moveTo(cx,y); ctx.lineTo(x+w,o.y); ctx.lineTo(x,o.y); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#3a2c00'; ctx.font=`bold ${16*s}px Poppins`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('!',cx,y+h*0.6); break;
    case 'crate':                                  // wooden box with an inner border
      rrect(x,y,w,h,4,'#b07b3a'); ctx.strokeStyle='#7c5223'; ctx.lineWidth=2; ctx.strokeRect(x+3,y+3,w-6,h-6); break;
    case 'barrier': {                              // red/white striped board on two wooden legs
      const bh=h*0.42, lw=w*0.12, lx1=x+w*0.16, lx2=x+w*0.72;
      ctx.fillStyle='#9b6b3a'; ctx.fillRect(lx1,y+bh*0.7,lw,h-bh*0.7); ctx.fillRect(lx2,y+bh*0.7,lw,h-bh*0.7);
      ctx.fillStyle='#d23b2e'; ctx.fillRect(x,y,w,bh);
      ctx.save(); ctx.beginPath(); ctx.rect(x,y,w,bh); ctx.clip();
      ctx.fillStyle='#f4f1ea'; const sw=w*0.2;
      for(let sx=x-bh; sx<x+w; sx+=sw*2){ ctx.beginPath(); ctx.moveTo(sx,y+bh); ctx.lineTo(sx+sw,y+bh); ctx.lineTo(sx+sw+bh,y); ctx.lineTo(sx+bh,y); ctx.closePath(); ctx.fill(); }
      ctx.restore();
      ctx.strokeStyle='#2c2c2c'; ctx.lineWidth=2; ctx.strokeRect(x,y,w,bh); break;
    }
    case 'cone': {                                 // orange traffic cone with white bands + dark base
      const top=y, coneH=(o.y-h*0.06)-top, halfAt=f=>0.34*w*f, yAt=f=>top+coneH*f;
      ctx.fillStyle='#5e3f22'; ctx.beginPath(); ctx.ellipse(cx,o.y,w*0.46,h*0.09,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#e8731f'; ctx.beginPath(); ctx.moveTo(cx,top); ctx.lineTo(cx+halfAt(1),yAt(1)); ctx.lineTo(cx-halfAt(1),yAt(1)); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#f4f1ea';
      [[0.40,0.56],[0.74,0.92]].forEach(([a,b])=>{ ctx.beginPath(); ctx.moveTo(cx-halfAt(a),yAt(a)); ctx.lineTo(cx+halfAt(a),yAt(a)); ctx.lineTo(cx+halfAt(b),yAt(b)); ctx.lineTo(cx-halfAt(b),yAt(b)); ctx.closePath(); ctx.fill(); }); break;
    }
    default: {                                     // brick — pile of 4 red/brown bricks
      const bw=w*0.52, bh=h*0.26;
      ctx.strokeStyle='#7a3318'; ctx.lineWidth=1.5;
      const brick=(bx,by,c)=>{ rrect(bx,by,bw,bh,2,c); rstroke(bx,by,bw,bh,2); };
      brick(x,            o.y-bh,        '#b5532e');   // bottom-left
      brick(x+w-bw,       o.y-bh,        '#a8492a');   // bottom-right
      brick(x+w*0.24,     o.y-bh*1.95,   '#bd5a33');   // middle
      brick(x+w*0.08,     o.y-bh*2.9,    '#a8492a');   // top
    }
  }
}

function drawPhone(L){
  const p=L.phone, R=L.R;
  // body
  rrect(p.px,p.py,p.pw,p.ph,Math.round(p.pw*0.07),'#10151c');
  ctx.strokeStyle='#2a3340'; ctx.lineWidth=3; rstroke(p.px+2,p.py+2,p.pw-4,p.ph-4,Math.round(p.pw*0.065));
  // screen
  ctx.fillStyle='#f7f7f7'; rrect(R.rsx,R.rsy,R.rsw,R.rsh,8,'#f7f7f7');
  // notch + status
  ctx.fillStyle='#10151c'; rrect(p.px+p.pw/2-22,p.py+5,44,8,4,'#10151c');

  // runner (clipped to screen)
  ctx.save();
  ctx.beginPath(); roundPath(R.rsx,R.rsy,R.rsw,R.rsh,8); ctx.clip();
  drawRunner(L,R);
  ctx.restore();

  // hands gripping the phone — palm at each side, thumb resting on the screen edge
  const skin='#e8918a', crease='rgba(35,28,30,.45)';
  const drawHand=(sgn)=>{
    const edge = sgn<0 ? p.px : p.px+p.pw;        // phone side edge
    const cx = edge - sgn*p.pw*0.02;              // grip line, just inside the edge
    // palm / back of hand: rounded mass at the lower side, reaching below the phone
    ctx.fillStyle=skin;
    ctx.beginPath();
    ctx.ellipse(edge + sgn*p.pw*0.06, p.py+p.ph*0.74, p.pw*0.145, p.ph*0.50, sgn*0.14, 0, Math.PI*2);
    ctx.fill();
    // thumb: capsule angled inward, tip resting on the screen.
    // On a jump the matching thumb dips toward the glass — looks like tapping.
    const tap = (sgn===state.tapSide) ? Math.sin(state.thumbTap*Math.PI) : 0;
    const tipX = cx - sgn*p.pw*0.115 - sgn*tap*p.pw*0.02;     // press inward a touch
    const tipY = p.py+p.ph*0.44 + tap*p.ph*0.07;              // press down toward the glass
    ctx.strokeStyle=skin; ctx.lineWidth=p.pw*0.082; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(cx + sgn*p.pw*0.015, p.py+p.ph*0.56);
    ctx.lineTo(tipX, tipY);
    ctx.stroke();
    if(tap>0.15){ ctx.strokeStyle=`rgba(255,255,255,${0.5*tap})`; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(tipX,tipY,p.pw*0.05*tap+4,0,Math.PI*2); ctx.stroke(); }
    // crease lines (thumb fold, knuckle, lower hand)
    ctx.strokeStyle=crease; ctx.lineWidth=2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(cx - sgn*p.pw*0.05, p.py+p.ph*0.41); ctx.lineTo(cx + sgn*p.pw*0.015, p.py+p.ph*0.47); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - sgn*p.pw*0.075, p.py+p.ph*0.33); ctx.lineTo(cx - sgn*p.pw*0.005, p.py+p.ph*0.31); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(edge + sgn*p.pw*0.13, p.py+p.ph*0.88); ctx.quadraticCurveTo(edge + sgn*p.pw*0.03, p.py+p.ph*0.95, edge - sgn*p.pw*0.02, p.py+p.ph*1.02); ctx.stroke();
  };
  drawHand(-1); drawHand(1);
  ctx.lineCap='butt';
}

function drawRunner(L,R){
  // ground line
  ctx.strokeStyle='#9aa0a6'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(R.rsx,R.gy+1); ctx.lineTo(R.rsx+R.rsw,R.gy+1); ctx.stroke();
  ctx.setLineDash([6,7]); ctx.lineDashOffset=-(state.scrollRunner*0.6)% 13; ctx.globalAlpha=0.6;
  ctx.beginPath(); ctx.moveTo(R.rsx,R.gy+5); ctx.lineTo(R.rsx+R.rsw,R.gy+5); ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha=1;
  // drifting clouds
  ctx.fillStyle='#bcdcf2';
  for(let i=0;i<2;i++){ const cx=R.rsx+((i*0.55*R.rsw - state.scrollRunner*0.25)%(R.rsw+40)+R.rsw+40)%(R.rsw+40)-20; const cy=R.rsy+R.rsh*(0.22+i*0.12);
    rrect(cx,cy,26,8,4,'#bcdcf2'); rrect(cx+7,cy-5,14,8,4,'#bcdcf2'); }

  // focus star pickups
  for(const p of state.pickups) if(p.layer==='phone') drawPhonePickup(p);

  // cacti
  for(const c of state.cacti) drawCactus(R,c);

  // dino
  drawDino(L,R);

  // tiny score in the phone corner (homage to the offline game)
  ctx.fillStyle='#9aa0a6'; ctx.font=`600 ${Math.round(R.rsh*0.07)}px 'Roboto Mono',monospace`; ctx.textAlign='right'; ctx.textBaseline='top';
  ctx.fillText(String(state.score).padStart(5,'0'), R.rsx+R.rsw-6, R.rsy+6);
  // hearts (dino lives) top-left
  const hs=R.rsh*0.085;
  for(let i=0;i<3;i++) drawHeart(R.rsx+10+hs/2+i*(hs+6), R.rsy+10+hs/2, hs, i<state.hearts);
  // 2× badge while the Focus score boost is active, with a shrinking timer bar
  if(now()<state.focusUntil){
    const f=clamp((state.focusUntil-now())/CONFIG.focus.durationMs,0,1), pulse=0.7+0.3*Math.sin(now()/90);
    const bx=R.rsx+R.rsw/2, by=R.rsy+R.rsh*0.20, fs=Math.round(R.rsh*0.15);
    ctx.globalAlpha=pulse; ctx.fillStyle='#FFB603';
    ctx.font=`800 ${fs}px Poppins`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('2×', bx, by); ctx.globalAlpha=1;
    const bw=fs*1.5;
    ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fillRect(bx-bw/2, by+fs*0.5, bw, 3);
    ctx.fillStyle='#FFB603'; ctx.fillRect(bx-bw/2, by+fs*0.5, bw*f, 3);
  }
}

function drawDino(L,R){
  const sz=R.dsize, x=R.rsx+R.rsw*0.16, y=R.gy-sz-state.dinoY;
  const sc=clamp(1-state.dinoY/(R.rsh*0.45),0.4,1);
  ctx.fillStyle=`rgba(0,0,0,${0.22*sc})`; ctx.beginPath(); ctx.ellipse(x+sz*0.4,R.gy+2,sz*0.42*sc,3*sc,0,0,Math.PI*2); ctx.fill();
  const sq=state.dinoSquash*0.16, w=sz*0.82*(1+sq), h=sz*(1-sq);
  if(now()<state.dinoHurtUntil && Math.floor(now()/90)%2===0) ctx.globalAlpha=0.4;   // blink after a hit
  ctx.fillStyle='#e2541d';
  // body + tail + head (blocky T-rex silhouette)
  rrect(x,y+h*0.32,w*0.7,h*0.5,3,'#e2541d');                 // body
  ctx.fillRect(x-w*0.28,y+h*0.42,w*0.32,h*0.16);             // tail
  rrect(x+w*0.42,y,w*0.5,h*0.42,3,'#e2541d');                // head
  ctx.fillRect(x+w*0.86,y+h*0.26,w*0.12,h*0.1);              // snout
  ctx.fillStyle='#f7f7f7'; ctx.fillRect(x+w*0.74,y+h*0.12,4,4); // eye
  ctx.fillStyle='#e2541d'; ctx.fillRect(x+w*0.5,y+h*0.5,w*0.12,h*0.14); // arm
  // legs (run cycle when grounded)
  const stride=state.dinoY<=0.5?Math.sin(state.dinoRun)*0.5:0;
  ctx.fillRect(x+w*0.2,y+h*0.78,w*0.14,h*0.22*(1+stride*0.3));
  ctx.fillRect(x+w*0.46,y+h*0.78,w*0.14,h*0.22*(1-stride*0.3));
  ctx.globalAlpha=1;
  if(now()<state.focusUntil) drawAura(x+sz*0.4,y+sz*0.5,sz*0.7,'#FFD633');   // Focus is the dino-side power-up
}
// pixel-art heart bitmap: o=dark outline, r=red fill, w=white highlight, .=empty
const HEART_ART=[
  "...oo...oo...",
  "..orro.orro..",
  ".orrrrorrrro.",
  "orrwwrrrrrrro",
  "orrwwrrrrrrro",
  "orrrrrrrrrrro",
  ".orrrrrrrrro.",
  "..orrrrrrro..",
  "...orrrrro...",
  "....orrro....",
  ".....oro.....",
  "......o......",
];
function drawHeart(cx,cy,size,filled){
  const rows=HEART_ART, R=rows.length, C=rows[0].length, px=size/R;
  const x0=cx-C*px/2, y0=cy-R*px/2;
  const col = filled ? {o:'#a8261d',r:'#e2493a',w:'#ffffff'} : {o:'#b6a7a7',r:'#d9cdcd',w:'#ece5e5'};
  for(let r=0;r<R;r++){ const row=rows[r];
    for(let c=0;c<C;c++){ const ch=row[c]; if(ch==='.') continue;
      ctx.fillStyle = ch==='o'?col.o : ch==='w'?col.w : col.r;
      ctx.fillRect(Math.floor(x0+c*px), Math.floor(y0+r*px), Math.ceil(px), Math.ceil(px));
    }
  }
}

function drawCactus(R,c){
  const x=c.x, gy=R.gy, w=c.w, h=c.h;
  ctx.fillStyle='#41611c';                                        // dark saguaro green
  const tw=Math.max(4,w*0.32), tx=x+w*0.34, aw=Math.max(3,w*0.16);
  ctx.fillRect(tx, gy-h, tw, h);                                  // trunk
  // left arm — out, then UP (lower, rises a little)
  const lx=x+w*0.10;
  ctx.fillRect(lx, gy-h*0.42, tx-lx+1, aw);                       // horizontal
  ctx.fillRect(lx, gy-h*0.60, aw, h*0.18+aw);                     // vertical (up)
  // right arm — out, then UP (higher, rises more)
  const rx=x+w*0.90-aw;
  ctx.fillRect(tx+tw-1, gy-h*0.55, (rx+aw)-(tx+tw)+1, aw);        // horizontal
  ctx.fillRect(rx, gy-h*0.78, aw, h*0.23+aw);                     // vertical (up)
  // orange speckles
  ctx.fillStyle='#d99a3c';
  const sp=Math.max(2,w*0.11), dot=(fx,fy)=>ctx.fillRect(x+w*fx-sp/2, gy-h*fy-sp/2, sp, sp);
  dot(0.50,0.16); dot(0.50,0.38); dot(0.50,0.60); dot(0.50,0.84); // trunk
  dot(0.18,0.50); dot(0.82,0.66);                                 // arms
}

function drawShieldIcon(cx,cy,s){
  drawAura(cx,cy,s*0.7,'#7fd4ff');
  ctx.fillStyle='#2a8fd6'; ctx.beginPath();
  ctx.moveTo(cx,cy-s/2); ctx.lineTo(cx+s/2,cy-s*0.2); ctx.lineTo(cx,cy+s/2); ctx.lineTo(cx-s/2,cy-s*0.2); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#dff3ff'; ctx.font=`bold ${Math.round(s*0.5)}px Poppins`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('+',cx,cy);
}
function drawFocusIcon(cx,cy,s){
  drawAura(cx,cy,s*0.7,'#FFD633'); ctx.fillStyle='#FFD633'; ctx.beginPath();
  for(let i=0;i<10;i++){ const a=i*Math.PI/5-Math.PI/2, r=i%2?s*0.22:s*0.5, fx=cx+Math.cos(a)*r, fy=cy+Math.sin(a)*r; i?ctx.lineTo(fx,fy):ctx.moveTo(fx,fy); }
  ctx.closePath(); ctx.fill();
}
function drawFloorPickup(L,p){ const prog=floorProgress(L,p.y), cx=laneCenterX(L,p.lane,prog), s=p.w*floorScale(L,p.y); drawShieldIcon(cx,p.y,s); }
function drawPhonePickup(p){
  if(p.kind==='heart'){ const cx=p.x+p.w/2, cy=p.y+p.h/2; drawAura(cx,cy,p.w*0.65,'#e23b3b'); drawHeart(cx,cy,p.w,true); }
  else drawFocusIcon(p.x+p.w/2,p.y+p.h/2,p.w);
}
function drawAura(cx,cy,r,color){ const pulse=0.5+0.5*Math.sin(now()/120);
  ctx.strokeStyle=color; ctx.globalAlpha=0.4+0.4*pulse; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(cx,cy,r*(0.9+0.12*pulse),0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }
function drawParticle(p){ ctx.globalAlpha=clamp(1-p.t/p.life,0,1); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
function drawFloat(f){ ctx.globalAlpha=clamp(1-f.t/f.life,0,1); ctx.fillStyle=f.color; ctx.font='800 14px Poppins'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(f.text,f.x,f.y); ctx.globalAlpha=1; }

function roundPath(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function rrect(x,y,w,h,r,fill){ roundPath(x,y,w,h,r); if(fill){ ctx.fillStyle=fill; ctx.fill(); } }
function rstroke(x,y,w,h,r){ roundPath(x,y,w,h,r); ctx.stroke(); }

/* ============================================================
   HUD sync
   ============================================================ */
const elScore=document.getElementById('score');
function syncHUD(){ elScore.textContent=state.score; }   // timer is hidden — soft round

/* ============================================================
   SCENE / FLOW
   ============================================================ */
function showOverlay(id){
  ['startOverlay','overOverlay'].forEach(o=>document.getElementById(o).classList.toggle('show',o===id));
  document.getElementById('endRunBtn').style.display = (id===null && state.scene==='playing') ? 'block':'none';
}
function startGame(){
  const s=freshState(); s.scene='playing'; s.lane=1; s.renderLane=1; state=s;
  showOverlay(null); document.getElementById('endRunBtn').style.display='block';
  Audio_.init(); Audio_.resume(); if(!Audio_.isMuted()) Audio_.startBgm();
}
function endGame(reason){
  state.scene='over'; state.overReason=reason; Audio_.stopBgm();
  document.getElementById('endRunBtn').style.display='none';
  if(reason==='timeup') Audio_.sfx.timeup();

  let best=parseInt(store(GAME_NAME+':best')||'0',10)||0;
  const isBest=state.score>best; if(isBest){ best=state.score; store(GAME_NAME+':best',String(best)); }

  const elapsedSec=Math.max(1,state.elapsed/1000);
  state.suspicious=state.score>elapsedSec*CONFIG.scoreRatePerSec*CONFIG.focus.scoreBoost+60;

  document.getElementById('overHeadline').textContent=reason==='timeup'?COPY.timeUp:COPY.gameOver;
  document.getElementById('finalScore').textContent=state.score;
  document.getElementById('bestScore').textContent=best;
  const nb=document.getElementById('newBest'); nb.style.display=(isBest&&state.score>0)?'block':'none';
  if(isBest&&state.score>0) Audio_.sfx.best();

  const claimBtn=document.getElementById('claimBtn'), status=document.getElementById('claimStatus');
  status.textContent=''; state.claimed=false;
  if(state.score>0){ claimBtn.textContent=COPY.claim; claimBtn.dataset.mode='claim'; }
  else { claimBtn.textContent=COPY.retry; claimBtn.dataset.mode='retry'; }
  claimBtn.disabled=false;
  showOverlay('overOverlay');
}

/* ---------- Callback (§6.5) ---------- */
function resolveCallbackUrl(){
  const qs=new URLSearchParams(location.search), c=qs.get('callback_url');
  if(c){ try{ const u=new URL(c); if(u.protocol==='https:') return u.toString(); }catch(_){} }
  return (typeof window!=='undefined'&&window.__JDP_CALLBACK_URL__)?window.__JDP_CALLBACK_URL__:null;
}
function buildClaimPayload(finalScore,extra={}){
  const token=(crypto&&crypto.randomUUID)?crypto.randomUUID():Math.random().toString(36).slice(2)+Date.now().toString(36);
  return { game:GAME_NAME, score:Math.max(0,finalScore|0), token, ...extra };
}
function submitScore(){
  const status=document.getElementById('claimStatus'), url=resolveCallbackUrl();
  const payload=buildClaimPayload(state.score,{ suspicious:state.suspicious, duration_ms:Math.round(state.elapsed) });
  status.textContent=COPY.claiming;
  if(!url){ status.textContent=COPY.claimed; return; }
  fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),keepalive:true})
    .then(r=>{ status.textContent=r.ok?COPY.claimed:COPY.claimFail; }).catch(()=>{ status.textContent=COPY.claimFail; });
}

/* ---------- Buttons ---------- */
document.getElementById('startBtn').addEventListener('click',()=>{ Audio_.init(); Audio_.resume(); Audio_.sfx.button(); startGame(); });
document.getElementById('endRunBtn').addEventListener('click',()=>{ Audio_.sfx.button(); endGame('over'); });
document.getElementById('claimBtn').addEventListener('click',function(){ Audio_.sfx.button();
  if(this.dataset.mode==='retry'){ startGame(); return; } this.disabled=true; state.claimed=true; submitScore(); });

/* ---------- Copy ---------- */
function applyCopy(){
  document.getElementById('lblScore').textContent=COPY.score;
  document.getElementById('lblFinal').textContent=COPY.score;
  document.getElementById('lblBest').textContent=COPY.best;
  document.getElementById('startBtn').textContent=COPY.start;
  document.getElementById('startSub').textContent=COPY.sub;
  document.getElementById('startHint').textContent=COPY.hint;
  document.getElementById('endRunBtn').textContent=COPY.endRun;
}

/* ---------- Loop ---------- */
let last=now();
function frame(t){ const dt=Math.min(0.05,(t-last)/1000); last=t;
  if(state){ update(dt); draw(); syncHUD(); } requestAnimationFrame(frame); }

/* ---------- Boot (+ dev ?scene= jump) ---------- */
function boot(){
  applyCopy(); resize(); state=freshState();
  const sc=new URLSearchParams(location.search).get('scene');
  if(sc==='playing') startGame();
  else if(sc==='over'){ state.score=137; state.elapsed=60000; endGame('over'); }
  else { state.scene='start'; showOverlay('startOverlay'); }
  last=now(); requestAnimationFrame(frame);
}
boot();
</script>

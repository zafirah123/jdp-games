<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juara Digital: Ruby Rhythm</title>
    
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="./tailwind.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* Force Poppins font globally on all elements for a clean, consistent design */
        * {
            font-family: 'Poppins', 'Inter', sans-serif !important;
        }

        body {
            touch-action: none;
            overflow: hidden;
            background: linear-gradient(135deg, #1f0610 0%, #0d122a 100%);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            margin: 0 auto;
            background: rgba(10, 10, 15, 0.85);
            box-shadow: 0 0 40px rgba(244, 63, 94, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .key-btn {
            transition: all 0.08s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .key-btn.active {
            transform: scale(0.88);
            background: rgba(244, 63, 94, 0.5) !important;
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.8) !important;
            border-color: #f43f5e !important;
        }

        .combo-anim {
            animation: pop 0.15s ease-out;
        }
        
        .bonus-anim {
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.35); }
            100% { transform: scale(1); }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.4); opacity: 0; }
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Audio toggle — DESIGN.md §5.11 */
        .mute {
            position: fixed;
            top: max(12px, env(safe-area-inset-top));
            right: max(12px, env(safe-area-inset-right));
            width: 44px; height: 44px;
            border-radius: 22px;
            border: 2px solid #FFB603;
            background: #9E131F;
            color: #FFD633;
            display: flex; align-items: center; justify-content: center;
            padding: 0;
            cursor: pointer;
            z-index: 30;
            transition: transform 80ms ease;
        }
        .mute:active { transform: scale(0.92); }
        .mute svg { width: 22px; height: 22px; fill: currentColor; }

  /* ===== Standardized JDP start screen (see BATCH B rollout) ===== */
  #startScreen.jdp-start {
    position: absolute; inset: 0; z-index: 50;
    display: flex; transition: opacity .3s ease;
    padding: 0;
    background: #04122c;
    align-items: stretch;
    justify-content: flex-start;
    overflow-y: auto;
  }
  .jdp-frame {
    position: relative;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* small reserve so the orange splash stays clear of content on tall-content screens */
    padding-bottom: clamp(52px, 13vw, 80px);
    /* body copy on this screen uses Poppins (title overrides to Bebas Neue) */
    font-family: 'Poppins', system-ui, sans-serif;
    /* red-grid + navy background art (shared template asset) */
    background: #071733 url("assets/start/bg.webp") no-repeat top center / cover;
    overflow: hidden;
  }
  /* Gem placement mirrors the template (1080x1920): positions are % of the
     frame so they scale. Bokeh = soft blurred gems behind content (z1);
     sharp gems in front (z2, still behind the title/panel/logos at z3). */
  .jdp-bokeh { position: absolute; z-index: 1; pointer-events: none; opacity: 0.85; }
  .jdp-bokeh img { display: block; width: 100%; height: auto; }
  .jdp-bk1 { width: clamp(120px, 34vw, 180px); top: 44%;  right: -9%; }  /* top-right blur */
  .jdp-bk2 { width: clamp(130px, 38vw, 200px); top: 70%;  left: -11%; }  /* bottom-left blur */
  .jdp-gem { position: absolute; z-index: 4; pointer-events: none; }  /* in front of logos/mascot, behind title+panel */
  .jdp-gem img { display: block; width: 100%; height: auto; }
  /* two faceted rubies — top corners of the red band */
  .jdp-g1 { width: clamp(56px, 15vw, 74px);  top: 4.5%;  left: 1.5%;  transform: rotate(-8deg); }
  .jdp-g2 { width: clamp(58px, 15.5vw, 76px);top: 4.5%;  right: 1.5%; transform: rotate(10deg); }
  /* eight kelapa-sawit pebbles */
  .jdp-g3 { width: clamp(24px, 7vw, 32px);   top: 2.5%;  left: 25%;  }  /* top, left of centre */
  .jdp-g4 { width: clamp(26px, 7.5vw, 34px); top: 4%;    right: 23%; }  /* top, right of centre */
  .jdp-g5 { width: clamp(26px, 7.5vw, 34px); top: 9%;    left: 55%;  }  /* red band, lower centre */
  .jdp-g6 { width: clamp(28px, 8vw, 40px);   top: 45.5%; left: 24%;  }  /* beside "Powered by", left */
  .jdp-g7 { width: clamp(28px, 8vw, 40px);   top: 45.5%; right: 23%; }  /* beside "Powered by", right */
  .jdp-g8 { width: clamp(26px, 7.5vw, 36px); top: 53.5%; left: 4%;   }  /* far left, by MPOC */
  .jdp-g9 { width: clamp(22px, 6.5vw, 30px); top: 66.5%; left: 43%;  }  /* below MPOC, centre */
  .jdp-g10{ width: clamp(28px, 8vw, 38px);   top: 72.5%; right: 8%;  }  /* bottom right, by mascot */
  /* title — Bebas Neue, gold gradient fill (180°: #ffb000→#ffd80b) */
  .jdp-title {
    position: relative; z-index: 5; isolation: isolate;
    /* rhythm: push the whole stack down a bit so Start Game sits just above the splash */
    margin: clamp(46px, 11vw, 76px) 0 0;
    padding: 0 14px;
    /* heavy condensed display face (matches the arcade title reference).
       !important is required here to beat this game's global `* { font-family: Poppins !important }` */
    font-family: 'Anton', 'Bebas Neue', sans-serif !important;
    font-weight: 400;
    font-size: clamp(42px, 14vw, 74px);
    line-height: 1.0;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    /* the visible face is the ::after gradient; the real <h1> is transparent and just
       carries layout + the neon glow (background-clip:text only paints on the pseudo here) */
    color: #ffd23f;   /* solid fallback if background-clip:text unsupported */
    -webkit-text-fill-color: transparent;
    /* faint cool glow only — the dark drop shadow is the separate ::before layer below,
       kept OFF the gold face so the letters keep their bright colour */
    text-shadow: 0 0 12px rgba(120,180,255,0.22);
  }
  /* dark letter-shaped shadow BEHIND the gold — offset copy, doesn't tint the face */
  .jdp-title::before {
    content: attr(data-text);
    position: absolute; left: 0; right: 0; top: 0; bottom: 0;
    z-index: -1; padding: inherit;
    font-family: 'Anton', 'Bebas Neue', sans-serif !important;
    color: rgba(0,0,0,0.55); -webkit-text-fill-color: rgba(0,0,0,0.55);
    transform: translate(3px, 5px);
    filter: blur(0.6px);
  }
  /* golden linear-gradient face — 180°: #ffb000 → #ffd80b (per reference) */
  .jdp-title::after {
    content: attr(data-text);
    position: absolute; left: 0; right: 0; top: 0; bottom: 0;
    z-index: 1; padding: inherit;
    font-family: 'Anton', 'Bebas Neue', sans-serif !important;
    background: linear-gradient(180deg, #ffb000 0%, #ffd80b 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent; -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 1px #d99500;
  }
  /* instructions panel */
  .jdp-panel {
    position: relative; z-index: 5;
    width: min(84%, 356px);
    margin: clamp(10px, 3.5vw, 20px) 0 0;
    padding: 20px 22px 24px;
    background: rgba(11, 32, 74, 0.5);
    border: 1.5px solid rgba(255,255,255,0.85);
    border-radius: 22px;
    text-align: center;
    -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px);
  }
  .jdp-panel .jdp-panel-head {
    font-weight: 800; color: #fff;
    font-size: clamp(15px, 4.4vw, 18px); margin: 0 0 10px;
  }
  #startScreen.jdp-start .sub {
    color: rgba(255,255,255,0.9);
    font-size: clamp(13px, 3.8vw, 15px);
    margin: 0; line-height: 1.5;
  }
  /* powered-by row */
  /* bottom margin guarantees a minimum gap between the logos and the CTA below */
  .jdp-powered { position: relative; z-index: 3; margin: clamp(12px, 4vw, 22px) 0 clamp(14px, 4.5vw, 26px); text-align: center; }
  .jdp-powered .lbl { color: #fff; font-size: 15px; font-weight: 600; margin: 0 0 14px; }
  /* bare logos on the background — no shared panel */
  .jdp-logos { display: inline-flex; align-items: center; justify-content: center; gap: clamp(10px, 4vw, 26px); }
  .jdp-logos img { width: auto; object-fit: contain; }
  /* MPOC mark sits directly on the background — no circle frame */
  .jdp-mpoc-ring { display: inline-flex; align-items: center; justify-content: center; }
  .jdp-mpoc   { height: clamp(84px, 26vw, 118px); }
  .jdp-mascot { height: clamp(108px, 34vw, 152px); }
  /* orange CTA */
  #startScreen.jdp-start .jdp-cta {
    position: relative; z-index: 3;
    margin: 0;   /* flows directly under the logos; gap comes from .jdp-powered's bottom margin */
    width: min(56%, 236px);
    padding: 12px 20px;
    border: 3px solid #FFD21E;
    border-radius: 36px;
    background: linear-gradient(180deg, #ff8f22 0%, #f26f0c 100%);
    color: #fff; font-weight: 800; letter-spacing: 0.5px;
    font-size: clamp(15px, 4.2vw, 19px);
    text-transform: none;
    box-shadow: 0 8px 0 rgba(150,60,0,0.45), 0 14px 26px rgba(0,0,0,0.35);
    cursor: pointer;
  }
  #startScreen.jdp-start .jdp-cta:active { transform: translateY(3px); box-shadow: 0 5px 0 rgba(150,60,0,0.45), 0 8px 16px rgba(0,0,0,0.35); }
  /* bottom orange liquid blob (shared template asset) */
  .jdp-blob {
    position: absolute; z-index: 1; left: 0; right: 0; bottom: -1px;
    width: 100%; pointer-events: none;
  }
  .jdp-blob img { display: block; width: 100%; height: auto; }
  /* controls line inside the instructions panel */
  #startScreen.jdp-start .jdp-panel .hint {
    margin: 12px 0 0; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.18);
    font-size: clamp(11px, 3.2vw, 13px);
    color: rgba(255,255,255,0.72); line-height: 1.9;
  }
  #startScreen.jdp-start .jdp-panel .hint kbd {
    background: rgba(255,214,51,0.16); border: 1px solid rgba(255,214,51,0.35);
    padding: 2px 7px; border-radius: 5px; color: #FFD633;
    font-family: inherit; font-size: 0.92em; white-space: nowrap;
  }
  /* device-adaptive controls: keyboard by default, touch on coarse pointers */
  #startScreen.jdp-start .jdp-panel .hint-touch { display: none; }
  @media (hover: none) and (pointer: coarse) {
    #startScreen.jdp-start .jdp-panel .hint-keys  { display: none; }
    #startScreen.jdp-start .jdp-panel .hint-touch { display: inline; }
  }
  /* hide only the best-score line on this screen (controls now shown above) */
  #startScreen.jdp-start .best { display: none; }

  @media (max-height: 860px) {
    .jdp-frame { padding-bottom: clamp(48px, 12vh, 68px); }
    .jdp-title { margin-top: clamp(34px, 7vh, 52px); font-size: clamp(38px, 10vw, 64px); }
    .jdp-panel { margin-top: clamp(10px, 2.2vh, 16px); padding: 16px 18px 18px; }
    .jdp-powered { margin: clamp(10px, 2.4vh, 18px) 0 clamp(10px, 2.8vh, 18px); }
    .jdp-powered .lbl { margin-bottom: 10px; }
    .jdp-mpoc { height: clamp(72px, 20vh, 96px); }
    .jdp-mascot { height: clamp(96px, 24vh, 126px); }
    .jdp-start .jdp-panel .hint { margin-top: 10px; padding-top: 10px; line-height: 1.65; }
  }

  @media (max-height: 720px) {
    .jdp-frame { padding-bottom: 44px; }
    .jdp-title { margin-top: 24px; font-size: clamp(34px, 8vw, 54px); }
    .jdp-panel { width: min(88%, 344px); margin-top: 8px; padding: 14px 16px 16px; border-radius: 18px; }
    .jdp-panel .jdp-panel-head { margin-bottom: 8px; font-size: clamp(14px, 3.4vw, 16px); }
    .jdp-start .sub { font-size: clamp(12px, 2.8vw, 14px); line-height: 1.4; }
    .jdp-powered { margin: 10px 0 12px; }
    .jdp-powered .lbl { font-size: 14px; margin-bottom: 8px; }
    .jdp-logos { gap: clamp(8px, 2vw, 18px); }
    .jdp-mpoc { height: clamp(60px, 16vh, 84px); }
    .jdp-mascot { height: clamp(80px, 20vh, 112px); }
    .jdp-start .jdp-cta { width: min(62%, 224px); padding: 11px 18px; font-size: clamp(14px, 3.6vw, 17px); box-shadow: 0 6px 0 rgba(150,60,0,0.45), 0 10px 18px rgba(0,0,0,0.35); }
    .jdp-blob { opacity: 0.82; }
    .jdp-start .jdp-panel .hint { font-size: 11px; line-height: 1.5; }
  }
    </style>
</head>
<body class="text-white select-none">

    <!-- Audio toggle — DESIGN.md §5.11 -->
    <button id="muteBtn" class="mute" aria-label="AUDIO ON" aria-pressed="false">
        <svg viewBox="0 0 24 24"></svg>
    </button>

    <div id="game-container">
        <!-- Game Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- UI Layer Overlay -->
        <div id="ui-layer" class="p-4 pb-6">
            
            <!-- Top Bar: Score, Time, Speed, Pause -->
            <div class="glass-panel rounded-xl p-3 flex justify-between items-center shadow-lg gap-2 pointer-events-auto">
                <div class="text-center flex-1 border-r border-white/10">
                    <p id="hudScoreLabel" class="text-[10px] text-rose-400 font-bold uppercase tracking-wider" style="margin: 0;">Score</p>
                    <p id="scoreDisplay" class="text-xl font-black text-white" style="margin: 0; font-weight: 900;">0</p>
                </div>
                <div class="text-center flex-1 border-r border-white/10">
                    <p id="hudTimeLabel" class="text-[10px] text-blue-300 font-bold uppercase tracking-wider" style="margin: 0;">Time</p>
                    <p id="timeDisplay" class="text-xl font-black text-white" style="margin: 0; font-weight: 900;">3:00</p>
                </div>
                <div class="text-center flex-1">
                    <p id="hudSpeedLabel" class="text-[10px] text-purple-300 font-bold uppercase tracking-wider" style="margin: 0;">Speed</p>
                    <p id="levelDisplay" class="text-xl font-black text-white" style="margin: 0; font-weight: 900;">1</p>
                </div>
                <button id="pauseBtn" class="flex-none bg-white/5 hover:bg-white/15 p-2 rounded-lg transition border border-white/10 ml-1 pointer-events-auto">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width: 24px; height: 24px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </button>
            </div>

            <!-- Companion PBot Live Widget -->
            <div id="gameplayPBot" class="flex justify-center items-center h-28 my-2 transition-all duration-200">
                <!-- PBot dynamic SVG generated here -->
            </div>

            <!-- Combo & Rating Display -->
            <div class="text-center">
                <div id="comboDisplayContainer" class="hidden relative inline-block mx-auto">
                    <p class="text-2xl text-yellow-300 font-black italic drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] combo-anim" style="margin: 0; font-weight: 900;"><span id="comboLabelText">COMBO x</span><span id="comboDisplay">0</span></p>
                    <p id="bonusPopup" class="absolute left-0 right-0 -top-8 text-lg text-green-400 font-black hidden drop-shadow-lg" style="font-weight: 900;">+5 BONUS!</p>
                </div>
                <!-- Hit Rating Feedback -->
                <div id="ratingDisplay" class="text-2xl font-black tracking-widest mt-2 opacity-0 transition-opacity duration-100 italic" style="text-shadow: 0 0 10px rgba(255,255,255,0.5);"></div>
            </div>

            <div class="flex-grow"></div>

            <!-- Bottom Target Key Indicators -->
            <div class="flex justify-between w-full px-2" style="display: flex; justify-content: space-between; width: 100%;">
                <div id="key-0" class="key-btn w-14 h-14 rounded-full border-2 border-rose-500 flex items-center justify-center font-bold text-xl bg-black/60 shadow-[0_0_10px_rgba(244,63,94,0.3)]" style="width: 56px; height: 56px;">A</div>
                <div id="key-1" class="key-btn w-14 h-14 rounded-full border-2 border-rose-400 flex items-center justify-center font-bold text-xl bg-black/60 shadow-[0_0_10px_rgba(251,113,133,0.3)]" style="width: 56px; height: 56px;">S</div>
                <div id="key-2" class="key-btn w-14 h-14 rounded-full border-2 border-blue-400 flex items-center justify-center font-bold text-xl bg-black/60 shadow-[0_0_10px_rgba(96,165,250,0.3)]" style="width: 56px; height: 56px;">K</div>
                <div id="key-3" class="key-btn w-14 h-14 rounded-full border-2 border-blue-500 flex items-center justify-center font-bold text-xl bg-black/60 shadow-[0_0_10px_rgba(59,130,246,0.3)]" style="width: 56px; height: 56px;">L</div>
            </div>

            <!-- Song/Track Info -->
            <div class="mt-4 text-center glass-panel rounded-full py-2 px-4 w-full shadow-md overflow-hidden pointer-events-auto" style="margin-top: 16px;">
                <p id="songDisplay" class="text-xs font-semibold text-gray-200 truncate" style="margin: 0;"></p>
            </div>
        </div>

        <!-- Pause Screen -->
        <div id="pauseScreen" class="absolute inset-0 bg-black/85 flex flex-col items-center justify-center p-6 z-45 hidden backdrop-blur-md" style="display: none;">
            <!-- PBot Sleep Illustration -->
            <div id="pausePBot" class="w-24 h-24 mb-4 flex items-center justify-center"></div>
            
            <h2 id="pausedHeading" class="text-4xl font-black text-rose-500 mb-2 tracking-widest uppercase" style="font-weight: 900;">PAUSED</h2>
            <p id="pausedSubtitle" class="text-gray-400 mb-8 text-sm text-center font-medium">The game has been temporarily paused.</p>

            <div class="flex flex-col gap-3 w-full max-w-[260px]">
                <button id="resumeBtn" class="bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-400 hover:to-pink-400 text-white font-bold py-3 px-12 rounded-full text-lg shadow-lg transform transition hover:scale-105 pointer-events-auto" style="font-weight: bold;">
                    Resume
                </button>
                <button id="exitBtn" class="bg-white/5 hover:bg-white/15 border border-white/10 text-white font-bold py-3 px-12 rounded-full text-lg shadow-lg transform transition hover:scale-105 pointer-events-auto" style="font-weight: bold;">
                    End Game
                </button>
            </div>
        </div>

        <!-- Countdown Screen -->
        <div id="countdownScreen" class="absolute inset-0 bg-black/60 flex items-center justify-center p-6 z-40 hidden" style="display: none; pointer-events: none;">
            <div id="countdownText" class="text-9xl font-black text-yellow-400 transition-all duration-200 ease-out" style="text-shadow: 0 0 40px rgba(250,204,21,0.65);">3</div>
        </div>

        <!-- Start menu — standardized JDP template (see .jdp-* CSS above) -->
        <div id="startScreen" class="jdp-start">
          <div class="jdp-frame">
            <!-- soft background bokeh gems -->
            <span class="jdp-bokeh jdp-bk1"><img src="assets/start/gem-bokeh.webp" alt=""></span>
            <span class="jdp-bokeh jdp-bk2"><img src="assets/start/gem-bokeh.webp" alt=""></span>
            <!-- sharp floating gems -->
            <span class="jdp-gem jdp-g1"><img src="assets/start/gem-ruby.webp" alt=""></span>
            <span class="jdp-gem jdp-g2"><img src="assets/start/gem-ruby.webp" alt=""></span>
            <span class="jdp-gem jdp-g3"><img src="assets/start/gem-a.webp" alt=""></span>
            <span class="jdp-gem jdp-g4"><img src="assets/start/gem-b.webp" alt=""></span>
            <span class="jdp-gem jdp-g5"><img src="assets/start/gem-a.webp" alt=""></span>
            <span class="jdp-gem jdp-g6"><img src="assets/start/gem-b.webp" alt=""></span>
            <span class="jdp-gem jdp-g7"><img src="assets/start/gem-a.webp" alt=""></span>
            <span class="jdp-gem jdp-g8"><img src="assets/start/gem-b.webp" alt=""></span>
            <span class="jdp-gem jdp-g9"><img src="assets/start/gem-a.webp" alt=""></span>
            <span class="jdp-gem jdp-g10"><img src="assets/start/gem-b.webp" alt=""></span>

            <h1 id="menuTitle" class="jdp-title" data-text="Ruby Rhythm">Ruby Rhythm</h1>

            <div class="jdp-panel">
              <div class="jdp-panel-head" id="howToPlayHeading">How to Play</div>
              <p class="sub" id="menuSub"></p>
              <p class="hint" id="menuHint"></p>
            </div>

            <div class="jdp-powered">
              <p class="lbl">Powered by</p>
              <div class="jdp-logos">
                <span class="jdp-mpoc-ring"><img class="jdp-mpoc" src="assets/start/mpoc.webp" alt="MPOC"></span>
                <img class="jdp-mascot" src="assets/start/mascot.webp" alt="">
              </div>
            </div>

            <button id="startBtn" class="jdp-cta"></button>

            <div class="jdp-blob"><img src="assets/start/blob.webp" alt=""></div>
          </div>
        </div>

        <!-- End Screen (Final Score Only) -->

        }

        document.getElementById('muteBtn').addEventListener('click', () => {
            isMuted = !isMuted;
            try { localStorage.setItem(MUTE_STORAGE_KEY, isMuted ? '1' : '0'); }
            catch { /* storage blocked */ }
            updateMuteUI();
            // On unmute, init/resume audio and play a short confirmation tone.
            if (!isMuted) { initAudio(); playHitSound('good'); }
        });

        // Minor Pentatonic musical scale frequencies
        const notesScale = [130.81, 146.83, 155.56, 174.61, 196.00, 220.00, 233.08, 261.63, 293.66, 311.13, 349.23, 392.00, 440.00, 466.16, 523.25];

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Play procedural hit sound effect based on hit type
        function playHitSound(type) {
            if (!audioCtx || isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            let freq = 440;
            let duration = 0.1;

            if (type === 'perfect') {
                freq = 880; duration = 0.12;
                osc.type = 'triangle';
            } else if (type === 'great') {
                freq = 660; duration = 0.1;
                osc.type = 'triangle';
            } else if (type === 'good') {
                freq = 440; duration = 0.08;
                osc.type = 'triangle';
            } else if (type === 'miss') {
                freq = 110; duration = 0.2;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(55, audioCtx.currentTime + duration);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
                return;
            }

            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + duration);

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Countdown audio cue (3, 2, 1, Go!)
        function playCountdownTone(isGo) {
            if (!audioCtx || isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            if (isGo) {
                osc.frequency.setValueAtTime(880, now);
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else {
                osc.frequency.setValueAtTime(440, now);
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.18, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            }
        }

        // Real-time audio loop scheduler & rhythm synchronization engine
        function startProceduralMusic() {
            bpm = 110 + (gameLevel * 10); 
            const beatDuration = 60 / bpm;
            const stepDuration = beatDuration / 2; // Eighth note scheduling

            songDisplay.innerText = COPY.songTrack(bpm);

            if (synthInterval) clearInterval(synthInterval);

            synthInterval = setInterval(() => {
                if (!isPlaying || isPaused || isCountingDown) return;

                const time = audioCtx.currentTime;
                
                // 1. Synth Kick Drum scheduler
                if (currentBeat % 4 === 0) {
                    playKickDrum(time);
                }

                // 2. Snare & Hi-Hat scheduler
                if (currentBeat % 4 === 2) {
                    playSnare(time);
                } else if (currentBeat % 2 === 1) {
                    playHihat(time);
                }

                // 3. Procedural arpeggiator/bass sequencer
                playBassline(currentBeat, time);

                // 4. Spawn active notes synchronized perfectly with musical tempos
                const spawnChance = 0.35 + (gameLevel * 0.05);
                if (Math.random() < spawnChance && currentBeat % 2 === 0) {
                    const randomLane = Math.floor(Math.random() * numLanes);
                    spawnNote(randomLane);
                }

                currentBeat++;
            }, stepDuration * 1000);
        }

        function playKickDrum(time) {
            if (isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.frequency.setValueAtTime(150, time);
            osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.3);

            gain.gain.setValueAtTime(0.4, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.3);

            osc.start(time);
            osc.stop(time + 0.3);
        }

        function playSnare(time) {
            if (isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.frequency.setValueAtTime(180, time);
            osc.frequency.exponentialRampToValueAtTime(80, time + 0.15);

            gain.gain.setValueAtTime(0.15, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);

            osc.start(time);
            osc.stop(time + 0.15);
        }

        function playHihat(time) {
            if (isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.frequency.setValueAtTime(8000, time);
            gain.gain.setValueAtTime(0.03, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);

            osc.start(time);
            osc.stop(time + 0.05);
        }

        function playBassline(beat, time) {
            if (isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            
            const baseIndex = (Math.floor(beat / 8) % 4) * 2;
            const noteOffset = beat % 8;
            const noteIndex = Math.min(notesScale.length - 1, baseIndex + (noteOffset % 3));
            const freq = notesScale[noteIndex];

            osc.frequency.setValueAtTime(freq, time);

            const biquad = audioCtx.createBiquadFilter();
            biquad.type = "lowpass";
            biquad.frequency.setValueAtTime(400, time);

            osc.connect(biquad);
            biquad.connect(gain);
            gain.connect(audioCtx.destination);

            gain.gain.setValueAtTime(0.08, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.25);

            osc.start(time);
            osc.stop(time + 0.25);
        }

        function stopProceduralMusic() {
            if (synthInterval) {
                clearInterval(synthInterval);
                synthInterval = null;
            }
        }

        // NOTE/GEM RENDERING & TRACK MOVEMENT
        class Note {
            constructor(lane) {
                this.lane = lane;
                this.y = -50; 
                this.active = true;
                this.width = canvas.width / numLanes - 10;
                this.height = 38; 
            }

            update() {
                this.y += noteSpeed;
                const hitZoneY = canvas.height * hitZoneYPercent;
                if (this.y > hitZoneY + 50 && this.active) {
                    this.active = false;
                    triggerMiss();
                }
            }

            draw() {
                if (!this.active) return;
                const laneWidth = canvas.width / numLanes;
                const x = this.lane * laneWidth + 5;

                ctx.save();
                ctx.shadowBlur = 18;
                ctx.shadowColor = laneColors[this.lane].main;
                
                // Draw 3D-esque glowing diamond ruby
                ctx.fillStyle = laneColors[this.lane].main;
                ctx.beginPath();
                ctx.moveTo(x + this.width / 2, this.y); 
                ctx.lineTo(x + this.width, this.y + this.height / 2); 
                ctx.lineTo(x + this.width / 2, this.y + this.height); 
                ctx.lineTo(x, this.y + this.height / 2); 
                ctx.closePath();
                ctx.fill();

                // Glossy inner gem lines
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1.8;
                ctx.beginPath();
                ctx.moveTo(x + this.width / 2, this.y + 6);
                ctx.lineTo(x + this.width - 7, this.y + this.height / 2);
                ctx.lineTo(x + this.width / 2, this.y + this.height - 6);
                ctx.lineTo(x + 7, this.y + this.height / 2);
                ctx.closePath();
                ctx.stroke();

                ctx.restore();
            }
        }

        function spawnNote(lane) {
            notes.push(new Note(lane));
        }

        // EXPLOSIVE SPARK PARTICLES
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8 - 3;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // PRECISION TIMING CALCULATION
        function checkHit(lane) {
            if (!isPlaying || isPaused || isCountingDown) return;

            const hitZoneY = canvas.height * hitZoneYPercent;
            let targetNote = null;
            let targetIdx = -1;

            for (let i = 0; i < notes.length; i++) {
                if (notes[i].lane === lane && notes[i].active) {
                    if (targetNote === null || notes[i].y > targetNote.y) {
                        targetNote = notes[i];
                        targetIdx = i;
                    }
                }
            }

            const laneWidth = canvas.width / numLanes;
            const hitX = lane * laneWidth + laneWidth / 2;

            if (targetNote !== null) {
                const distance = Math.abs((targetNote.y + targetNote.height / 2) - hitZoneY);
                
                if (distance < 24) {
                    registerHit('perfect', targetIdx, hitX);
                } else if (distance < 48) {
                    registerHit('great', targetIdx, hitX);
                } else if (distance < 72) {
                    registerHit('good', targetIdx, hitX);
                } else {
                    registerHit('miss', targetIdx, hitX);
                }
            } else {
                applyMissPenalty();
                showRating(COPY.rateMissBang, '#fbb7b7');
                playHitSound('miss');
            }
        }

        function registerHit(rating, index, x) {
            const hitZoneY = canvas.height * hitZoneYPercent;
            const note = notes[index];
            note.active = false;
            stats.totalAttempts++;

            createExplosion(x, hitZoneY, laneColors[note.lane].main);

            // Dynamically change live gameplay PBot companion to 'perfect'
            renderPBot('gameplayPBot', 'perfect');
            if (pbotTimeout) clearTimeout(pbotTimeout);
            pbotTimeout = setTimeout(() => {
                renderPBot('gameplayPBot', 'hello');
            }, 550);

            if (rating === 'perfect') {
                score += 3;
                combo++;
                stats.perfect++;
                showRating(COPY.ratePerfect, '#facc15');
                playHitSound('perfect');
            } else if (rating === 'great') {
                score += 2;
                combo++;
                stats.great++;
                showRating(COPY.rateGreat, '#4ade80');
                playHitSound('great');
            } else if (rating === 'good') {
                score += 1;
                combo++;
                stats.good++;
                showRating(COPY.rateGood, '#60a5fa');
                playHitSound('good');
            } else {
                triggerMiss();
                return;
            }

            if (combo > maxComboRecorded) {
                maxComboRecorded = combo;
            }

            if (combo > 0) {
                comboDisplay.innerText = combo;
                comboDisplayContainer.classList.remove('hidden');
                
                comboDisplay.parentElement.classList.remove('combo-anim');
                void comboDisplay.parentElement.offsetWidth; 
                comboDisplay.parentElement.classList.add('combo-anim');

                if (combo % 100 === 0) {
                    score += 10;
                    triggerBonusAnimation(COPY.bonus10);
                } else if (combo % 50 === 0) {
                    score += 5;
                    triggerBonusAnimation(COPY.bonus5);
                }
            }

            scoreDisplay.innerText = score;
        }

        function triggerMiss() {
            combo = 0;
            stats.miss++;
            stats.totalAttempts++;
            comboDisplayContainer.classList.add('hidden');
            showRating(COPY.rateMiss, '#f43f5e');
            applyMissPenalty();
            playHitSound('miss');

            // Dynamically trigger Dizzy Miss PBot companion reaction
            renderPBot('gameplayPBot', 'miss');
            if (pbotTimeout) clearTimeout(pbotTimeout);
            pbotTimeout = setTimeout(() => {
                renderPBot('gameplayPBot', 'hello');
            }, 650);
        }

        // Apply visual penalty value
        function applyMissPenalty() {
            score = Math.max(0, score - 5);
            scoreDisplay.innerText = score;
        }

        function triggerBonusAnimation(text) {
            bonusPopup.innerText = text;
            bonusPopup.classList.remove('hidden');
            bonusPopup.classList.add('bonus-anim');
            
            setTimeout(() => {
                bonusPopup.classList.remove('bonus-anim');
                bonusPopup.classList.add('hidden');
            }, 800);
        }

        function showRating(text, color) {
            ratingDisplay.innerText = text;
            ratingDisplay.style.color = color;
            ratingDisplay.style.textShadow = `0 0 15px ${color}`;
            ratingDisplay.style.opacity = '1';
            
            setTimeout(() => {
                if (ratingDisplay.innerText === text) {
                    ratingDisplay.style.opacity = '0';
                }
            }, 500);
        }

        // SPEED INCREASE SCHEDULER
        function checkLevelProgression() {
            const prevLevel = gameLevel;
            
            if (timeRemaining > 150) gameLevel = 1;
            else if (timeRemaining > 130) gameLevel = 2;
            else if (timeRemaining > 110) gameLevel = 3;
            else if (timeRemaining > 90) gameLevel = 4;
            else if (timeRemaining > 70) gameLevel = 5;
            else if (timeRemaining > 50) gameLevel = 6;
            else if (timeRemaining > 30) gameLevel = 7;
            else gameLevel = 8;

            if (gameLevel !== prevLevel) {
                levelDisplay.innerText = gameLevel;
                noteSpeed = 4.5 + (gameLevel * 0.85); 
                
                startProceduralMusic();
                
                triggerBonusAnimation(COPY.levelUp(gameLevel));
            }
        }

        // TIMER COUNTER
        function startTimer() {
            if (gameTimerInterval) clearInterval(gameTimerInterval);
            
            gameTimerInterval = setInterval(() => {
                if (!isPlaying || isPaused || isCountingDown) return;

                timeRemaining--;
                
                const mins = Math.floor(timeRemaining / 60);
                const secs = timeRemaining % 60;
                timeDisplay.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;

                checkLevelProgression();

                if (timeRemaining <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // COUNTDOWN TIMER SEQUENCE (3, 2, 1, GO!)
        function runCountdown(callback) {
            isCountingDown = true;
            countdownScreen.style.display = 'flex';
            
            let count = 3;
            countdownText.style.color = "#facc15"; 

            function tick() {
                if (!isPlaying) {
                    countdownScreen.style.display = 'none';
                    isCountingDown = false;
                    return;
                }

                if (count > 0) {
                    countdownText.innerText = count;
                    playCountdownTone(false);
                    
                    countdownText.style.transform = 'scale(2.5)';
                    countdownText.style.opacity = '0';
                    void countdownText.offsetWidth; 
                    countdownText.style.transform = 'scale(1)';
                    countdownText.style.opacity = '1';
                    
                    count--;
                    setTimeout(tick, 1000);
                } else if (count === 0) {
                    countdownText.innerText = COPY.countdownGo;
                    countdownText.style.color = "#4ade80"; 
                    playCountdownTone(true);
                    
                    countdownText.style.transform = 'scale(2.5)';
                    countdownText.style.opacity = '0';
                    void countdownText.offsetWidth; 
                    countdownText.style.transform = 'scale(1)';
                    countdownText.style.opacity = '1';
                    
                    count--;
                    setTimeout(tick, 900);
                } else {
                    countdownScreen.style.display = 'none';
                    isCountingDown = false;
                    callback();
                }
            }
            tick();
        }

        // RUNLOOP CONTROLLER (PLAY, PAUSE, RESUME, EXIT, END)
        function startGame() {
            initAudio();
            
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
            }, 300);

            pauseScreen.style.display = 'none';
            endScreen.style.display = 'none';

            // Reset state parameters
            score = 0;
            combo = 0;
            maxComboRecorded = 0;
            timeRemaining = 180; 
            gameLevel = 1;
            noteSpeed = 5;
            notes = [];
            particles = [];
            stats = { perfect: 0, great: 0, good: 0, miss: 0, totalAttempts: 0 };

            scoreDisplay.innerText = '0';
            timeDisplay.innerText = '3:00';
            levelDisplay.innerText = '1';
            comboDisplayContainer.classList.add('hidden');

            isPlaying = true;
            isPaused = false;

            // Render live PBot gameplay companion
            renderPBot('gameplayPBot', 'hello');

            // Start base animation loop
            requestAnimationFrame(gameLoop);

            // Execute interactive countdown before procedural schedules
            runCountdown(() => {
                startTimer();
                startProceduralMusic();
            });
        }

        function togglePause() {
            if (!isPlaying || isCountingDown) return; 

            isPaused = !isPaused;
            if (isPaused) {
                renderPBot('pausePBot', 'sleep');
                pauseScreen.style.display = 'flex';
                stopProceduralMusic();
            } else {
                pauseScreen.style.display = 'none';
                initAudio();
                startProceduralMusic();
            }
        }

        function exitGameHalfway() {
            isPlaying = false;
            isPaused = false;
            isCountingDown = false;
            stopProceduralMusic();
            if (gameTimerInterval) clearInterval(gameTimerInterval);

            pauseScreen.style.display = 'none';
            countdownScreen.style.display = 'none';

            document.getElementById('finalScore').innerText = score;

            let ratingStatus = COPY.rankBeginner;
            if (score > 400) ratingStatus = COPY.rankSupersonic;
            else if (score > 250) ratingStatus = COPY.rankMaster;
            else if (score > 120) ratingStatus = COPY.rankEntertainer;
            else if (score > 50) ratingStatus = COPY.rankSatisfactory;

            document.getElementById('endGameStatus').innerText = ratingStatus;

            // User chose to end mid-run via pause-menu "End Game" — non-timer exit.
            document.getElementById('endHeading').innerText = COPY.gameOver;

            // Render matching performance PBot
            if (score >= 150) {
                renderPBot('endPBot', 'hooray');
            } else {
                renderPBot('endPBot', 'sad');
            }

            endScreen.style.display = 'flex';
        }

        function endGame() {
            isPlaying = false;
            stopProceduralMusic();
            if (gameTimerInterval) clearInterval(gameTimerInterval);

            const hitAccuracyPercent = stats.totalAttempts > 0 
                ? Math.round(((stats.perfect + stats.great + stats.good) / stats.totalAttempts) * 100) 
                : 0;

            document.getElementById('finalScore').innerText = score;
            document.getElementById('maxCombo').innerText = maxComboRecorded;
            document.getElementById('hitAccuracy').innerText = `${hitAccuracyPercent}%`;
            document.getElementById('statPerfect').innerText = stats.perfect;
            document.getElementById('statGreat').innerText = stats.great;
            document.getElementById('statGood').innerText = stats.good;
            document.getElementById('statMiss').innerText = stats.miss;

            let ratingStatus = COPY.rankBeginner;
            if (score > 400) ratingStatus = COPY.rankSupersonic;
            else if (score > 250) ratingStatus = COPY.rankMaster;
            else if (score > 120) ratingStatus = COPY.rankEntertainer;
            else if (score > 50) ratingStatus = COPY.rankSatisfactory;

            document.getElementById('endGameStatus').innerText = ratingStatus;

            // Round timer hit zero — canonical TIME'S UP! state per §6.4.
            document.getElementById('endHeading').innerText = COPY.timeUp;

            // Render matching performance PBot
            if (score >= 150) {
                renderPBot('endPBot', 'hooray');
            } else {
                renderPBot('endPBot', 'sad');
            }

            endScreen.style.display = 'flex';
        }

        // CANVAS BACKGROUND DRAWING ENGINE
        function drawTracks() {
            const laneWidth = canvas.width / numLanes;
            const hitZoneY = canvas.height * hitZoneYPercent;

            for (let i = 0; i < numLanes; i++) {
                ctx.fillStyle = i % 2 === 0 ? 'rgba(255, 255, 255, 0.015)' : 'rgba(0, 0, 0, 0.15)';
                ctx.fillRect(i * laneWidth, 0, laneWidth, canvas.height);

                if (i > 0) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(i * laneWidth, 0);
                    ctx.lineTo(i * laneWidth, canvas.height);
                    ctx.stroke();
                }

                if (keyPressEffect[i]) {
                    ctx.save();
                    let gradient = ctx.createLinearGradient(0, canvas.height, 0, 0);
                    gradient.addColorStop(0, laneColors[i].glow);
                    gradient.addColorStop(0.7, 'rgba(0,0,0,0)');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(i * laneWidth, 0, laneWidth, canvas.height);
                    ctx.restore();
                }
            }

            for (let i = 0; i < numLanes; i++) {
                const cx = i * laneWidth + laneWidth / 2;
                
                ctx.save();
                ctx.shadowBlur = keyPressEffect[i] ? 20 : 5;
                ctx.shadowColor = laneColors[i].main;
                
                ctx.strokeStyle = laneColors[i].main;
                ctx.lineWidth = keyPressEffect[i] ? 4 : 2;
                ctx.beginPath();
                ctx.arc(cx, hitZoneY, 24, 0, Math.PI * 2);
                ctx.stroke();

                ctx.fillStyle = keyPressEffect[i] ? 'rgba(255, 255, 255, 0.4)' : 'rgba(255, 255, 255, 0.05)';
                ctx.beginPath();
                ctx.arc(cx, hitZoneY, 12, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, hitZoneY - 30);
            ctx.lineTo(canvas.width, hitZoneY - 30);
            ctx.moveTo(0, hitZoneY + 30);
            ctx.lineTo(canvas.width, hitZoneY + 30);
            ctx.stroke();
        }

        function gameLoop() {
            if (!isPlaying) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!isPaused) {
                notes.forEach(note => note.update());
                particles.forEach(p => p.update());

                notes = notes.filter(note => note.active);
                particles = particles.filter(p => p.alpha > 0);
            }

            drawTracks();
            notes.forEach(note => note.draw());
            particles.forEach(p => p.draw());

            requestAnimationFrame(gameLoop);
        }

        // BROWSER & HARDWARE EVENT LISTENERS
        
        // Physical Keyboard Event Listeners
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key in keyMap) {
                const lane = keyMap[key];
                if (!keyPressEffect[lane]) {
                    keyPressEffect[lane] = true;
                    const keyBtn = document.getElementById(`key-${lane}`);
                    if (keyBtn) keyBtn.classList.add('active');
                    
                    checkHit(lane);
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key in keyMap) {
                const lane = keyMap[key];
                keyPressEffect[lane] = false;
                const keyBtn = document.getElementById(`key-${lane}`);
                if (keyBtn) keyBtn.classList.remove('active');
            }
        });

        // Mouse Clicks for Desktop Integration
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            initAudio();

            const rect = canvas.getBoundingClientRect();
            const laneWidth = canvas.width / numLanes;
            const clickX = e.clientX - rect.left;
            const lane = Math.floor(clickX / laneWidth);

            if (lane >= 0 && lane < numLanes) {
                keyPressEffect[lane] = true;
                const keyBtn = document.getElementById(`key-${lane}`);
                if (keyBtn) keyBtn.classList.add('active');
                
                checkHit(lane);
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const laneWidth = canvas.width / numLanes;
            const clickX = e.clientX - rect.left;
            const lane = Math.floor(clickX / laneWidth);

            if (lane >= 0 && lane < numLanes) {
                keyPressEffect[lane] = false;
                const keyBtn = document.getElementById(`key-${lane}`);
                if (keyBtn) keyBtn.classList.remove('active');
            }
        });

        canvas.addEventListener('mouseleave', () => {
            for (let i = 0; i < numLanes; i++) {
                keyPressEffect[i] = false;
                const keyBtn = document.getElementById(`key-${i}`);
                if (keyBtn) keyBtn.classList.remove('active');
            }
        });

        // Multi-touch Control Handlers for mobile/tablet environments
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio();

            const rect = canvas.getBoundingClientRect();
            const laneWidth = canvas.width / numLanes;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchX = touch.clientX - rect.left;
                
                const lane = Math.floor(touchX / laneWidth);
                if (lane >= 0 && lane < numLanes) {
                    keyPressEffect[lane] = true;
                    const keyBtn = document.getElementById(`key-${lane}`);
                    if (keyBtn) keyBtn.classList.add('active');
                    
                    checkHit(lane);
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const laneWidth = canvas.width / numLanes;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const touchX = touch.clientX - rect.left;
                
                const lane = Math.floor(touchX / laneWidth);
                if (lane >= 0 && lane < numLanes) {
                    keyPressEffect[lane] = false;
                    const keyBtn = document.getElementById(`key-${lane}`);
                    if (keyBtn) keyBtn.classList.remove('active');
                }
            }
        }, { passive: false });

        // Screen UI Navigation listeners
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        resumeBtn.addEventListener('click', togglePause);
        exitBtn.addEventListener('click', exitGameHalfway);
        restartBtn.addEventListener('click', startGame);

        menuBtn.addEventListener('click', () => {
            startScreen.style.display = 'flex';
            void startScreen.offsetWidth; 
            startScreen.style.opacity = '1';

            renderPBot('startPBot', 'hello');

            pauseScreen.style.display = 'none';
            endScreen.style.display = 'none';

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            songDisplay.innerText = COPY.songWaiting;
        });

    </script>
</body>
</html>
